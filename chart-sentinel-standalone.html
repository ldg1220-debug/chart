// ─── localStorage helpers ─────────────────────────────────────────────────────
const ls_get = (key, def=null) => {
  try { const v=localStorage.getItem(key); return v?JSON.parse(v):def; }
  catch { return def; }
};
const ls_set = (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); }
  catch(e) {
    if(e.name==='QuotaExceededError') {
      // Remove oldest logs to free space
      const logs = ls_get('cs_logs',[]);
      if(logs.length>0){ ls_set('cs_logs', logs.slice(-50)); }
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }
  }
};

// ─── Math utilities ───────────────────────────────────────────────────────────
function movingAverage(arr, n) {
  return arr.map((_,i) => {
    if(i<n-1) return null;
    const s = arr.slice(i-n+1, i+1).reduce((a,b)=>a+b,0);
    return s/n;
  });
}

function pearsonCorrelation(x, y) {
  const n = Math.min(x.length, y.length);
  if(n<2) return 0;
  const mx = x.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const my = y.slice(0,n).reduce((a,b)=>a+b,0)/n;
  let num=0, dx2=0, dy2=0;
  for(let i=0;i<n;i++){
    const a=x[i]-mx, b=y[i]-my;
    num+=a*b; dx2+=a*a; dy2+=b*b;
  }
  const denom=Math.sqrt(dx2*dy2);
  return denom===0?0:num/denom;
}

function pctReturns(prices) {
  return prices.slice(1).map((p,i)=>(p-prices[i])/prices[i]);
}

// ─── Advanced Indicators ─────────────────────────────────────────────────────
function vwma(ohlcv, n) {
  return ohlcv.map((_, i) => {
    if (i < n - 1) return null;
    const slice = ohlcv.slice(i - n + 1, i + 1);
    const sumPV = slice.reduce((a, d) => a + d.close * (d.volume || 0), 0);
    const sumV  = slice.reduce((a, d) => a + (d.volume || 0), 0);
    return sumV === 0 ? null : sumPV / sumV;
  });
}

function fibRetracements(high, low, current) {
  const ratios = [0.236, 0.382, 0.5, 0.618, 0.786];
  return ratios.map(r => {
    const price = high - (high - low) * r;
    return { level: r, price, pct: (price / current - 1) * 100 };
  });
}

function fibExtensions(low, high, current) {
  const ratios = [1.272, 1.414, 1.618, 2.0, 2.618];
  return ratios.map(r => {
    const price = low + (high - low) * r;
    return { level: r, price, pct: (price / current - 1) * 100 };
  });
}

function roundNumbers(price) {
  if (!price || price <= 0) return [];
  const mag = Math.pow(10, Math.floor(Math.log10(price)));
  const steps = [mag * 0.1, mag * 0.25, mag * 0.5, mag, mag * 2];
  const set = new Set();
  steps.forEach(step => {
    const base = Math.floor(price / step) * step;
    for (let o = -3; o <= 4; o++) {
      const v = Math.round((base + o * step) * 10000) / 10000;
      if (v > 0) set.add(v);
    }
  });
  const sorted = [...set].sort((a, b) => a - b);
  const below = sorted.filter(v => v < price * 0.995).slice(-3);
  const above = sorted.filter(v => v > price * 1.005).slice(0, 3);
  return [...below, ...above].map(level => ({
    level,
    pct: (level / price - 1) * 100,
    role: level < price ? '지지' : '저항',
  }));
}

function computeTechIndicators(ohlcv) {
  if (!ohlcv || ohlcv.length < 2) return null;
  const closes = ohlcv.map(d => d.close);
  const n = closes.length;
  const last = v => Array.isArray(v) ? v[n - 1] : null;

  const ma20  = last(movingAverage(closes, 20));
  const ma30  = last(movingAverage(closes, 30));
  const ma50  = last(movingAverage(closes, 50));
  const ma99  = last(movingAverage(closes, 99));
  const ma200 = last(movingAverage(closes, 200));

  const vwma20v  = last(vwma(ohlcv, 20));
  const vwma100v = last(vwma(ohlcv, 100));

  const bbAll = bollingerBands(closes, 20, 2);
  const bbLast = bbAll[n - 1];

  const rsi14All = rsi(closes, 14);
  const rsi14v   = rsi14All[n - 1];

  const price = closes[n - 1];
  const ohlcv90 = ohlcv.slice(-90);
  const high90  = Math.max(...ohlcv90.map(d => d.high));
  const low90   = Math.min(...ohlcv90.map(d => d.low));

  const fibs    = fibRetracements(high90, low90, price);
  const fibExts = fibExtensions(low90, high90, price);
  const rounds  = roundNumbers(price);

  // Trade plan
  const entry1   = fibs[0].price; // Fib 0.236
  const entry2   = fibs[1].price; // Fib 0.382
  const stopRaw  = low90 * 0.97;  // just below 90d low
  const profit1  = fibExts[0].price; // Ext 1.272
  const profit2  = fibExts[2].price; // Ext 1.618
  const profit3  = fibExts[4].price; // Ext 2.618
  const rr1 = entry1 > stopRaw ? (profit1 - entry1) / (entry1 - stopRaw) : null;
  const rr2 = entry1 > stopRaw ? (profit2 - entry1) / (entry1 - stopRaw) : null;
  const rr3 = entry1 > stopRaw ? (profit3 - entry1) / (entry1 - stopRaw) : null;

  return {
    price,
    ma: { ma20, ma30, ma50, ma99, ma200 },
    vwma: { vwma20: vwma20v, vwma100: vwma100v },
    bb: bbLast ? { upper: bbLast.upper, mid: bbLast.mid, lower: bbLast.lower } : null,
    rsi14: rsi14v,
    fib90: { high: high90, low: low90 },
    fibs,
    fibExts,
    rounds,
    tradePlan: { entry1, entry2, stopLoss: stopRaw, profit1, profit2, profit3, rr1, rr2, rr3 },
  };
}

// ─── Ticker Resolution ────────────────────────────────────────────────────────
// mode: 'auto' | 'stock' | 'crypto'
function resolveTicker(query, mode='auto') {
  const q = query.trim().toLowerCase();

  if (mode === 'stock') {
    if (KR_TICKER_MAP[q]) return {ticker: KR_TICKER_MAP[q], type:'stock'};
    return {ticker: query.trim().toUpperCase(), type:'stock'};
  }

  if (mode === 'crypto') {
    const id = CRYPTO_MAP[q] || q.replace(/\s+/g,'-').toLowerCase();
    return {ticker: id, type:'crypto'};
  }

  // auto
  if (KR_TICKER_MAP[q]) return {ticker: KR_TICKER_MAP[q], type:'stock'};
  if (CRYPTO_MAP[q]) return {ticker: CRYPTO_MAP[q], type:'crypto'};
  const up = query.trim().toUpperCase();
  const cryptoSuffixes = ['BTC','ETH','SOL','XRP','BNB','ADA','DOGE','AVAX','MATIC','LINK','DOT','ATOM','LTC','TRX','SHIB','NEAR','APT','SUI','ARB','OP','TON','ICP','UNI','INJ','SEI'];
  if (cryptoSuffixes.includes(up)) return {ticker: CRYPTO_MAP[up.toLowerCase()]||up.toLowerCase(), type:'crypto'};
  return {ticker: up, type:'stock'};
}

// CoinGecko 동적 검색 — CRYPTO_MAP에 없는 코인 ID를 서버에서 탐색
const _coinIdCache = {};
async function searchCoinId(query) {
  const q = query.trim().toLowerCase();
  if (CRYPTO_MAP[q]) return CRYPTO_MAP[q];
  if (_coinIdCache[q]) return _coinIdCache[q];
  try {
    const url = `${CG_BASE}/search?query=${encodeURIComponent(query)}`;
    const resp = await fetch(url, {signal: AbortSignal.timeout(6000)});
    if (!resp.ok) return q;
    const data = await resp.json();
    const coin = data.coins?.[0];
    if (coin) {

// 1순위: Yahoo Finance v8 (corsproxy.io 프록시)
// 2순위: Yahoo Finance v8 (allorigins 프록시)
// 3순위: Stooq CSV (CORS 없음, 무료)

const PROXY_LIST = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

async function fetchViaProxies(yfUrl) {
  // 직접 시도
  try {
    const r = await fetch(yfUrl, {signal: AbortSignal.timeout(5000)});
    if(r.ok) { const d=await r.json(); if(d?.chart?.result) return d; }
  } catch {}

  // 프록시 순차 시도
  for(const makeUrl of PROXY_LIST) {
    try {
      const r = await fetch(makeUrl(yfUrl), {signal: AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const raw = await r.json();
      // allorigins는 {contents: "...json string..."} 형태
      const d = raw?.contents ? JSON.parse(raw.contents) : raw;
      if(d?.chart?.result) return d;
    } catch {}
  }
  return null;
}

async function fetchYahooOHLCV(ticker, range='6mo', interval='1d') {
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=${range}&interval=${interval}&includePrePost=false&events=div%2Csplit`;
  const data = await fetchViaProxies(yfUrl);
  if(data) return parseYahooResponse(data);

  // 최후 폴백: Stooq (한국 제외 주요 미국 주식)
  return fetchStooq(ticker, range);
}

function parseYahooResponse(data) {
  const r = data?.chart?.result?.[0];
  if(!r) throw new Error('Yahoo Finance: 데이터 없음');
  const ts = r.timestamp;
  const q  = r.indicators.quote[0];
  const adj= r.indicators.adjclose?.[0]?.adjclose;
  return ts.map((t,i)=>({
    date: new Date(t*1000).toISOString().slice(0,10),
    open:  q.open[i],
    high:  q.high[i],
    low:   q.low[i],
    close: q.close[i],
    volume:q.volume[i]||0,
    adjclose: adj?adj[i]:q.close[i],
  })).filter(d=>d.close!=null && !isNaN(d.close));
}

// Stooq: 미국/글로벌 주식 CSV (CORS 허용)
async function fetchStooq(ticker, range='6mo') {
  const daysMap = {'1mo':30,'3mo':90,'6mo':180,'1y':365,'2y':730,'5y':1825};
  const days = daysMap[range]||180;
  const to   = new Date();
  const from = new Date(to - days*864e5);
  const fmt  = d => d.toISOString().slice(0,10).replace(/-/g,'');
  // Stooq 티커: 미국 주식은 그대로, 한국은 .KS 제거 후 .KO
  const stooqTicker = ticker.replace('.KS','.KO').toLowerCase();
  const url = `https://stooq.com/q/d/l/?s=${stooqTicker}&d1=${fmt(from)}&d2=${fmt(to)}&i=d`;
  const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
  if(!r.ok) throw new Error(`Stooq 오류: ${r.status}`);
  const csv = await r.text();
  const lines = csv.trim().split('\n');
  if(lines.length < 2 || lines[0].toLowerCase().includes('no data')) throw new Error('Stooq: 데이터 없음');
  return lines.slice(1).map(l=>{
    const [date,open,high,low,close,volume] = l.split(',');
    return {
      date, open:+open, high:+high, low:+low, close:+close,
      volume:+(volume||0), adjclose:+close,
    };
  }).filter(d=>d.close && !isNaN(d.close));
}

// ─── 기술 지표 계산 ──────────────────────────────────────────────────────────
function bollingerBands(closes, n=20, k=2) {
  return closes.map((_,i) => {
    if(i < n-1) return null;
    const slice = closes.slice(i-n+1, i+1);
    const mean  = slice.reduce((a,b)=>a+b,0)/n;
    const std   = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/n);
    return {upper: mean+k*std, mid: mean, lower: mean-k*std};
  });
}

function rsi(closes, period=14) {
  const result = Array(closes.length).fill(null);
  if(closes.length < period+1) return result;
  let gains=0, losses=0;
  for(let i=1; i<=period; i++) {
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let avgGain=gains/period, avgLoss=losses/period;
  result[period] = avgLoss===0 ? 100 : 100 - 100/(1+avgGain/avgLoss);
  for(let i=period+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    avgGain = (avgGain*(period-1) + Math.max(d,0))/period;
    avgLoss = (avgLoss*(period-1) + Math.max(-d,0))/period;
    result[i] = avgLoss===0 ? 100 : 100 - 100/(1+avgGain/avgLoss);
  }
  return result;
}

async function generateChartImage(ohlcv, ticker) {
  return new Promise((resolve, reject) => {
    // 완전히 보이되 z-index로 뒤에 숨기는 방식 (브라우저 렌더링 보장)
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;top:0;left:0;width:960px;height:620px;z-index:-9999;opacity:0;pointer-events:none;overflow:hidden;';
    const div = document.createElement('div');
    div.style.cssText = 'width:960px;height:620px;';
    wrap.appendChild(div);
    document.body.appendChild(wrap);

    const dates  = ohlcv.map(d=>d.date);
    const closes = ohlcv.map(d=>d.close);
    const highs  = ohlcv.map(d=>d.high);
    const lows   = ohlcv.map(d=>d.low);
    const vols   = ohlcv.map(d=>d.volume||0);

    const ma7  = movingAverage(closes,7);
    const ma20 = movingAverage(closes,20);
    const ma60 = movingAverage(closes,60);
    const ma200= movingAverage(closes,200);
    const bb   = bollingerBands(closes,20,2);
    const rsi14= rsi(closes,14);

    const bbUpper = bb.map(b=>b?.upper??null);
    const bbMid   = bb.map(b=>b?.mid??null);
    const bbLower = bb.map(b=>b?.lower??null);

    const volColors = ohlcv.map((d,i)=> i===0 ? '#3b82f6' : d.close>=d.open ? 'rgba(34,197,94,0.6)':'rgba(239,68,68,0.6)');

    const traces = [
      // ── 캔들스틱
      {type:'candlestick', name:ticker, xaxis:'x', yaxis:'y',
       x:dates, open:ohlcv.map(d=>d.open), high:highs, low:lows, close:closes,
       increasing:{line:{color:'#22c55e'},fillcolor:'#22c55e'},
       decreasing:{line:{color:'#ef4444'},fillcolor:'#ef4444'},
       showlegend:false},
      // ── 볼린저밴드
      {type:'scatter',name:'BB상단',x:dates,y:bbUpper,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.5)',width:1,dash:'dot'},showlegend:false,connectgaps:false},
      {type:'scatter',name:'BB중간',x:dates,y:bbMid,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.3)',width:1},showlegend:false,fill:'tonexty',fillcolor:'rgba(148,163,184,0.04)',connectgaps:false},
      {type:'scatter',name:'BB하단',x:dates,y:bbLower,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.5)',width:1,dash:'dot'},showlegend:false,fill:'tonexty',fillcolor:'rgba(148,163,184,0.04)',connectgaps:false},
      // ── 이동평균선
      {type:'scatter',name:'MA7', x:dates,y:ma7, mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#f472b6',width:1.2},connectgaps:false},
      {type:'scatter',name:'MA20',x:dates,y:ma20,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#fbbf24',width:1.5},connectgaps:false},
      {type:'scatter',name:'MA60',x:dates,y:ma60,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#60a5fa',width:1.5},connectgaps:false},
      {type:'scatter',name:'MA200',x:dates,y:ma200,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#a78bfa',width:1.8},connectgaps:false},
      // ── 거래량
      {type:'bar',name:'거래량',x:dates,y:vols,xaxis:'x',yaxis:'y2',
       marker:{color:volColors},showlegend:false},
      // ── RSI
      {type:'scatter',name:'RSI(14)',x:dates,y:rsi14,mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'#a78bfa',width:1.5},connectgaps:false,showlegend:false},
      // RSI 기준선
      {type:'scatter',x:dates,y:Array(dates.length).fill(70),mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'rgba(239,68,68,0.4)',width:1,dash:'dot'},showlegend:false},
      {type:'scatter',x:dates,y:Array(dates.length).fill(30),mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'rgba(34,197,94,0.4)',width:1,dash:'dot'},showlegend:false},

    const layout = {
      paper_bgcolor:'#0f172a', plot_bgcolor:'#0f172a',
      font:{color:'#e2e8f0',size:10},
      title:{text:`${ticker} — 캔들+볼린저밴드+MA7/20/60/200 | 거래량 | RSI(14)`,font:{size:12,color:'#60a5fa'},x:0.01},

// ─── Google Gemini API ────────────────────────────────────────────────────────
// 우선순위: Cloudflare Worker 프록시 > DEPLOY_KEY(직접) > 사용자 키(직접)
async function callGemini(model, parts, userApiKey) {
  const body = {
    model,  // Worker에서 추출, Gemini URL에 사용
    contents: [{parts}],
    generationConfig: {temperature: 0.7, maxOutputTokens: 2048},
  };

  let resp;
  if(PROXY_URL) {
    // [방법 A] Cloudflare Worker 프록시 — API 키가 HTML에 없음
    resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify(body),
    });
  } else {
    // [방법 B] 브라우저 직접 호출 — DEPLOY_KEY 또는 사용자 키 사용
    const key = DEPLOY_KEY || userApiKey;
    if(!key) throw new Error('Google API 키가 없습니다. 우측 상단 ⚙️ 에서 입력해주세요.\n발급: aistudio.google.com/apikey');
    const url = `${GEMINI_BASE}/${model}:generateContent?key=${encodeURIComponent(key)}`;
    resp = await fetch(url, {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({contents: body.contents, generationConfig: body.generationConfig}),
    });
  }

  if(!resp.ok) {
    const e = await resp.json().catch(()=>({}));
    const msg = e?.error?.message || e?.error || `Gemini error ${resp.status}`;
    throw new Error(msg);
  }
  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text) throw new Error('Gemini 응답이 비어있습니다.');
  return text;
}

  const text = await callGemini(GEMINI_REPORT_MODEL, [{text: prompt}], apiKey);
  try {
    const m = text.match(/\{[\s\S]*\}/);
    return m ? JSON.parse(m[0]) : {summary: text, position:'hold', confidence:50};
  } catch { return {summary: text, position:'hold', confidence:50}; }
}

// ─── Full Analysis Pipeline ───────────────────────────────────────────────────
async function analyzeFull(query, apiKey, onStep, mode='auto') {
  const steps = ['ticker','data','chart','vision','report'];
  let stepIdx = 0;
  const step = (s) => { stepIdx=steps.indexOf(s); onStep&&onStep(s,stepIdx); };

  step('ticker');
  // For crypto mode, resolve coin ID dynamically via CoinGecko search
  let ticker, type;
  if (mode === 'crypto') {
    const coinId = await searchCoinId(query);
    ticker = coinId;
    type = 'crypto';
  } else {
    ({ticker, type} = resolveTicker(query, mode));
  }

  step('data');
  let ohlcv, price;
  try {
    ohlcv = await fetchOHLCV(query, '6mo', mode);
    if(!ohlcv || ohlcv.length < 10) throw new Error('데이터 부족');
    price = ohlcv[ohlcv.length-1]?.close;
  } catch(e) {
    // 데이터 수집 실패 → 텍스트 분석으로 폴백
    onStep&&onStep('fallback', -1);
    const r = await analyzeDirectly(query, apiKey);
    r._dataError = `가격 데이터 수집 실패 (${e.message}). 텍스트 기반 분석으로 대체합니다.`;
    return r;
  }

  step('chart');
  let chartB64 = null;
  try {
    chartB64 = await generateChartImage(ohlcv, ticker);
  } catch(e) { console.error('차트 생성 실패:', e); }

  step('vision');
  let visionText = '';
  if(chartB64) {
    try {
      visionText = await callGeminiVision(chartB64, 'image/png', apiKey);
    } catch(e) { console.error('Vision 분석 실패:', e); }
  }
  if(!visionText) {
    // 차트 없이 수치 데이터로 분석
    const recent = ohlcv.slice(-30);
    const closes = recent.map(d=>d.close);
    const ma20v  = movingAverage(closes,Math.min(20,closes.length));
    const rsi14v = rsi(closes,Math.min(14,closes.length-1));
    const lastRsi= rsi14v.reduce((a,v)=>v!=null?v:a, null);
    visionText = `종목: ${ticker}, 현재가: ${price}, 최근30일 종가: ${closes.slice(-10).map(v=>v?.toFixed(2)).join(', ')}, MA20: ${ma20v[ma20v.length-1]?.toFixed(2)||'N/A'}, RSI(14): ${lastRsi?.toFixed(1)||'N/A'}`;
  }

  // Compute technical indicators from OHLCV
  const computed = computeTechIndicators(ohlcv);

  step('report');
  const report = await callGeminiReport(visionText, ticker, price, apiKey, computed);
  report.ticker    = report.ticker || ticker;
  report.price     = report.price  || price;
  report.chartB64  = chartB64;
  report.visionText = visionText;
  report.computed  = computed;

  return report;
}

// ─── Backtest ─────────────────────────────────────────────────────────────────
function runBacktest(ohlcv, ticker) {
  const closes = ohlcv.map(d=>d.close);
  const opens  = ohlcv.map(d=>d.open);
  const dates  = ohlcv.map(d=>d.date);
  const ma20   = movingAverage(closes,20);
  const ma60   = movingAverage(closes,60);

  const trades = [];
  let position = null; // {type:'long', entryPrice, entryDate, entryIdx}

  for(let i=61; i<closes.length-1; i++) {
    const prevM20=ma20[i-1], prevM60=ma60[i-1];
    const curM20=ma20[i],   curM60=ma60[i];
    if(!prevM20||!prevM60||!curM20||!curM60) continue;

    // Golden cross
    if(prevM20<=prevM60 && curM20>curM60 && !position) {
      position = {type:'long', entryPrice:opens[i+1], entryDate:dates[i+1], entryIdx:i+1};
    }
    // Dead cross
    else if(prevM20>=prevM60 && curM20<curM60 && position) {
      const exitPrice = opens[i+1];
      const ret = (exitPrice - position.entryPrice)/position.entryPrice * 100;
      trades.push({
        type:'long', entryDate:position.entryDate, exitDate:dates[i+1],
        entryPrice:position.entryPrice, exitPrice, return_pct:ret,
      });
      position = null;
    }
  }
  // Close open position
  if(position && closes.length>0) {
    const exitPrice = closes[closes.length-1];
    const ret = (exitPrice - position.entryPrice)/position.entryPrice * 100;
    trades.push({
      type:'long', entryDate:position.entryDate, exitDate:dates[dates.length-1],
      entryPrice:position.entryPrice, exitPrice, return_pct:ret, open:true,
    });
  }

  const wins = trades.filter(t=>t.return_pct>0);
  const losses = trades.filter(t=>t.return_pct<=0);
  const winRate = trades.length>0 ? wins.length/trades.length*100 : 0;
  const avgWin  = wins.length>0   ? wins.reduce((a,t)=>a+t.return_pct,0)/wins.length : 0;
  const avgLoss = losses.length>0 ? losses.reduce((a,t)=>a+t.return_pct,0)/losses.length : 0;
  const totalReturn = trades.reduce((a,t)=>a*(1+t.return_pct/100),1)*100-100;
  const buyHold = closes.length>0 ? (closes[closes.length-1]-closes[0])/closes[0]*100 : 0;

  return {
    ticker, totalTrades:trades.length, winRate,
    totalReturn, buyHold, excessReturn:totalReturn-buyHold,
    avgWin, avgLoss, trades:trades.slice(-20),
  };
}

async function getPortfolioWithPrices(portfolio) {
  return Promise.all(portfolio.map(async item => {
    let price = null;
    try { price = await fetchCurrentPrice(item.ticker); } catch {}
    const currentValue = price ? price * item.shares : null;
    const pnl = currentValue ? currentValue - item.avgCost*item.shares : null;
    const pnlPct = pnl ? pnl/(item.avgCost*item.shares)*100 : null;
    return {...item, currentPrice:price, currentValue, pnl, pnlPct};
  }));
}

async function computeCorrelationMatrix(portfolio) {
  // Fetch price series for all items
  const series = await Promise.all(portfolio.map(async item => {
    try {
      const ohlcv = await fetchOHLCV(item.ticker, '6mo');
      return {ticker:item.ticker, prices: ohlcv.map(d=>d.close)};
    } catch { return {ticker:item.ticker, prices:[]}; }
  }));

  const n = series.length;
  const matrix = Array(n).fill(null).map(()=>Array(n).fill(0));
  for(let i=0;i<n;i++) {
    for(let j=0;j<n;j++) {
      if(i===j) { matrix[i][j]=1; continue; }
      const ri = pctReturns(series[i].prices);
      const rj = pctReturns(series[j].prices);
      matrix[i][j] = pearsonCorrelation(ri, rj);
    }
  }
  return {labels: series.map(s=>s.ticker), matrix};
}

function SearchAutocomplete({value, onChange, onSearch, placeholder}) {
  const [open, setOpen] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const ref = useRef(null);

  useEffect(()=>{
    const handle = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handle);
    return ()=>document.removeEventListener('mousedown', handle);
  },[]);

  const handleChange = v => {
    onChange(v);
    if(v.length>0) {
      const f = SUGGESTIONS.filter(s=>
        s.q.toLowerCase().includes(v.toLowerCase()) ||
        s.label.toLowerCase().includes(v.toLowerCase())
      );
      setFiltered(f); setOpen(f.length>0);
    } else { setOpen(false); }
  };

  const select = s => { onChange(s.q); setOpen(false); onSearch&&onSearch(s.q); };

  return (
    <div className="search-wrap" ref={ref}>
      <input value={value} onChange={e=>handleChange(e.target.value)}
        placeholder={placeholder||'종목명 / 티커 (예: AAPL, 삼성, BTC)'}
        onKeyDown={e=>{if(e.key==='Enter'){setOpen(false);onSearch&&onSearch(value);}}}
        onFocus={()=>{if(filtered.length>0&&value) setOpen(true);}}/>
      {open && (
        <div className="search-suggestions">
          {filtered.map(s=>(
            <div key={s.q} className="suggestion-item" onClick={()=>select(s)}>
              <span>{s.label}</span>
              <span className={`badge ${s.type==='crypto'?'badge-yellow':'badge-blue'}`}>{s.q}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ImageDropzone({onImage}) {
  const [drag, setDrag] = useState(false);
  const [preview, setPreview] = useState(null);
  const inputRef = useRef();

  const processFile = file => {
    if(!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const result = e.target.result;
      setPreview(result);
      // Extract base64 and media type
      const [header, data] = result.split(',');
      const mediaType = header.match(/data:([^;]+)/)[1];
      onImage(data, mediaType);
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <div
        className={`drop-zone ${drag?'active':''}`}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
        onClick={()=>inputRef.current.click()}
      >
        📊 차트 이미지를 드래그하거나 클릭하여 업로드
        <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}}
          onChange={e=>processFile(e.target.files[0])}/>
      </div>
      {preview && <img src={preview} className="img-preview" alt="preview"/>}
    </div>
  );
}

function TradingViewWidget({ticker}) {
  const ref = useRef();
  useEffect(()=>{
    if(!ref.current) return;
    ref.current.innerHTML='';
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
      autosize:true,
      symbol: ticker.includes('.')?`KRX:${ticker.replace('.KS','')}`:ticker.includes('-')?`BINANCE:${ticker.toUpperCase()}USDT`:ticker,
      interval:'D', timezone:'Asia/Seoul', theme:'dark',
      style:'1', locale:'kr', enable_publishing:false,
      allow_symbol_change:true, calendar:false,
    });
    ref.current.appendChild(script);
  },[ticker]);
  return <div className="tv-widget" ref={ref}/>;
}

function AnalysisTab({apiKey, settings, serverHasKey}) {
  const [query, setQuery]   = useState('');
  const [mode, setMode]     = useState('auto'); // 'auto' | 'stock' | 'crypto'
  const [loading, setLoading] = useState(false);
  const [step, setStep]     = useState('');
  const [report, setReport] = useState(null);
  const [error, setError]   = useState('');
  const [imgB64, setImgB64] = useState(null);
  const [imgType, setImgType] = useState(null);
  const [logs, setLogs]     = useState(()=>ls_get('cs_logs',[]));

  const saveLog = r => {
    const entry = {date:new Date().toISOString(), ticker:r.ticker, position:r.position, confidence:r.confidence, summary:r.summary?.slice(0,200)};
    const updated = [...ls_get('cs_logs',[]), entry].slice(-200);
    ls_set('cs_logs', updated);
    setLogs(updated);
  };

  const checkReady = () => {
    if(!serverHasKey && !apiKey) {
      setError('API 키가 필요합니다. 우측 상단 ⚙️ 에서 설정해주세요.');
      return false;
    }
    return true;
  };

  const handleAnalyze = async (q, forceMode) => {
    const target = q || query;
    if(!target.trim()) return;
    if(!checkReady()) return;
    const effectiveMode = forceMode || mode;
    setLoading(true); setError(''); setReport(null);
    try {
      const r = await analyzeFull(target, apiKey, (s)=>setStep(s), effectiveMode);
      setReport(r);
      saveLog(r);
      if(settings.autoAlert && r.confidence>=settings.alertThreshold) {
        if(settings.telegramToken) sendTelegramAlert(r, settings).catch(()=>{});
        if(settings.discordWebhook) sendDiscordAlert(r, settings).catch(()=>{});
      }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); setStep(''); }
  };

  const handleImageAnalyze = async () => {
    if(!imgB64) return;
    if(!checkReady()) return;
    setLoading(true); setError(''); setReport(null);
    try {
      const vision = await callClaudeVision(imgB64, imgType||'image/png', apiKey);
      const r = await callClaudeReport(vision, query||'업로드 이미지', null, apiKey);
      r.chartB64 = (imgType==='image/png'||!imgType) ? imgB64 : null;
      r.visionText = vision;
      setReport(r);
      saveLog(r);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // Quick ticker sets per mode
  const stockTickers = [{label:'AAPL',val:'AAPL'},{label:'TSLA',val:'TSLA'},{label:'NVDA',val:'NVDA'},{label:'MSFT',val:'MSFT'},{label:'삼성',val:'005930.KS'}];
  const cryptoTickers = [{label:'BTC',val:'BTC'},{label:'ETH',val:'ETH'},{label:'SOL',val:'SOL'},{label:'XRP',val:'XRP'},{label:'BNB',val:'BNB'},{label:'ADA',val:'ADA'},{label:'DOGE',val:'DOGE'},{label:'TON',val:'TON'}];
  const autoTickers = QUICK_TICKERS;
  const quickList = mode==='stock' ? stockTickers : mode==='crypto' ? cryptoTickers : autoTickers;

  return (
    <div>
      <div className="card">
        <div className="card-title">📊 종목 분석</div>

        {/* 모드 선택 */}
        <ModeSelector mode={mode} onChange={m=>{setMode(m);setError('');}}/>

        {/* 빠른 선택 티커 */}
        <div className="quick-tickers">
          {quickList.map(t=>(
            <div key={t.val} className="quick-ticker"
              onClick={()=>{setQuery(t.val);handleAnalyze(t.val, mode);}}>
              {t.label}
            </div>
          ))}
        </div>
        <div className="analyze-box">
          <SearchAutocomplete value={query} onChange={setQuery} onSearch={q=>handleAnalyze(q, mode)}
            placeholder={mode==='stock'?'주식 티커 (예: AAPL, 005930.KS)':mode==='crypto'?'코인명/심볼 (예: bitcoin, edgex, sol)':'종목명 / 티커 (예: AAPL, 삼성, BTC)'}/>
          <button className="btn-primary" onClick={()=>handleAnalyze()} disabled={loading||!query.trim()}>분석</button>
        </div>

        {/* 이미지 업로드 영역 (항상 노출) */}
        <div style={{borderTop:'1px solid #334155',paddingTop:16,marginTop:4}}>
          <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:8}}>📷 차트 이미지 직접 분석</div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="종목명 (선택 입력)" style={{marginBottom:8}}/>
          <ImageDropzone onImage={(b64,type)=>{setImgB64(b64);setImgType(type);}}/>
          {imgB64 && (
            <button className="btn-primary" style={{marginTop:10,width:'100%'}} onClick={handleImageAnalyze} disabled={loading}>
              이미지 분석 실행
            </button>
          )}
        </div>

        {error && <div className="alert-box alert-err" style={{marginTop:12}}>{error}</div>}
      </div>

      {loading && <div className="card"><Loader steps={[]} currentStep={step}/></div>}

      {report && !loading && <ReportCard report={report} onSave={()=>{}}/>}

      {report?.ticker && !loading && (
        <div className="card">
          <div className="card-title">📺 TradingView 차트</div>
          <TradingViewWidget ticker={report.ticker}/>

        <div className="card">

                ))}

          </div>
        </div>
      )}
    </div>
  );

function CompareTab({apiKey, serverHasKey}) {
  const [tickers, setTickers] = useState(['AAPL','NVDA']);
  const [input, setInput]     = useState('');
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [error, setError]     = useState('');

  const addTicker = () => {
    if(input.trim() && !tickers.includes(input.trim().toUpperCase())) {
      setTickers(prev=>[...prev, input.trim().toUpperCase()]);
      setInput('');
    }
  };

  const removeTicker = t => setTickers(prev=>prev.filter(x=>x!==t));

  const runCompare = async () => {
    if(!serverHasKey && !apiKey) { setError('API 키가 필요합니다.'); return; }
    if(tickers.length<2) { setError('최소 2개 종목이 필요합니다.'); return; }
    setLoading(true); setError(''); setResults([]);
    try {
      const rs = await Promise.all(tickers.map(t=>
        analyzeFull(t, apiKey, ()=>{}).catch(e=>({ticker:t,error:e.message,position:'hold',confidence:0}))
      ));
      setResults(rs);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">⚖ 종목 비교 분석</div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          {tickers.map(t=>(
            <span key={t} style={{display:'flex',alignItems:'center',gap:4,background:'#0f172a',border:'1px solid #334155',borderRadius:6,padding:'4px 10px',fontSize:'.85rem'}}>
              {t}
              <span style={{cursor:'pointer',color:'#f87171',marginLeft:4}} onClick={()=>removeTicker(t)}>×</span>
            </span>
          ))}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input value={input} onChange={e=>setInput(e.target.value)} placeholder="종목 추가 (예: TSLA)"
            onKeyDown={e=>e.key==='Enter'&&addTicker()} style={{flex:1}}/>
          <button className="btn-secondary" onClick={addTicker}>추가</button>
          <button className="btn-primary" onClick={runCompare} disabled={loading||tickers.length<2}>비교 분석</button>
        </div>
        {error && <div className="alert-box alert-err">{error}</div>}
      </div>

      {loading && (
        <div className="card"><div className="loader"><div className="spinner"/><p style={{color:'#64748b',marginTop:12}}>{tickers.length}개 종목 분석 중...</p></div></div>
      )}

      {results.length>0 && (
        <>
          <div className="card">
            <div className="card-title">📊 비교 요약</div>
            <table>
              <thead><tr><th>종목</th><th>포지션</th><th>신뢰도</th><th>현재가</th><th>목표가</th><th>리스크</th></tr></thead>
              <tbody>
                {results.map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:700,color:'#60a5fa'}}>{r.ticker}</td>
                    <td><span className={`badge ${r.position==='long'?'badge-green':r.position==='short'?'badge-red':'badge-yellow'}`}>{r.position||'hold'}</span></td>
                    <td>{r.confidence||0}%</td>
                    <td>{r.price?`$${r.price.toLocaleString()}`:'-'}</td>
                    <td>{r.target_price?`$${r.target_price.toLocaleString()}`:'-'}</td>
                    <td><span className={`badge ${r.risk_level==='low'?'badge-green':r.risk_level==='high'?'badge-red':'badge-yellow'}`}>{r.risk_level||'-'}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {results.map((r,i)=>(
            <div key={i}>
              {r.error ? (
                <div className="card"><div className="alert-box alert-err"><b>{r.ticker}</b>: {r.error}</div></div>
              ) : (
                <ReportCard report={r}/>
              )}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

function PerformanceTab({apiKey, serverHasKey}) {
  const [logs, setLogs]   = useState(()=>ls_get('cs_logs',[]));
  const [evalResult, setEvalResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const stats = useMemo(()=>{
    if(!logs.length) return null;
    const total = logs.length;
    const byPos = logs.reduce((a,l)=>{a[l.position]=(a[l.position]||0)+1;return a;},{});
    const avgConf = logs.reduce((a,l)=>a+(l.confidence||50),0)/total;
    const recent = [...logs].reverse().slice(0,10);
    return {total, byPos, avgConf: avgConf.toFixed(1), recent};
  },[logs]);

  const autoEvaluate = async () => {
    if(!serverHasKey && !apiKey) return;
    if(logs.length<5) { alert('분석 기록이 5개 이상 필요합니다.'); return; }
    setLoading(true);
    try {
      const sample = [...logs].reverse().slice(0,20);
      const summary = sample.map(l=>`${l.date?.slice(0,10)} ${l.ticker} ${l.position} ${l.confidence}%`).join('\n');
      const text = await callGemini(GEMINI_REPORT_MODEL, [{
        text: `다음은 AI 차트 분석 시스템의 최근 분석 기록입니다:\n\n${summary}\n\n이 분석 패턴을 평가해주세요: 편향성, 신뢰도 분포, 포지션 분포의 적절성, 개선 제안 등을 한국어로 분석해주세요.`,
      }], apiKey);
      setEvalResult(text);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="card">
        <div className="card-title" style={{justifyContent:'space-between'}}>
          <span>📈 성과 분석</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-secondary" style={{padding:'6px 12px',fontSize:'.8rem'}} onClick={autoEvaluate} disabled={loading}>AI 평가</button>
            <button className="btn-danger"    style={{padding:'6px 12px',fontSize:'.8rem'}} onClick={()=>{ls_set('cs_logs',[]);setLogs([]);setEvalResult(null);}}>초기화</button>
          </div>
        </div>
        {!stats ? (
          <div className="no-data">분석 기록이 없습니다.<br/>📊 분석 탭에서 종목을 분석해보세요.</div>
        ) : (
          <>
            <div className="grid-3" style={{marginBottom:16}}>
              <div className="stat-card"><div className="stat-value">{stats.total}</div><div className="stat-label">총 분석</div></div>
              <div className="stat-card"><div className="stat-value">{stats.avgConf}%</div><div className="stat-label">평균 신뢰도</div></div>
              <div className="stat-card"><div className="stat-value">{stats.byPos.long||0}</div><div className="stat-label">롱 신호</div></div>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
              {Object.entries(stats.byPos).map(([pos,cnt])=>(
                <div key={pos} className="stat-card" style={{flex:1,minWidth:80}}>
                  <div className={`stat-value pos-${pos}`}>{cnt}</div>
                  <div className="stat-label">{pos}</div>
                </div>
              ))}
            </div>
            <table>

                    <td><span className={`badge ${l.position==='long'?'badge-green':l.position==='short'?'badge-red':'badge-yellow'}`}>{l.position}</span></td>
                    <td>{l.confidence}%</td>

                ))}

            </table>

      </div>
      {loading && <div className="card"><div className="loader"><div className="spinner"/></div></div>}

        <div className="card">
          <div className="card-title">🤖 AI 성과 평가</div>
          <div className="report-pre">{evalResult}</div>
        </div>
      )}
    </div>
  );
}

// ─── Backtest Tab ─────────────────────────────────────────────────────────────
function BacktestTab() {
  const [query, setQuery]   = useState('AAPL');
  const [period, setPeriod] = useState('6mo');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError]   = useState('');
  const chartRef = useRef();

  const runTest = async () => {
    setLoading(true); setError(''); setResult(null);
    try {
      const ohlcv = await fetchOHLCV(query, period);
      const {ticker} = resolveTicker(query);
      const res = runBacktest(ohlcv, ticker);
      setResult(res);

      // Draw equity curve
      if(chartRef.current) {
        const closes = ohlcv.map(d=>d.close);
        const dates  = ohlcv.map(d=>d.date);
        const ma20   = movingAverage(closes,20);
        const ma60   = movingAverage(closes,60);

        const signals = {buy:[], sell:[], buyDates:[], sellDates:[]};
        for(let i=1;i<closes.length-1;i++) {
          if(!ma20[i-1]||!ma60[i-1]||!ma20[i]||!ma60[i]) continue;
          if(ma20[i-1]<=ma60[i-1] && ma20[i]>ma60[i]) { signals.buy.push(closes[i]); signals.buyDates.push(dates[i]); }
          if(ma20[i-1]>=ma60[i-1] && ma20[i]<ma60[i]) { signals.sell.push(closes[i]); signals.sellDates.push(dates[i]); }
        }

        const layout = {
          paper_bgcolor:'#0f172a',plot_bgcolor:'#0f172a',
          font:{color:'#e2e8f0'},
          title:{text:`${ticker} - MA20/MA60 크로스오버 백테스트`,font:{size:13,color:'#60a5fa'}},
          xaxis:{gridcolor:'#1e293b'},yaxis:{gridcolor:'#1e293b'},
          legend:{bgcolor:'transparent'},margin:{l:50,r:20,t:50,b:40},
        };
        Plotly.react(chartRef.current, [
          {type:'scatter',name:'가격',x:dates,y:closes,mode:'lines',line:{color:'#60a5fa',width:1.5}},
          {type:'scatter',name:'MA20',x:dates,y:ma20,mode:'lines',line:{color:'#fbbf24',width:1.5},connectgaps:false},
          {type:'scatter',name:'MA60',x:dates,y:ma60,mode:'lines',line:{color:'#a78bfa',width:1.5},connectgaps:false},
          {type:'scatter',name:'매수',x:signals.buyDates,y:signals.buy,mode:'markers',marker:{symbol:'triangle-up',size:12,color:'#22c55e'}},
          {type:'scatter',name:'매도',x:signals.sellDates,y:signals.sell,mode:'markers',marker:{symbol:'triangle-down',size:12,color:'#ef4444'}},
        ], layout, {responsive:true});
      }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const fmtPct = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
  const fmtColor = v => v>=0?'#34d399':'#f87171';

  return (
    <div>
      <div className="card">
        <div className="card-title">🔬 MA20/MA60 크로스오버 백테스트</div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <SearchAutocomplete value={query} onChange={setQuery} onSearch={v=>setQuery(v)}/>
          <select value={period} onChange={e=>setPeriod(e.target.value)} style={{width:'auto',minWidth:100}}>
            <option value="3mo">3개월</option>
            <option value="6mo">6개월</option>
            <option value="1y">1년</option>
            <option value="2y">2년</option>
            <option value="5y">5년</option>
          </select>
          <button className="btn-primary" onClick={runTest} disabled={loading||!query.trim()}>백테스트</button>
        </div>
        {error && <div className="alert-box alert-err">{error}</div>}
      </div>

      {loading && <div className="card"><div className="loader"><div className="spinner"/><p style={{color:'#64748b',marginTop:12}}>데이터 수집 및 백테스트 실행 중...</p></div></div>}

      {result && !loading && (
        <>
          <div className="card">
            <div className="card-title">📊 백테스트 결과: {result.ticker}</div>
            <div className="grid-3" style={{marginBottom:16}}>
              <div className="stat-card"><div className="stat-value">{result.totalTrades}</div><div className="stat-label">총 거래</div></div>
              <div className="stat-card"><div className="stat-value" style={{color:fmtColor(result.winRate-50)}}>{result.winRate.toFixed(1)}%</div><div className="stat-label">승률</div></div>
              <div className="stat-card"><div className="stat-value" style={{color:fmtColor(result.totalReturn)}}>{fmtPct(result.totalReturn)}</div><div className="stat-label">전략 수익</div></div>
              <div className="stat-card"><div className="stat-value" style={{color:fmtColor(result.buyHold)}}>{fmtPct(result.buyHold)}</div><div className="stat-label">단순보유 수익</div></div>
              <div className="stat-card"><div className="stat-value" style={{color:fmtColor(result.excessReturn)}}>{fmtPct(result.excessReturn)}</div><div className="stat-label">초과 수익</div></div>
              <div className="stat-card"><div className="stat-value" style={{color:'#34d399'}}>{fmtPct(result.avgWin)}</div><div className="stat-label">평균 이익</div></div>
            </div>
          </div>
          <div className="card" style={{padding:'16px 12px'}}>
            <div ref={chartRef} style={{height:350}}/>
          </div>
          {result.trades.length>0 && (
            <div className="card">
              <div className="card-title">최근 거래 내역</div>
              <table>
                <thead><tr><th>매수일</th><th>매도일</th><th>매수가</th><th>매도가</th><th>수익률</th><th>상태</th></tr></thead>
                <tbody>
                  {[...result.trades].reverse().map((t,i)=>(
                    <tr key={i}>
                      <td style={{fontSize:'.8rem'}}>{t.entryDate}</td>
                      <td style={{fontSize:'.8rem'}}>{t.exitDate}</td>
                      <td>${t.entryPrice?.toFixed(2)}</td>
                      <td>${t.exitPrice?.toFixed(2)}</td>
                      <td style={{color:fmtColor(t.return_pct),fontWeight:700}}>{fmtPct(t.return_pct)}</td>
                      <td>{t.open?<span className="badge badge-yellow">보유중</span>:<span className="badge badge-gray">종료</span>}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Portfolio Tab ────────────────────────────────────────────────────────────
function PortfolioTab() {
  const [portfolio, setPortfolio] = useState(()=>loadPortfolio());
  const [withPrices, setWithPrices] = useState([]);
  const [loading, setLoading]       = useState(false);
  const [corrData, setCorrData]     = useState(null);
  const [corrLoading, setCorrLoading] = useState(false);
  const [form, setForm] = useState({ticker:'',shares:'',avgCost:''});
  const [formErr, setFormErr] = useState('');
  const [tab, setTab]    = useState('holdings');

  const refreshPrices = async (p) => {
    setLoading(true);
    try {
      const updated = await getPortfolioWithPrices(p||portfolio);
      setWithPrices(updated);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ if(portfolio.length) refreshPrices(portfolio); },[]);

  const addItem = () => {
    if(!form.ticker||!form.shares||!form.avgCost){setFormErr('모든 필드를 입력해주세요.');return;}
    const item = {id:Date.now(), ticker:form.ticker.trim().toUpperCase(), shares:parseFloat(form.shares), avgCost:parseFloat(form.avgCost)};
    const next = [...portfolio, item];
    setPortfolio(next); savePortfolio(next);
    setForm({ticker:'',shares:'',avgCost:''}); setFormErr('');
    refreshPrices(next);
  };

  const removeItem = id => {
    const next = portfolio.filter(p=>p.id!==id);
    setPortfolio(next); savePortfolio(next);
    setWithPrices(prev=>prev.filter(p=>p.id!==id));
  };

  const totalValue  = withPrices.reduce((a,p)=>a+(p.currentValue||0),0);
  const totalCost   = portfolio.reduce((a,p)=>a+p.avgCost*p.shares,0);
  const totalPnl    = totalValue - totalCost;
  const totalPnlPct = totalCost>0 ? totalPnl/totalCost*100 : 0;

  const computeCorr = async () => {
    if(portfolio.length<2){alert('최소 2개 종목이 필요합니다.');return;}
    setCorrLoading(true);
    try { const r = await computeCorrelationMatrix(portfolio); setCorrData(r); }
    catch(e) { alert('상관관계 계산 실패: '+e.message); }
    finally { setCorrLoading(false); }
  };

  const corrColor = v => {
    const r = Math.round(255*(v>0?0:Math.abs(v)));
    const g = Math.round(255*(v>0?v:0));
    return `rgba(${r},${g},60,${Math.abs(v)*0.8+0.2})`;
  };

  return (
    <div>
      <div className="card">
        <div className="card-title">🏦 포트폴리오 관리</div>
        <div className="tabs-inner">
          {[['holdings','보유 종목'],['add','종목 추가'],['correlation','상관관계']].map(([k,l])=>(
            <button key={k} className={`tab-inner-btn ${tab===k?'active':''}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </div>

        {tab==='holdings' && (
          <>
            {loading && <div style={{textAlign:'center',padding:20,color:'#64748b'}}>가격 업데이트 중...</div>}
            {portfolio.length===0 ? (
              <div className="no-data">포트폴리오가 비어있습니다.<br/>종목 추가 탭에서 추가해보세요.</div>
            ) : (
              <>
                <div className="grid-3" style={{marginBottom:16}}>
                  <div className="stat-card"><div className="stat-value">${totalValue.toLocaleString(undefined,{maximumFractionDigits:0})}</div><div className="stat-label">총 평가금액</div></div>
                  <div className="stat-card"><div className="stat-value" style={{color:totalPnl>=0?'#34d399':'#f87171'}}>{totalPnl>=0?'+':''}{totalPnlPct.toFixed(2)}%</div><div className="stat-label">총 손익률</div></div>
                  <div className="stat-card"><div className="stat-value">{portfolio.length}</div><div className="stat-label">보유 종목</div></div>
                </div>
                <table>
                  <thead><tr><th>종목</th><th>수량</th><th>평균단가</th><th>현재가</th><th>손익</th><th>손익률</th><th></th></tr></thead>
                  <tbody>
                    {withPrices.map(p=>(
                      <tr key={p.id}>
                        <td style={{fontWeight:700,color:'#60a5fa'}}>{p.ticker}</td>
                        <td>{p.shares}</td>
                        <td>${p.avgCost?.toLocaleString()}</td>
                        <td>{p.currentPrice?`$${p.currentPrice.toLocaleString(undefined,{maximumFractionDigits:2})}`:'-'}</td>
                        <td style={{color:p.pnl>=0?'#34d399':'#f87171'}}>{p.pnl!=null?`${p.pnl>=0?'+':''}$${Math.abs(p.pnl).toFixed(0)}`:'-'}</td>
                        <td><span className={`badge ${(p.pnlPct||0)>=0?'badge-green':'badge-red'}`}>{p.pnlPct!=null?`${p.pnlPct>=0?'+':''}${p.pnlPct.toFixed(2)}%`:'-'}</span></td>
                        <td><button className="btn-danger" style={{padding:'2px 8px',fontSize:'.75rem'}} onClick={()=>removeItem(p.id)}>삭제</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <button className="btn-secondary" style={{marginTop:12,padding:'6px 14px',fontSize:'.85rem'}} onClick={()=>refreshPrices()}>🔄 가격 새로고침</button>
              </>
            )}
          </>
        )}

        {tab==='add' && (
          <div style={{maxWidth:400}}>
            <div className="settings-group">
              <label>티커</label>
              <input value={form.ticker} onChange={e=>setForm(f=>({...f,ticker:e.target.value}))} placeholder="예: AAPL, 005930.KS, BTC"/>
            </div>
            <div className="settings-group">
              <label>수량</label>
              <input type="number" value={form.shares} onChange={e=>setForm(f=>({...f,shares:e.target.value}))} placeholder="예: 10"/>
            </div>
            <div className="settings-group">
              <label>평균 매입단가 (USD)</label>
              <input type="number" value={form.avgCost} onChange={e=>setForm(f=>({...f,avgCost:e.target.value}))} placeholder="예: 150.00"/>
            </div>
            {formErr && <div className="alert-box alert-err">{formErr}</div>}
            <button className="btn-primary" onClick={addItem}>종목 추가</button>
          </div>
        )}

        {tab==='correlation' && (
          <>
            <button className="btn-primary" onClick={computeCorr} disabled={corrLoading||portfolio.length<2} style={{marginBottom:16}}>
              {corrLoading?'계산 중...':'상관관계 분석'}
            </button>
            {corrData && (
              <div className="correlation-grid">
                <table className="corr-table">
                  <thead>
                    <tr><th></th>{corrData.labels.map(l=><th key={l} style={{color:'#94a3b8',padding:'6px 8px'}}>{l}</th>)}</tr>
                  </thead>
                  <tbody>
                    {corrData.matrix.map((row,i)=>(
                      <tr key={i}>
                        <td style={{color:'#94a3b8',padding:'6px 8px',fontWeight:700}}>{corrData.labels[i]}</td>
                        {row.map((v,j)=>(
                          <td key={j} className="corr-cell" style={{background:corrColor(v),color:'#fff'}}>
                            {v.toFixed(2)}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
                <p style={{fontSize:'.75rem',color:'#64748b',marginTop:8}}>
                  녹색: 양의 상관관계 / 적색: 음의 상관관계 / 백색: 무상관
                </p>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── Monitor Tab ──────────────────────────────────────────────────────────────
function MonitorTab({apiKey, settings, serverHasKey}) {
  const [watchlist, setWatchlist] = useState(()=>loadWatchlist());
  const [prices, setPrices]       = useState({});
  const [input, setInput]         = useState('');
  const [running, setRunning]     = useState(false);
  const [alerts, setAlerts]       = useState([]);
  const intervalRef = useRef(null);

  const addTicker = () => {
    if(!input.trim()) return;
    const t = input.trim().toUpperCase();
    if(!watchlist.includes(t)) {
      const next = [...watchlist, t];
      setWatchlist(next); saveWatchlist(next);
    }
    setInput('');
  };

  const removeTicker = t => {
    const next = watchlist.filter(x=>x!==t);
    setWatchlist(next); saveWatchlist(next);
  };

  const fetchAllPrices = async () => {
    const updates = {};
    await Promise.all(watchlist.map(async t => {
      try {
        const p = await fetchCurrentPrice(t);
        if(p) updates[t] = p;
      } catch {}
    }));
    setPrices(prev => {
      // Check price alerts
      const newAlerts = [];
      Object.entries(updates).forEach(([t,p]) => {
        const old = prev[t];
        if(old) {
          const chg = (p-old)/old*100;
          if(Math.abs(chg)>=settings.alertThreshold/10) {
            const alert = {ticker:t, oldPrice:old, newPrice:p, change:chg, time:new Date().toLocaleTimeString()};
            newAlerts.push(alert);
            const report = {ticker:t, price:p, position:chg>0?'long':'short', confidence:70, summary:`${t} 가격 급변: ${chg.toFixed(2)}%`};
            if(settings.telegramToken) sendTelegramAlert(report, settings).catch(()=>{});
            if(settings.discordWebhook) sendDiscordAlert(report, settings).catch(()=>{});
          }
        }
      });
      if(newAlerts.length) setAlerts(prev=>[...newAlerts,...prev].slice(0,50));
      return {...prev, ...updates};
    });
  };

  const startMonitor = () => {
    if(intervalRef.current) return;
    fetchAllPrices();
    const iv = parseInt(settings.monitorInterval||60) * 1000;
    intervalRef.current = setInterval(fetchAllPrices, iv);
    setRunning(true);
  };

  const stopMonitor = () => {
    if(intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current=null; }
    setRunning(false);
  };

  useEffect(()=>()=>{ if(intervalRef.current) clearInterval(intervalRef.current); },[]);

  const priceChange = (t) => {
    // We don't have yesterday's price, just show current
    return null;
  };

  return (
    <div>
      <div className="card">
        <div className="card-title" style={{justifyContent:'space-between'}}>
          <span>👁 모니터링</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:'.8rem',color:running?'#34d399':'#64748b'}}>
              {running?`🟢 모니터링 중 (${settings.monitorInterval}초 간격)`:'⚪ 중지됨'}
            </span>
            {running
              ? <button className="btn-danger" style={{padding:'6px 14px',fontSize:'.85rem'}} onClick={stopMonitor}>중지</button>
              : <button className="btn-success" style={{padding:'6px 14px',fontSize:'.85rem'}} onClick={startMonitor} disabled={!watchlist.length}>시작</button>
            }
          </div>
        </div>

        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input value={input} onChange={e=>setInput(e.target.value)} placeholder="감시 종목 추가 (예: AAPL, BTC)"
            onKeyDown={e=>e.key==='Enter'&&addTicker()} style={{flex:1}}/>
          <button className="btn-secondary" onClick={addTicker}>추가</button>
          <button className="btn-secondary" onClick={fetchAllPrices} disabled={!watchlist.length}>🔄</button>
        </div>

        {watchlist.length===0 ? (
          <div className="no-data">감시 종목을 추가해주세요.</div>
        ) : (
          watchlist.map(t=>(
            <div key={t} className="monitor-item">
              <div style={{display:'flex',align:'center',gap:12}}>
                <span style={{fontWeight:700,color:'#60a5fa'}}>{t}</span>
                {prices[t] && <span style={{color:'#e2e8f0'}}>${prices[t].toLocaleString(undefined,{maximumFractionDigits:4})}</span>}
                {!prices[t] && <span style={{color:'#64748b',fontSize:'.8rem'}}>가격 대기중...</span>}
              </div>
              <button className="btn-danger" style={{padding:'2px 8px',fontSize:'.75rem'}} onClick={()=>removeTicker(t)}>삭제</button>
            </div>
          ))
        )}
      </div>

      {alerts.length>0 && (
        <div className="card">
          <div className="card-title" style={{justifyContent:'space-between'}}>
            <span>🔔 알림 기록</span>
            <button className="btn-secondary" style={{padding:'4px 10px',fontSize:'.75rem'}} onClick={()=>setAlerts([])}>초기화</button>
          </div>
          {alerts.map((a,i)=>(
            <div key={i} className={`alert-box ${a.change>0?'alert-ok':'alert-err'}`} style={{marginBottom:6}}>
              <b>{a.ticker}</b> {a.time} — ${a.oldPrice.toFixed(2)} → ${a.newPrice.toFixed(2)} ({a.change>0?'+':''}{a.change.toFixed(2)}%)
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        <div className="settings-group">
          <label>Telegram Chat ID</label>
          <input value={s.telegramChatId} onChange={e=>set('telegramChatId',e.target.value)} placeholder="-100123456789"/>
        </div>
        <div className="settings-group">
          <label>Discord Webhook URL</label>
          <input value={s.discordWebhook} onChange={e=>set('discordWebhook',e.target.value)} placeholder="https://discord.com/api/webhooks/..."/>
        </div>

        <button className="btn-primary" style={{width:'100%'}} onClick={()=>{saveSettings(s);onSave(s);}}>저장</button>
        <div style={{marginTop:12}}>
          <button className="btn-danger" style={{width:'100%',padding:'8px'}} onClick={()=>{if(confirm('모든 데이터를 초기화하시겠습니까?')){localStorage.clear();window.location.reload();}}}>🗑 전체 데이터 초기화</button>
        </div>
      </div>
    </div>
  );
}

// ─── API Key Modal ────────────────────────────────────────────────────────────
function ApiKeyModal({onSave, onSkip}) {
  const [key, setKey] = useState('');
  return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>🔑 Google AI API 키 설정</h2>
        <p style={{color:'#94a3b8',fontSize:'.9rem',marginBottom:12}}>
          Chart Sentinel은 <b style={{color:'#60a5fa'}}>Google Gemini AI</b>로 차트를 분석합니다.<br/>
          서버 없이 브라우저에서 직접 동작합니다.
        </p>
        <div className="alert-box alert-info" style={{marginBottom:8,fontSize:'.85rem'}}>
          📌 발급 방법: <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:'#93c5fd',fontWeight:700}}>aistudio.google.com/apikey</a> 접속 → "API 키 만들기" 클릭<br/>
          <span style={{opacity:.8}}>무료 티어 제공 · 신용카드 불필요</span>
        </div>
        <div className="alert-box alert-ok" style={{marginBottom:12,fontSize:'.82rem'}}>
          🔒 키는 이 브라우저 localStorage에만 저장됩니다. 외부 서버로 전송되지 않습니다.
        </div>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="AIza..."
          style={{marginBottom:12}} onKeyDown={e=>e.key==='Enter'&&key&&onSave(key)}/>
        <div style={{display:'flex',gap:8}}>
          <button className="btn-primary" style={{flex:1}} onClick={()=>onSave(key)} disabled={!key.trim()}>저장하고 시작</button>
          <button className="btn-secondary" onClick={onSkip}>나중에 설정</button>
        </div>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState('analysis');
  const [settings, setSettings] = useState(loadSettings);
  const [showSettings, setShowSettings] = useState(false);
  const [showApiModal, setShowApiModal] = useState(false);

  useEffect(()=>{
    // 프록시 URL 또는 DEPLOY_KEY 있으면 → 모달 표시 안 함
    if(!PROXY_URL && !DEPLOY_KEY && !loadSettings().apiKey) setShowApiModal(true);
  },[]);

  const handleApiSave = key => {
    const next = {...settings, apiKey:key};
    setSettings(next); saveSettings(next);
    setShowApiModal(false);
  };

  const handleSettingsSave = s => {
    setSettings(s);
    setShowSettings(false);
  };

  // 실제 사용되는 키: DEPLOY_KEY 우선, 없으면 사용자 설정
  const activeKey = DEPLOY_KEY || settings.apiKey;

  const TABS = [
    {id:'analysis',  label:'📊 분석'},
    {id:'compare',   label:'⚖ 비교'},
    {id:'performance',label:'📈 성과'},
    {id:'backtest',  label:'🔬 백테스트'},
    {id:'portfolio', label:'🏦 포트폴리오'},
    {id:'monitor',   label:'👁 모니터'},
  ];

  const statusBadge = PROXY_URL ? (
    <span className="badge badge-green" style={{fontSize:'.75rem'}}>✅ 서비스 준비됨</span>
  ) : DEPLOY_KEY ? (
    <span className="badge badge-green" style={{fontSize:'.75rem'}}>✅ AI 준비됨</span>
  ) : activeKey ? (
    <span className="badge badge-green" style={{fontSize:'.75rem'}}>🔑 Google AI 연결됨</span>
  ) : (
    <span className="badge badge-red" style={{fontSize:'.75rem',cursor:'pointer'}} onClick={()=>setShowApiModal(true)}>API 키 없음 (클릭)</span>
  );

  return (
    <ErrorBoundary>
      <div className="app-header">
        <div>
          <h1>{APP_TITLE}</h1>
          <div className="subtitle">AI 차트 분석 · Google Gemini · 서버 불필요</div>
        </div>
        <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
          {statusBadge}
          {/* 프록시/하드코딩 배포 시엔 설정 버튼 숨김 */}
          {!PROXY_URL && !DEPLOY_KEY && (
            <button className="btn-secondary" style={{padding:'6px 12px',fontSize:'.85rem'}} onClick={()=>setShowSettings(true)}>⚙️</button>
          )}
        </div>
      </div>

      <div className="tabs">
        {TABS.map(t=>(
          <button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>
        ))}
      </div>

      <div className="main-content">
        {tab==='analysis'    && <AnalysisTab    apiKey={activeKey} settings={settings} serverHasKey={false}/>}
        {tab==='compare'     && <CompareTab     apiKey={activeKey} serverHasKey={false}/>}
        {tab==='performance' && <PerformanceTab apiKey={activeKey} serverHasKey={false}/>}
        {tab==='backtest'    && <BacktestTab/>}
        {tab==='portfolio'   && <PortfolioTab/>}
        {tab==='monitor'     && <MonitorTab     apiKey={activeKey} settings={settings} serverHasKey={false}/>}
      </div>

      {showSettings && <SettingsDrawer settings={settings} onSave={handleSettingsSave} onClose={()=>setShowSettings(false)} serverHasKey={false}/>}
      {showApiModal  && <ApiKeyModal onSave={handleApiSave} onSkip={()=>setShowApiModal(false)}/>}
    </ErrorBoundary>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
