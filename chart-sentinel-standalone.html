*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
.app-header{background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid #334155;padding:16px 24px;display:flex;align-items:center;gap:12px}
.app-header h1{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.app-header .subtitle{font-size:.8rem;color:#64748b}
.tabs{display:flex;gap:4px;padding:12px 24px;background:#0f172a;border-bottom:1px solid #1e293b;overflow-x:auto}
.tab-btn{padding:8px 16px;border:none;border-radius:8px;background:transparent;color:#64748b;cursor:pointer;font-size:.85rem;white-space:nowrap;transition:all .2s}
.tab-btn:hover{background:#1e293b;color:#e2e8f0}
.tab-btn.active{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:600}
.main-content{padding:24px;max-width:1400px;margin:0 auto}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:16px}
.card-title{font-size:1rem;font-weight:600;color:#94a3b8;margin-bottom:16px;display:flex;align-items:center;gap:8px}
input,select,textarea{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:10px 14px;font-size:.9rem;width:100%;outline:none;transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:#3b82f6}
button{cursor:pointer;border:none;border-radius:8px;padding:10px 20px;font-size:.9rem;font-weight:600;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn-secondary:hover{background:#475569}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{opacity:.9}
.btn-success{background:#10b981;color:#fff}
.btn-success:hover{opacity:.9}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:700}
.badge-green{background:#064e3b;color:#34d399}
.badge-red{background:#450a0a;color:#f87171}
.badge-yellow{background:#451a03;color:#fbbf24}
.badge-blue{background:#1e3a5f;color:#60a5fa}
.badge-gray{background:#1e293b;color:#94a3b8}
.loader{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px}
.spinner{width:40px;height:40px;border:3px solid #334155;border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:768px){.grid-2,.grid-3{grid-template-columns:1fr}}
.analyze-box{display:flex;gap:8px;margin-bottom:16px}
.analyze-box input{flex:1}
.report-section{margin-top:8px}
.report-section h3{color:#60a5fa;font-size:1rem;margin:12px 0 6px}
.report-pre{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;font-size:.85rem;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.chart-img{width:100%;border-radius:8px;border:1px solid #334155;margin-top:8px}
.stat-card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:16px;text-align:center}
.stat-value{font-size:1.5rem;font-weight:700;color:#60a5fa}
.stat-label{font-size:.8rem;color:#64748b;margin-top:4px}
.pos-long{color:#34d399}
.pos-short{color:#f87171}
.pos-hold{color:#fbbf24}
.pos-none{color:#94a3b8}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:10px 12px;text-align:left;font-size:.8rem;color:#64748b;border-bottom:1px solid #334155}
td{padding:10px 12px;font-size:.85rem;border-bottom:1px solid #1e293b}
tr:hover td{background:#0f172a}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;justify-content:flex-end}
.settings-panel{background:#1e293b;width:360px;height:100%;padding:24px;overflow-y:auto}
.settings-panel h2{font-size:1.2rem;font-weight:700;margin-bottom:20px;color:#e2e8f0}
.settings-group{margin-bottom:20px}
.settings-group label{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:6px}
.form-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.form-row label{font-size:.85rem;color:#e2e8f0;white-space:nowrap;min-width:80px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;width:480px;max-width:90vw}
.modal h2{font-size:1.2rem;font-weight:700;margin-bottom:16px}
.alert-box{padding:12px 16px;border-radius:8px;margin-bottom:12px;font-size:.9rem}
.alert-info{background:#1e3a5f;border:1px solid #2563eb;color:#93c5fd}
.alert-warn{background:#451a03;border:1px solid #d97706;color:#fcd34d}
.alert-err{background:#450a0a;border:1px solid #dc2626;color:#fca5a5}
.alert-ok{background:#064e3b;border:1px solid #059669;color:#6ee7b7}
.drop-zone{border:2px dashed #334155;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;color:#64748b}
.drop-zone:hover,.drop-zone.active{border-color:#3b82f6;background:#1e3a5f20;color:#60a5fa}
.img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:8px}
.quick-tickers{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.quick-ticker{padding:4px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;font-size:.8rem;cursor:pointer;color:#94a3b8;transition:all .2s}
.quick-ticker:hover{border-color:#3b82f6;color:#60a5fa}
.progress-steps{display:flex;flex-direction:column;gap:8px;padding:16px}
.step{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;font-size:.85rem}
.step.done{background:#064e3b20;color:#34d399}
.step.active{background:#1e3a5f;color:#60a5fa}
.step.pending{color:#475569}
.step-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0}
.step.done .step-icon{background:#064e3b;color:#34d399}
.step.active .step-icon{background:#1e3a5f;border:2px solid #3b82f6}
.step.pending .step-icon{background:#1e293b}
.correlation-grid{overflow-x:auto}
.corr-table{border-collapse:collapse;font-size:.75rem}
.corr-cell{width:60px;height:40px;text-align:center;font-weight:600}
.monitor-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;margin-bottom:8px}
.tv-widget{height:300px;border-radius:8px;overflow:hidden;margin-top:8px}

async function searchKrTicker(name) {
  const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(name)}&lang=ko&region=KR&quotesCount=5&newsCount=0&enableFuzzyQuery=true`;
  for (const mkp of [
    u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  ]) {
    try {
      const r = await fetch(mkp(url), {signal: AbortSignal.timeout(5000)});
      if (!r.ok) continue;
      const raw = await r.json();
      const d = raw?.contents ? JSON.parse(raw.contents) : raw;
      const quotes = d?.quotes || [];
      const kr = quotes.find(q => /\.(KS|KQ)$/.test(q.symbol));
      if (kr) return kr.symbol;
    } catch {}
  }
  return null;
}

  catch(e) {

      const logs = ls_get('cs_logs',[]);
      if(logs.length>0){ ls_set('cs_logs', logs.slice(-50)); }
      try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
    }
  }
};

// ─── Math utilities ───────────────────────────────────────────────────────────
function movingAverage(arr, n) {
  return arr.map((_,i) => {
    if(i<n-1) return null;
    const s = arr.slice(i-n+1, i+1).reduce((a,b)=>a+b,0);
    return s/n;
  });
}

function pearsonCorrelation(x, y) {
  const n = Math.min(x.length, y.length);
  if(n<2) return 0;
  const mx = x.slice(0,n).reduce((a,b)=>a+b,0)/n;
  const my = y.slice(0,n).reduce((a,b)=>a+b,0)/n;
  let num=0, dx2=0, dy2=0;
  for(let i=0;i<n;i++){
    const a=x[i]-mx, b=y[i]-my;
    num+=a*b; dx2+=a*a; dy2+=b*b;
  }
  const denom=Math.sqrt(dx2*dy2);
  return denom===0?0:num/denom;
}

function pctReturns(prices) {
  return prices.slice(1).map((p,i)=>(p-prices[i])/prices[i]);
}

// ─── Advanced Indicators ─────────────────────────────────────────────────────
function vwma(ohlcv, n) {
  return ohlcv.map((_, i) => {
    if (i < n - 1) return null;
    const slice = ohlcv.slice(i - n + 1, i + 1);
    const sumPV = slice.reduce((a, d) => a + d.close * (d.volume || 0), 0);
    const sumV  = slice.reduce((a, d) => a + (d.volume || 0), 0);
    return sumV === 0 ? null : sumPV / sumV;
  });
}

function fibRetracements(high, low, current) {
  const ratios = [0.236, 0.382, 0.5, 0.618, 0.786];
  return ratios.map(r => {
    const price = high - (high - low) * r;
    return { level: r, price, pct: (price / current - 1) * 100 };
  });
}

function fibExtensions(low, high, current) {
  const ratios = [1.272, 1.414, 1.618, 2.0, 2.618];
  return ratios.map(r => {
    const price = low + (high - low) * r;
    return { level: r, price, pct: (price / current - 1) * 100 };
  });
}

function roundNumbers(price) {
  if (!price || price <= 0) return [];
  const mag = Math.pow(10, Math.floor(Math.log10(price)));
  const steps = [mag * 0.1, mag * 0.25, mag * 0.5, mag, mag * 2];
  const set = new Set();
  steps.forEach(step => {
    const base = Math.floor(price / step) * step;
    for (let o = -3; o <= 4; o++) {
      const v = Math.round((base + o * step) * 10000) / 10000;
      if (v > 0) set.add(v);
    }
  });
  const sorted = [...set].sort((a, b) => a - b);
  const below = sorted.filter(v => v < price * 0.995).slice(-3);
  const above = sorted.filter(v => v > price * 1.005).slice(0, 3);
  return [...below, ...above].map(level => ({
    level,
    pct: (level / price - 1) * 100,
    role: level < price ? '지지' : '저항',
  }));
}

function computeTechIndicators(ohlcv) {
  if (!ohlcv || ohlcv.length < 2) return null;
  const closes = ohlcv.map(d => d.close);
  const n = closes.length;
  const last = v => Array.isArray(v) ? v[n - 1] : null;

  const ma20  = last(movingAverage(closes, 20));
  const ma30  = last(movingAverage(closes, 30));
  const ma50  = last(movingAverage(closes, 50));
  const ma99  = last(movingAverage(closes, 99));
  const ma200 = last(movingAverage(closes, 200));

  const vwma20v  = last(vwma(ohlcv, 20));
  const vwma100v = last(vwma(ohlcv, 100));

  const bbAll = bollingerBands(closes, 20, 2);
  const bbLast = bbAll[n - 1];

  const rsi14All = rsi(closes, 14);
  const rsi14v   = rsi14All[n - 1];

  const price = closes[n - 1];
  const ohlcv90 = ohlcv.slice(-90);
  const high90  = Math.max(...ohlcv90.map(d => d.high));
  const low90   = Math.min(...ohlcv90.map(d => d.low));

  const fibs    = fibRetracements(high90, low90, price);
  const fibExts = fibExtensions(low90, high90, price);
  const rounds  = roundNumbers(price);

  // Trade plan
  const entry1   = fibs[0].price; // Fib 0.236
  const entry2   = fibs[1].price; // Fib 0.382
  const stopRaw  = low90 * 0.97;  // just below 90d low
  const profit1  = fibExts[0].price; // Ext 1.272
  const profit2  = fibExts[2].price; // Ext 1.618
  const profit3  = fibExts[4].price; // Ext 2.618
  const rr1 = entry1 > stopRaw ? (profit1 - entry1) / (entry1 - stopRaw) : null;
  const rr2 = entry1 > stopRaw ? (profit2 - entry1) / (entry1 - stopRaw) : null;
  const rr3 = entry1 > stopRaw ? (profit3 - entry1) / (entry1 - stopRaw) : null;

  return {
    price,
    ma: { ma20, ma30, ma50, ma99, ma200 },
    vwma: { vwma20: vwma20v, vwma100: vwma100v },
    bb: bbLast ? { upper: bbLast.upper, mid: bbLast.mid, lower: bbLast.lower } : null,
    rsi14: rsi14v,
    fib90: { high: high90, low: low90 },
    fibs,
    fibExts,
    rounds,
    tradePlan: { entry1, entry2, stopLoss: stopRaw, profit1, profit2, profit3, rr1, rr2, rr3 },
  };
}

// ─── Ticker Resolution ────────────────────────────────────────────────────────
// mode: 'auto' | 'stock' | 'crypto'
function resolveTicker(query, mode='auto') {
  const q = query.trim().toLowerCase();

  if (mode === 'stock') {
    if (KR_TICKER_MAP[q]) return {ticker: KR_TICKER_MAP[q], type:'stock'};
    return {ticker: query.trim().toUpperCase(), type:'stock'};
  }

  if (mode === 'crypto') {
    const id = CRYPTO_MAP[q] || q.replace(/\s+/g,'-').toLowerCase();
    return {ticker: id, type:'crypto'};
  }

  // auto
  if (KR_TICKER_MAP[q]) return {ticker: KR_TICKER_MAP[q], type:'stock'};
  if (CRYPTO_MAP[q]) return {ticker: CRYPTO_MAP[q], type:'crypto'};
  // BINANCE_SYMBOL_MAP also signals crypto (covers new coins not yet in CRYPTO_MAP)
  if (BINANCE_SYMBOL_MAP[q]) return {ticker: q, type:'crypto'};
  const up = query.trim().toUpperCase();
  const cryptoSuffixes = ['BTC','ETH','SOL','XRP','BNB','ADA','DOGE','AVAX','MATIC','LINK','DOT','ATOM','LTC','TRX','SHIB','NEAR','APT','SUI','ARB','OP','TON','ICP','UNI','INJ','SEI','HYPE','PENGU','MOVE','TRUMP','BERA','VIRTUAL','KAITO','ZK','ENA','TIA','STX','BLUR','IMX','MANA','SAND','FET','FLOKI','NOT','HMSTR','BONK','PEPE','WIF','RENDER','ONDO','USUAL'];
  if (cryptoSuffixes.includes(up)) return {ticker: CRYPTO_MAP[up.toLowerCase()]||up.toLowerCase(), type:'crypto'};
  return {ticker: up, type:'stock'};
}

// CoinGecko 동적 검색 — CRYPTO_MAP에 없는 코인 ID를 서버에서 탐색
const _coinIdCache = {};
async function searchCoinId(query) {
  const q = query.trim().toLowerCase();
  if (CRYPTO_MAP[q]) return CRYPTO_MAP[q];
  if (_coinIdCache[q]) return _coinIdCache[q];

  const cgUrl = `${CG_BASE}/search?query=${encodeURIComponent(query)}`;
  const tryParse = async (resp) => {
    if (!resp.ok) return null;
    let data = await resp.json();
    if (data?.contents) data = JSON.parse(data.contents); // allorigins wrapper
    return data?.coins?.[0]?.id || null;
  };

  // 1) direct
  try {
    const id = await tryParse(await fetch(cgUrl, {signal: AbortSignal.timeout(5000)}));
    if (id) { _coinIdCache[q] = id; return id; }
  } catch {}

  // 2) proxy fallback
  for (const makeProxy of PROXY_LIST) {
    try {
      const id = await tryParse(await fetch(makeProxy(cgUrl), {signal: AbortSignal.timeout(6000)}));
      if (id) { _coinIdCache[q] = id; return id; }
    } catch {}
  }

  return q; // 최종 폴백: 원본 쿼리 그대로
}

async function fetchBinanceKlines(symbol, interval='1d', limit=300) {
  const url = `${BINANCE_BASE}/klines?symbol=${encodeURIComponent(symbol)}&interval=${interval}&limit=${limit}`;
  const resp = await fetch(url, {signal: AbortSignal.timeout(10000)});
  if (!resp.ok) {
    const e = await resp.json().catch(()=>({}));
    throw new Error(`Binance ${symbol}: ${e.msg || resp.status}`);
  }
  const data = await resp.json();
  if (!Array.isArray(data) || data.length === 0) throw new Error(`Binance ${symbol}: 데이터 없음`);
  return data.map(k => ({
    date: new Date(k[0]).toISOString().slice(0,16).replace('T',' '),
    t: k[0],
    open: +k[1], high: +k[2], low: +k[3], close: +k[4],
    volume: +k[5], adjclose: +k[4],
  }));
}

  try {

    // 2) Binance Futures
    try { return await fetchBinanceFuturesKlines(sym, tfCfg.binanceInterval, tfCfg.binanceLimit); }
    catch(e) { errors.push('Futures: ' + e.message); }
    // 3) CoinGecko
    try {
      const coinId = CRYPTO_MAP[query.trim().toLowerCase()] || await searchCoinId(query);
      return await fetchCryptoOHLCV(coinId, 180);
    } catch(e) { errors.push('CoinGecko: ' + e.message); }
    // 4) OKX
    try { return await fetchOKXKlines(sym, tfCfg.binanceInterval, tfCfg.binanceLimit); }
    catch(e) { errors.push('OKX: ' + e.message); }
    // 5) Bybit
    try { return await fetchBybitKlines(sym, tfCfg.binanceInterval, tfCfg.binanceLimit); }
    catch(e) { errors.push('Bybit: ' + e.message); }
    throw new Error(`코인 데이터를 가져올 수 없습니다. 심볼/이름을 확인해주세요.\n(${errors.slice(0,2).join(' | ')})`);
  }

  // Stock: Yahoo Finance with requested interval/range
  return fetchYahooOHLCV(ticker, tfCfg.yahooRange, tfCfg.yahooInterval);
}

// ─── 주식 OHLCV — 다중 소스 폴백 ─────────────────────────────────────────────
// 1순위: Yahoo Finance v8 (corsproxy.io 프록시)
// 2순위: Yahoo Finance v8 (allorigins 프록시)
// 3순위: Stooq CSV (CORS 없음, 무료)

const PROXY_LIST = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

async function fetchViaProxies(yfUrl) {
  const parseYF = async r => {
    if (!r.ok) throw new Error('HTTP '+r.status);
    const raw = await r.json();
    const d = raw?.contents ? JSON.parse(raw.contents) : raw;
    if (!d?.chart?.result) throw new Error('no chart data');
    return d;
  };
  const attempts = [
    fetch(yfUrl, {signal: AbortSignal.timeout(5000)}).then(parseYF),
    fetch(`https://corsproxy.io/?url=${encodeURIComponent(yfUrl)}`, {signal: AbortSignal.timeout(8000)}).then(parseYF),
    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(yfUrl)}`, {signal: AbortSignal.timeout(8000)}).then(parseYF),
  ];
  try { return await Promise.any(attempts); }
  catch { return null; }
}

async function fetchYahooOHLCV(ticker, range='6mo', interval='1d') {
  const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?range=${range}&interval=${interval}&includePrePost=false&events=div%2Csplit`;
  const data = await fetchViaProxies(yfUrl);
  if(data) return parseYahooResponse(data);

  // 분봉/시간봉은 Stooq 폴백 불가 (일봉만 지원) — 에러를 그대로 올려서 UI에 표시
  if(interval !== '1d' && interval !== '1wk' && interval !== '1mo') {
    throw new Error(`${ticker} 분봉/시간봉 데이터를 가져올 수 없습니다.\n브라우저 CORS 제한으로 주식 단기 봉은 직접 접근이 어렵습니다.\n일봉(1d) / 주봉 / 월봉을 사용해주세요.`);
  }
  // 일봉/주봉/월봉은 Stooq 폴백
  return fetchStooq(ticker, range);
}

function parseYahooResponse(data) {
  const r = data?.chart?.result?.[0];
  if(!r) throw new Error('Yahoo Finance: 데이터 없음');
  const ts = r.timestamp;
  const q  = r.indicators.quote[0];
  const adj= r.indicators.adjclose?.[0]?.adjclose;
  return ts.map((t,i)=>({
    date: new Date(t*1000).toISOString().slice(0,10),
    open:  q.open[i],
    high:  q.high[i],
    low:   q.low[i],
    close: q.close[i],
    volume:q.volume[i]||0,
    adjclose: adj?adj[i]:q.close[i],
  })).filter(d=>d.close!=null && !isNaN(d.close));
}

// Stooq: 미국/글로벌 주식 CSV (CORS 허용)
async function fetchStooq(ticker, range='6mo') {
  const daysMap = {'1mo':30,'3mo':90,'6mo':180,'1y':365,'2y':730,'5y':1825};
  const days = daysMap[range]||180;
  const to   = new Date();
  const from = new Date(to - days*864e5);
  const fmt  = d => d.toISOString().slice(0,10).replace(/-/g,'');
  // Stooq 티커: 미국 주식은 그대로, 한국은 .KS 제거 후 .KO
  const stooqTicker = ticker.replace('.KS','.KO').toLowerCase();
  const url = `https://stooq.com/q/d/l/?s=${stooqTicker}&d1=${fmt(from)}&d2=${fmt(to)}&i=d`;
  const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
  if(!r.ok) throw new Error(`Stooq 오류: ${r.status}`);
  const csv = await r.text();
  const lines = csv.trim().split('\n');
  if(lines.length < 2 || lines[0].toLowerCase().includes('no data')) throw new Error('Stooq: 데이터 없음');
  return lines.slice(1).map(l=>{
    const [date,open,high,low,close,volume] = l.split(',');
    return {
      date, open:+open, high:+high, low:+low, close:+close,
      volume:+(volume||0), adjclose:+close,
    };
  }).filter(d=>d.close && !isNaN(d.close));
}

async function fetchYahooPrice(ticker) {
  try {
    const d = await fetchYahooOHLCV(ticker,'5d','1d');
    return d[d.length-1]?.close || null;
  } catch { return null; }
}

async function fetchCryptoOHLCV(coinId, days=180) {

async function fetchCurrentPrice(query, mode='auto') {
  let {ticker, type} = resolveTicker(query, mode);
  if (type === 'crypto') {
    if (!CRYPTO_MAP[query.trim().toLowerCase()]) ticker = await searchCoinId(query);
    return fetchCryptoPrice(ticker);

const _ohlcvCache = {};
async function fetchOHLCV(query, range='6mo', mode='auto') {
  const cacheKey = `${query.trim().toLowerCase()}|${range}|${mode}`;
  const TTL = 5 * 60 * 1000; // 5분
  const cached = _ohlcvCache[cacheKey];
  if (cached && Date.now() - cached.ts < TTL) return cached.data;

  let {ticker, type} = resolveTicker(query, mode);
  let result;
  if (type === 'crypto') {
    const limitMap = {'1mo':90,'3mo':180,'6mo':300,'1y':365,'2y':500,'5y':700};
    const limit = limitMap[range] || 300;
    const daysMap  = {'1mo':30,'3mo':90,'6mo':180,'1y':365,'2y':730,'5y':1825};
    const days = daysMap[range] || 180;
    const sym = BINANCE_SYMBOL_MAP[query.trim().toLowerCase()] || query.trim().toUpperCase()+'USDT';
    const spotP = resolveBinanceSymbol(query).then(s=>fetchBinanceKlines(s,'1d',limit));
    const futP  = fetchBinanceFuturesKlines(sym,'1d',limit);
    try { result = await Promise.race([spotP.catch(()=>futP), futP.catch(()=>spotP)]); }
    catch {
      try {
        if (!CRYPTO_MAP[query.trim().toLowerCase()]) ticker = await searchCoinId(query);
        result = await fetchCryptoOHLCV(ticker, days);
      } catch {
        try { result = await fetchOKXKlines(sym,'1d',limit); }
        catch { result = await fetchBybitKlines(sym,'1d',limit); }
      }
    }
  } else {
    result = await fetchYahooOHLCV(ticker, range);
  }
  if (result?.length) _ohlcvCache[cacheKey] = {data: result, ts: Date.now()};
  return result;
}

// ─── 기술 지표 계산 ──────────────────────────────────────────────────────────
function bollingerBands(closes, n=20, k=2) {
  return closes.map((_,i) => {
    if(i < n-1) return null;
    const slice = closes.slice(i-n+1, i+1);
    const mean  = slice.reduce((a,b)=>a+b,0)/n;
    const std   = Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/n);
    return {upper: mean+k*std, mid: mean, lower: mean-k*std};
  });
}

function rsi(closes, period=14) {
  const result = Array(closes.length).fill(null);
  if(closes.length < period+1) return result;
  let gains=0, losses=0;
  for(let i=1; i<=period; i++) {
    const d = closes[i]-closes[i-1];
    if(d>0) gains+=d; else losses-=d;
  }
  let avgGain=gains/period, avgLoss=losses/period;
  result[period] = avgLoss===0 ? 100 : 100 - 100/(1+avgGain/avgLoss);
  for(let i=period+1; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    avgGain = (avgGain*(period-1) + Math.max(d,0))/period;
    avgLoss = (avgLoss*(period-1) + Math.max(-d,0))/period;
    result[i] = avgLoss===0 ? 100 : 100 - 100/(1+avgGain/avgLoss);
  }
  return result;
}

// ─── SVG Interactive Chart ───────────────────────────────────────────────────
function buildCandleChart(candles, ticker='', w=960, ch=290, vh=65, rh=58) {
  if (!candles || candles.length < 2) return '<div style="color:#64748b;padding:20px;text-align:center">데이터 없음</div>';

  const EXTRA = 10; // 우측 빈 캔들 공간
  const totalSlots = candles.length + EXTRA;
  const totalH = ch + vh + 16 + 8 + rh + 16;

  const closes = candles.map(c=>c.close), highs=candles.map(c=>c.high);
  const lows   = candles.map(c=>c.low),   vols =candles.map(c=>c.volume||0);

  let maxP=Math.max(...highs), minP=Math.min(...lows);
  const pad=(maxP-minP)*0.04; maxP+=pad; minP=Math.max(0,minP-pad);
  const rangeP=maxP-minP||1, maxV=Math.max(...vols,1);

  const barW = w / totalSlots;
  const toY  = p => ch - ((p-minP)/rangeP)*ch;
  const toVY = v => ch+10+(vh-(v/maxV)*vh);
  const cxOf = i => i*barW + barW*0.5;

  // Candlesticks
  const priceParts=candles.map((c,i)=>{
    const x=i*barW+barW*0.1, bw=Math.max(barW*0.8,1), cx=x+bw/2;
    const up=c.close>=c.open, col=up?'#4ade80':'#f87171';
    const bt=toY(Math.max(c.open,c.close)), bb=toY(Math.min(c.open,c.close));
    const bh=Math.max(bb-bt,1), ws=barW>4?1:0.5;
    return `<line x1="${cx.toFixed(1)}" y1="${toY(c.high).toFixed(1)}" x2="${cx.toFixed(1)}" y2="${toY(c.low).toFixed(1)}" stroke="${col}" stroke-width="${ws}"/>` +
           `<rect x="${x.toFixed(1)}" y="${bt.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${col}"/>`;
  }).join('');

  // Volume bars
  const volParts=candles.map((c,i)=>{
    const x=i*barW+barW*0.1, bw=Math.max(barW*0.8,1);
    const col=c.close>=c.open?'rgba(74,222,128,0.5)':'rgba(248,113,113,0.5)';
    const y=toVY(c.volume||0), bh=ch+10+vh-y;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,0).toFixed(1)}" fill="${col}"/>`;
  }).join('');

  // MA/VWMA lines
  const pline=(vals,col,sw)=>{
    const pts=[];
    for(let i=0;i<vals.length;i++){if(vals[i]==null)continue;pts.push(`${cxOf(i).toFixed(1)},${toY(vals[i]).toFixed(1)}`);}
    if(pts.length<2)return '';
    return `<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="${sw}" vector-effect="non-scaling-stroke" opacity="0.88"/>`;
  };
  const ma7v=movingAverage(closes,7), ma25v=movingAverage(closes,25);
  const ma99v=movingAverage(closes,99), vwma100v=vwma(candles,100);
  const maLayer=pline(ma7v,'#fbbf24',1.3)+pline(ma25v,'#60a5fa',1.3)+pline(ma99v,'#a78bfa',1.4)+pline(vwma100v,'#ec4899',2.0);

  // Fibonacci (last 90 candles)
  const n90=Math.min(90,candles.length);
  const fH=Math.max(...highs.slice(-n90)), fL=Math.min(...lows.slice(-n90)), fR=fH-fL;
  const FR=[0.236,0.382,0.500,0.618,0.786], FC=['#94a3b8','#fbbf24','#60a5fa','#4ade80','#f472b6'];
  // Lines extend through EXTRA zone too
  const fibLines=fR>0?FR.map((r,i)=>{
    const fy=toY(fH-r*fR).toFixed(1);
    return `<line x1="0" y1="${fy}" x2="${w+barW*EXTRA}" y2="${fy}" stroke="${FC[i]}" stroke-width="0.9" stroke-dasharray="5,4" vector-effect="non-scaling-stroke" opacity="0.65"/>`;
  }).join(''):'';
  // Fib inline price labels (left side after MA legend, JS updates Y on zoom)
  const fibInline=fR>0?FR.map((r,i)=>{
    const fp=fH-r*fR, fy=toY(fp);
    const txt=fp>=1?fp.toFixed(2):fp.toPrecision(4);
    const lw=txt.length*6+10, lx=120;
    return `<rect id="cs-fb${i}" data-fp="${fp}" x="${lx}" y="${(fy-7).toFixed(1)}" width="${lw}" height="13" fill="#0b0e14" opacity="0.88" rx="2" stroke="${FC[i]}" stroke-width="0.7"/>` +
           `<text id="cs-ft${i}" data-fp="${fp}" x="${lx+lw/2}" y="${(fy+3).toFixed(1)}" fill="${FC[i]}" font-size="10" font-weight="700" font-family="monospace" text-anchor="middle">${txt}</text>`;
  }).join(''):'';

  // RSI panel
  const rsiTop=ch+vh+24, toRY=v=>rsiTop+rh-(Math.min(100,Math.max(0,v))/100)*rh;
  const rsi14v=rsi(closes,14), rsiPts=[];
  for(let i=0;i<rsi14v.length;i++){if(rsi14v[i]==null)continue;rsiPts.push(`${cxOf(i).toFixed(1)},${toRY(rsi14v[i]).toFixed(1)}`);}
  const currRSI=rsi14v.reduce((l,v)=>v!=null?v:l,null);
  const rsiCol=!currRSI?'#94a3b8':currRSI<30?'#4ade80':currRSI>70?'#ef4444':'#a78bfa';
  const rsiBg=`<line x1="0" y1="${rsiTop-6}" x2="${w}" y2="${rsiTop-6}" stroke="#243045" stroke-width="0.7"/>
<rect x="0" y="${rsiTop}" width="${w}" height="${rh}" fill="rgba(11,14,20,0.22)"/>
<line x1="0" y1="${toRY(70).toFixed(1)}" x2="${w}" y2="${toRY(70).toFixed(1)}" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>
<line x1="0" y1="${toRY(50).toFixed(1)}" x2="${w}" y2="${toRY(50).toFixed(1)}" stroke="#475569" stroke-width="0.5" opacity="0.35"/>
<line x1="0" y1="${toRY(30).toFixed(1)}" x2="${w}" y2="${toRY(30).toFixed(1)}" stroke="#4ade80" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.6"/>`;
  const rsiLine=rsiPts.length>=2?`<polyline points="${rsiPts.join(' ')}" fill="none" stroke="${rsiCol}" stroke-width="1.5" vector-effect="non-scaling-stroke" opacity="0.95"/>`:'';
  const rsiLabels=`<text x="4" y="${rsiTop+12}" fill="#cbd5e1" font-size="11" font-weight="700">RSI(14)</text>
<text x="54" y="${(toRY(70)-3).toFixed(1)}" fill="#ef4444" font-size="10" font-weight="700">70</text>
<text x="54" y="${(toRY(30)+11).toFixed(1)}" fill="#4ade80" font-size="10" font-weight="700">30</text>
${currRSI!=null?`<text x="${w-4}" y="${rsiTop+12}" fill="${rsiCol}" font-size="12" text-anchor="end" font-weight="800">RSI ${currRSI.toFixed(1)}</text>`:''}`;

  // Grid (IDs so JS can update labels on zoom)
  const grid=[0,0.25,0.5,0.75,1].map((t,i)=>{
    const y=ch-t*ch, p=minP+t*rangeP;
    const lbl=p>=1?p.toFixed(2):p.toPrecision(4);
    return `<line x1="0" y1="${y.toFixed(1)}" x2="${w}" y2="${y.toFixed(1)}" stroke="#243045" stroke-width="0.4" opacity="0.45"/>` +
           (y>80?`<text id="cs-gl${i}" x="4" y="${(y-3).toFixed(1)}" fill="#94a3b8" font-size="10" font-weight="600">${lbl}</text>`:'');
  }).join('');

  // Time axis labels (updated by JS on zoom)
  const step=Math.max(1,Math.floor(candles.length/7));
  const timeLabels=candles.reduce((acc,c,i)=>{
    if(i%step!==0 && i!==candles.length-1) return acc;
    const x=cxOf(i);
    let lbl='';
    if(c.t){const d=new Date(c.t);lbl=`${d.getMonth()+1}/${d.getDate()}`;}
    else if(typeof c.date==='string') lbl=c.date.slice(5,10);
    return acc+`<text id="cs-tl${i}" x="${x.toFixed(1)}" y="${totalH-4}" fill="#52525b" font-size="10" text-anchor="middle">${lbl}</text>`;
  },'');

  // Legend
  const legend=`<rect x="4" y="4" width="112" height="72" fill="#0b0e14" opacity="0.88" rx="3" stroke="#243045" stroke-width="0.5"/>
<text x="12" y="20" fill="#fbbf24" font-size="11" font-weight="700" font-family="monospace">━ MA7</text>
<text x="12" y="35" fill="#60a5fa" font-size="11" font-weight="700" font-family="monospace">━ MA25</text>
<text x="12" y="50" fill="#a78bfa" font-size="11" font-weight="700" font-family="monospace">━ MA99</text>
<text x="12" y="65" fill="#ec4899" font-size="11" font-weight="800" font-family="monospace">━ VWMA100</text>`;

  // Fib legend (bottom-left)
  const fbx=4, fby=ch-92;
  const fibBox=fR>0?`<rect x="${fbx}" y="${fby}" width="172" height="84" fill="#0b0e14" opacity="0.88" rx="3" stroke="#243045" stroke-width="0.5"/>
<text x="${fbx+8}" y="${fby+12}" fill="#94a3b8" font-size="10" font-weight="700">Fib · 90봉 기준</text>
${FR.map((r,i)=>{const fp=fH-r*fR,lbl=fp>=1?fp.toFixed(2):fp.toPrecision(4);return `<text x="${fbx+8}" y="${fby+26+i*13}" fill="${FC[i]}" font-size="10" font-weight="700" font-family="monospace">Fib ${r}  ${lbl}</text>`;}).join('')}`:'';

  const divider=`<line x1="0" y1="${ch+6}" x2="${w}" y2="${ch+6}" stroke="#243045" stroke-width="0.5"/>`;
  const volLabel=`<text x="4" y="${ch+14}" fill="#94a3b8" font-size="10" font-weight="600">Vol</text>`;

  // OHLC tooltip
  const tooltip=`<g id="cs-tip" style="display:none;pointer-events:none;">
<rect id="cs-tip-bg" x="0" y="0" width="166" height="106" fill="#0b0e14" opacity="0.96" rx="4" stroke="#334155" stroke-width="0.7"/>
<text id="cs-tip-dt"  x="0" y="0" fill="#e2e8f0" font-size="11" font-weight="800" font-family="monospace"/>
<text id="cs-tip-o"   x="0" y="0" fill="#94a3b8" font-size="11" font-family="monospace"/>
<text id="cs-tip-h"   x="0" y="0" fill="#4ade80" font-size="11" font-family="monospace"/>
<text id="cs-tip-l"   x="0" y="0" fill="#f87171" font-size="11" font-family="monospace"/>
<text id="cs-tip-c"   x="0" y="0" fill="#fbbf24" font-size="11" font-weight="700" font-family="monospace"/>
<text id="cs-tip-v"   x="0" y="0" fill="#a78bfa" font-size="11" font-family="monospace"/>
<text id="cs-tip-chg" x="0" y="0" font-size="11" font-weight="700" font-family="monospace"/>
</g>`;

  // Crosshair
  const crosshair=`<g id="cs-ch" style="display:none;pointer-events:none;">
<line id="cs-vl" x1="0" y1="0" x2="0" y2="${totalH-14}" stroke="#94a3b8" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.55"/>
<line id="cs-hl" x1="0" y1="0" x2="${w}" y2="0" stroke="#94a3b8" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.55"/>
<rect id="cs-pb" x="0" y="0" width="86" height="15" fill="#1e293b" stroke="#fbbf24" stroke-width="0.6" rx="2"/>
<text id="cs-pt" x="0" y="0" fill="#fbbf24" font-size="11" font-weight="700" font-family="monospace" text-anchor="middle"/>
<rect id="cs-db" x="0" y="${totalH-17}" width="72" height="14" fill="#1e293b" stroke="#475569" stroke-width="0.5" rx="2"/>
<text id="cs-dt" x="0" y="${totalH-6}" fill="#94a3b8" font-size="10" font-weight="600" font-family="monospace" text-anchor="middle"/>
</g>`;

  window.__csChart={candles,w,ch,vh,rh,rsiTop,totalH,minP,maxP,rangeP,maxV,barW,totalSlots,EXTRA};

  return `<svg id="cs-svg" viewBox="0 0 ${w} ${totalH}" preserveAspectRatio="none" style="display:block;width:100%;cursor:crosshair;touch-action:none;user-select:none;">${grid}${rsiBg}<g id="cs-zg"><g id="cs-price">${fibLines}${priceParts}${maLayer}</g><g id="cs-vol">${volParts}</g><g id="cs-rsi">${rsiLine}</g></g>${fibInline}${divider}${legend}${fibBox}${rsiLabels}${timeLabels}${volLabel}${tooltip}${crosshair}</svg>`;
}

function attachChartHandlers(container) {
  const svg=container.querySelector('#cs-svg');
  if(!svg||!window.__csChart)return;
  const D=window.__csChart;
  const {candles,w,ch,vh,rh,rsiTop,totalH,minP,maxP,rangeP,maxV,barW,totalSlots,EXTRA}=D;

  const zoomG   = container.querySelector('#cs-zg');
  const czPrice = container.querySelector('#cs-price');
  const czVol   = container.querySelector('#cs-vol');
  const gridLbls= [0,1,2,3,4].map(i=>container.querySelector(`#cs-gl${i}`));
  const fibRects= [0,1,2,3,4].map(i=>container.querySelector(`#cs-fb${i}`));
  const fibTexts= [0,1,2,3,4].map(i=>container.querySelector(`#cs-ft${i}`));

  let scale=1, panX=0;
  let curMinP=minP, curMaxP=maxP, curRangeP=rangeP;

  const fmtP=p=>p>=1?p.toFixed(3):p>=0.01?p.toFixed(5):p.toExponential(2);
  const fmtV=v=>v>=1e9?(v/1e9).toFixed(2)+'B':v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(1)+'K':String(Math.round(v));

  // ── Y 자동 맞춤: 현재 가시 범위의 캔들로 최대/최소 재계산 ─────────────
  const recomputeY=()=>{
    const li=Math.max(0,Math.floor(panX/barW));
    const ri=Math.min(candles.length-1,Math.ceil((panX+w/scale)/barW));
    let vMin=Infinity,vMax=-Infinity,vMaxV=1;
    for(let i=li;i<=ri;i++){
      const c=candles[i];if(!c)continue;
      if(c.high>vMax)vMax=c.high;if(c.low<vMin)vMin=c.low;
      if((c.volume||0)>vMaxV)vMaxV=c.volume||0;
    }
    if(!isFinite(vMax)||vMax<=vMin){vMin=minP;vMax=maxP;vMaxV=maxV;}
    const pad=(vMax-vMin)*0.05;vMax+=pad;vMin=Math.max(0,vMin-pad);
    curMinP=vMin;curMaxP=vMax;curRangeP=vMax-vMin;
    // Price Y SVG transform
    const syP=rangeP/curRangeP, tyP=syP*ch*((vMax-minP)/rangeP-1);
    if(czPrice)czPrice.setAttribute('transform',`translate(0,${tyP.toFixed(2)}) scale(1,${syP.toFixed(4)})`);
    // Vol Y SVG transform
    if(czVol&&vMaxV>0){
      const syV=maxV/vMaxV, tyV=(1-syV)*(ch+10+vh);
      czVol.setAttribute('transform',`translate(0,${tyV.toFixed(2)}) scale(1,${syV.toFixed(4)})`);
    }
    // Update grid price labels
    const vR=vMax-vMin;
    [0,0.25,0.5,0.75,1].forEach((t,i)=>{
      const el=gridLbls[i];if(!el)return;
      const p=vMax-t*vR;
      el.textContent=p>=1?p.toFixed(2):p.toPrecision(4);
    });
    // Update Fib inline label Y positions
    const newYFor=p=>ch*(1-(p-vMin)/vR);
    for(let i=0;i<5;i++){
      const fb=fibRects[i],ft=fibTexts[i];if(!fb||!ft)continue;
      const fp=parseFloat(fb.getAttribute('data-fp'));
      const ny=newYFor(fp);
      if(ny<-14||ny>ch+14){fb.style.display='none';ft.style.display='none';}
      else{fb.style.display='';ft.style.display='';
        fb.setAttribute('y',(ny-7).toFixed(1));ft.setAttribute('y',(ny+3).toFixed(1));}
    }
  };

  const apply=()=>{
    if(zoomG)zoomG.setAttribute('transform',`translate(${(-panX*scale).toFixed(2)},0) scale(${scale.toFixed(4)},1)`);
    recomputeY();
  };

  // panX range: 0 → allow scrolling to right including EXTRA empty candles
  const clampPan=()=>{
    const maxPan=(totalSlots/candles.length)*w*(1-1/scale)+barW*EXTRA*0;
    // Extend right limit to show EXTRA slots
    const rightLimit=totalSlots*barW-w/scale;
    panX=Math.max(0,Math.min(Math.max(0,rightLimit),panX));
  };

  recomputeY();
  svg.style.userSelect='none';

  // ── Crosshair elements ──────────────────────────────────────────────────
  const chG=container.querySelector('#cs-ch');
  const vl =container.querySelector('#cs-vl');
  const hl =container.querySelector('#cs-hl');
  const pb =container.querySelector('#cs-pb');
  const pt =container.querySelector('#cs-pt');
  const db =container.querySelector('#cs-db');
  const dt =container.querySelector('#cs-dt');
  const tipG  =container.querySelector('#cs-tip');
  const tipBg =container.querySelector('#cs-tip-bg');
  const tipDt =container.querySelector('#cs-tip-dt');
  const tipO  =container.querySelector('#cs-tip-o');
  const tipH  =container.querySelector('#cs-tip-h');
  const tipL  =container.querySelector('#cs-tip-l');
  const tipC  =container.querySelector('#cs-tip-c');
  const tipV  =container.querySelector('#cs-tip-v');
  const tipChg=container.querySelector('#cs-tip-chg');

  let isDragging=false;

  const hideCH=()=>{if(chG)chG.style.display='none';if(tipG)tipG.style.display='none';};

  const updateCH=e=>{
    if(isDragging)return;
    const rect=svg.getBoundingClientRect();
    const mxV=(e.clientX-rect.left)/rect.width*w;
    const myV=(e.clientY-rect.top)/rect.height*totalH;
    const dataX=mxV/scale+panX;
    const idx=Math.max(0,Math.min(candles.length-1,Math.floor(dataX/barW)));
    const c=candles[idx];
    if(!c||!chG)return;
    chG.style.display='';
    // Snap vertical line to candle center
    const csx=((idx*barW+barW/2)-panX)*scale;
    if(vl){vl.setAttribute('x1',csx.toFixed(1));vl.setAttribute('x2',csx.toFixed(1));}
    if(hl){hl.setAttribute('y1',myV.toFixed(1));hl.setAttribute('y2',myV.toFixed(1));}
    // Price label
    if(pt&&pb&&myV<=ch){
      const price=curMinP+(1-myV/ch)*curRangeP;
      const lbl='$'+fmtP(price);
      const lx=w-90,ly=Math.max(8,Math.min(totalH-20,myV-8));
      pb.setAttribute('x',lx);pb.setAttribute('y',ly);
      pt.setAttribute('x',lx+43);pt.setAttribute('y',ly+11);
      pt.textContent=lbl;pb.style.display='';pt.style.display='';
    } else if(pt){pt.style.display='none';if(pb)pb.style.display='none';}
    // Date label
    if(db&&dt){
      let lbl='';
      if(c.t){const d=new Date(c.t);lbl=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
      else if(typeof c.date==='string')lbl=c.date.slice(5,16);
      const dbw=Math.max(72,lbl.length*7);
      db.setAttribute('width',dbw);
      const dx=Math.max(dbw/2+2,Math.min(w-dbw/2-2,csx));
      db.setAttribute('x',(dx-dbw/2).toFixed(1));dt.setAttribute('x',dx.toFixed(1));dt.textContent=lbl;
    }
    // OHLC Tooltip
    if(tipG&&tipBg){
      tipG.style.display='';
      const bw=166,bh=106;
      let tx=csx+14;if(tx+bw>w-4)tx=csx-bw-14;if(tx<4)tx=4;
      const ty=Math.max(4,Math.min(totalH-bh-4,myV-bh/2));
      tipBg.setAttribute('x',tx);tipBg.setAttribute('y',ty);
      const ox=tx+10;
      let dstr='';
      if(c.t){const d=new Date(c.t);dstr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
      else if(typeof c.date==='string')dstr=c.date;
      const pos=(el,y)=>{if(el){el.setAttribute('x',ox);el.setAttribute('y',ty+y);}};
      pos(tipDt,14);pos(tipO,28);pos(tipH,42);pos(tipL,56);pos(tipC,70);pos(tipV,84);pos(tipChg,100);
      if(tipDt)tipDt.textContent=dstr;
      if(tipO)tipO.textContent=`O  $${fmtP(c.open)}`;
      if(tipH)tipH.textContent=`H  $${fmtP(c.high)}`;
      if(tipL)tipL.textContent=`L  $${fmtP(c.low)}`;
      if(tipC)tipC.textContent=`C  $${fmtP(c.close)}`;
      if(tipV)tipV.textContent=`Vol ${fmtV(c.volume||0)}`;
      const chg=c.open>0?((c.close-c.open)/c.open*100):0;
      if(tipChg){tipChg.textContent=`${chg>=0?'+':''}${chg.toFixed(2)}%`;tipChg.setAttribute('fill',chg>=0?'#4ade80':'#f87171');}
    }
  };

  // ── 마우스 휠 줌 (마우스 위치 기준) ─────────────────────────────────────
  svg.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=svg.getBoundingClientRect();
    const fx=(e.clientX-rect.left)/rect.width;
    const anchor=panX+fx*w/scale;
    const factor=e.deltaY>0?1/1.18:1.18;
    scale=Math.max(1,Math.min(60,scale*factor));
    panX=anchor-fx*w/scale;
    clampPan();apply();updateCH(e);
  },{passive:false});

  // ── 터치 핀치 줌 ─────────────────────────────────────────────────────────
  let lastDist=null;
  svg.addEventListener('touchstart',e=>{
    if(e.touches.length===2)lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  svg.addEventListener('touchmove',e=>{
    if(e.touches.length===2&&lastDist){
      e.preventDefault();
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const rect=svg.getBoundingClientRect();
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const fx=(mx-rect.left)/rect.width;
      const anchor=panX+fx*w/scale;
      scale=Math.max(1,Math.min(60,scale*dist/lastDist));
      panX=anchor-fx*w/scale;
      clampPan();apply();lastDist=dist;
    }
  },{passive:false});
  svg.addEventListener('touchend',()=>{lastDist=null;});

  // ── 드래그 팬 ─────────────────────────────────────────────────────────────
  let dragSt=null;
  svg.addEventListener('pointerdown',e=>{
    isDragging=true;
    dragSt={x:e.clientX,panX};
    svg.setPointerCapture(e.pointerId);
    svg.style.cursor='grabbing';hideCH();
  });
  svg.addEventListener('pointermove',e=>{
    if(dragSt){
      const rect=svg.getBoundingClientRect();
      const dx=(dragSt.x-e.clientX)/rect.width*(w/scale);
      panX=dragSt.panX+dx;clampPan();apply();
    } else {isDragging=false;updateCH(e);}
  });
  const endDrag=()=>{isDragging=false;dragSt=null;svg.style.cursor='crosshair';};
  svg.addEventListener('pointerup',endDrag);
  svg.addEventListener('pointercancel',endDrag);
  svg.addEventListener('pointerleave',()=>{endDrag();hideCH();});

  // ── 더블클릭 리셋 ─────────────────────────────────────────────────────────
  svg.addEventListener('dblclick',()=>{scale=1;panX=0;apply();});
}

// ─── Chart Generation (Plotly + 서브플롯) ───────────────────────────────────
async function generateChartImage(ohlcv, ticker) {
  return new Promise((resolve, reject) => {
    // 완전히 보이되 z-index로 뒤에 숨기는 방식 (브라우저 렌더링 보장)
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;top:0;left:0;width:960px;height:620px;z-index:-9999;opacity:0;pointer-events:none;overflow:hidden;';
    const div = document.createElement('div');
    div.style.cssText = 'width:960px;height:620px;';
    wrap.appendChild(div);
    document.body.appendChild(wrap);

    const dates  = ohlcv.map(d=>d.date);
    const closes = ohlcv.map(d=>d.close);
    const highs  = ohlcv.map(d=>d.high);
    const lows   = ohlcv.map(d=>d.low);
    const vols   = ohlcv.map(d=>d.volume||0);

    const ma7  = movingAverage(closes,7);
    const ma20 = movingAverage(closes,20);
    const ma60 = movingAverage(closes,60);
    const ma200= movingAverage(closes,200);
    const bb   = bollingerBands(closes,20,2);
    const rsi14= rsi(closes,14);

    const bbUpper = bb.map(b=>b?.upper??null);
    const bbMid   = bb.map(b=>b?.mid??null);
    const bbLower = bb.map(b=>b?.lower??null);

    const volColors = ohlcv.map((d,i)=> i===0 ? '#3b82f6' : d.close>=d.open ? 'rgba(34,197,94,0.6)':'rgba(239,68,68,0.6)');

    const traces = [
      // ── 캔들스틱
      {type:'candlestick', name:ticker, xaxis:'x', yaxis:'y',
       x:dates, open:ohlcv.map(d=>d.open), high:highs, low:lows, close:closes,
       increasing:{line:{color:'#22c55e'},fillcolor:'#22c55e'},
       decreasing:{line:{color:'#ef4444'},fillcolor:'#ef4444'},
       showlegend:false},
      // ── 볼린저밴드
      {type:'scatter',name:'BB상단',x:dates,y:bbUpper,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.5)',width:1,dash:'dot'},showlegend:false,connectgaps:false},
      {type:'scatter',name:'BB중간',x:dates,y:bbMid,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.3)',width:1},showlegend:false,fill:'tonexty',fillcolor:'rgba(148,163,184,0.04)',connectgaps:false},
      {type:'scatter',name:'BB하단',x:dates,y:bbLower,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'rgba(148,163,184,0.5)',width:1,dash:'dot'},showlegend:false,fill:'tonexty',fillcolor:'rgba(148,163,184,0.04)',connectgaps:false},
      // ── 이동평균선
      {type:'scatter',name:'MA7', x:dates,y:ma7, mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#f472b6',width:1.2},connectgaps:false},
      {type:'scatter',name:'MA20',x:dates,y:ma20,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#fbbf24',width:1.5},connectgaps:false},
      {type:'scatter',name:'MA60',x:dates,y:ma60,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#60a5fa',width:1.5},connectgaps:false},
      {type:'scatter',name:'MA200',x:dates,y:ma200,mode:'lines',xaxis:'x',yaxis:'y',
       line:{color:'#a78bfa',width:1.8},connectgaps:false},
      // ── 거래량
      {type:'bar',name:'거래량',x:dates,y:vols,xaxis:'x',yaxis:'y2',
       marker:{color:volColors},showlegend:false},
      // ── RSI
      {type:'scatter',name:'RSI(14)',x:dates,y:rsi14,mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'#a78bfa',width:1.5},connectgaps:false,showlegend:false},
      // RSI 기준선
      {type:'scatter',x:dates,y:Array(dates.length).fill(70),mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'rgba(239,68,68,0.4)',width:1,dash:'dot'},showlegend:false},
      {type:'scatter',x:dates,y:Array(dates.length).fill(30),mode:'lines',xaxis:'x',yaxis:'y3',
       line:{color:'rgba(34,197,94,0.4)',width:1,dash:'dot'},showlegend:false},
    ];

    const layout = {
      paper_bgcolor:'#0f172a', plot_bgcolor:'#0f172a',
      font:{color:'#e2e8f0',size:10},
      title:{text:`${ticker} — 캔들+볼린저밴드+MA7/20/60/200 | 거래량 | RSI(14)`,font:{size:12,color:'#60a5fa'},x:0.01},
      grid:{rows:3, columns:1, pattern:'independent', roworder:'top to bottom'},
      xaxis :{gridcolor:'#1e293b',linecolor:'#334155',showgrid:true,type:'date',domain:[0,1],rangeslider:{visible:false}},
      yaxis :{gridcolor:'#1e293b',linecolor:'#334155',showgrid:true,domain:[0.35,1],title:{text:'가격',font:{size:9},standoff:4}},
      yaxis2:{gridcolor:'#1e293b20',linecolor:'#334155',showgrid:false,domain:[0.18,0.33],title:{text:'거래량',font:{size:9},standoff:4}},
      yaxis3:{gridcolor:'#1e293b',linecolor:'#334155',showgrid:true,domain:[0,0.16],range:[0,100],title:{text:'RSI',font:{size:9},standoff:4}},
      legend:{bgcolor:'rgba(15,23,42,0.8)',font:{size:9},x:0,y:1,xanchor:'left',orientation:'h'},
      margin:{l:55,r:15,t:40,b:30},
      showlegend:true,
    };

    Plotly.newPlot(div, traces, layout, {staticPlot:true, responsive:false, displayModeBar:false})
      .then(()=> Plotly.toImage(div, {format:'png', width:960, height:620}))
      .then(imgUrl => {
        try{ document.body.removeChild(wrap); }catch{}
        resolve(imgUrl.replace(/^data:[^;]+;base64,/, ''));
      })
      .catch(e => { try{document.body.removeChild(wrap);}catch{} reject(e); });
  });
}

// ─── Google Gemini API ────────────────────────────────────────────────────────
// 우선순위: Cloudflare Worker 프록시 > DEPLOY_KEY(직접) > 사용자 키(직접)
async function callGemini(model, parts, userApiKey) {
  const body = {
    model,  // Worker에서 추출, Gemini URL에 사용
    contents: [{parts}],
    generationConfig: {temperature: 0.7, maxOutputTokens: 8192},
  };

  let resp;
  if(PROXY_URL) {
    // [방법 A] Cloudflare Worker 프록시 — API 키가 HTML에 없음
    resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify(body),
    });
  } else {
    // [방법 B] 브라우저 직접 호출 — DEPLOY_KEY 또는 사용자 키 사용
    const key = DEPLOY_KEY || userApiKey;
    if(!key) throw new Error('Google API 키가 없습니다. 우측 상단 ⚙️ 에서 입력해주세요.\n발급: aistudio.google.com/apikey');
    const url = `${GEMINI_BASE}/${model}:generateContent?key=${encodeURIComponent(key)}`;
    resp = await fetch(url, {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify({contents: body.contents, generationConfig: body.generationConfig}),
    });
  }

  if(!resp.ok) {
    const e = await resp.json().catch(()=>({}));
    const msg = e?.error?.message || e?.error || `Gemini error ${resp.status}`;
    throw new Error(msg);
  }
  const data = await resp.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text) throw new Error('Gemini 응답이 비어있습니다.');
  return text;
}

async function callGeminiVision(imageB64, mediaType, apiKey, timeframeLabel='일봉') {
  const tfContext = timeframeLabel.includes('분') ? `단기(${timeframeLabel}) 차트로, 단기 변동성·매수매도 압력·단기 추세 전환에 집중하세요.`
    : timeframeLabel.includes('시간') ? `중단기(${timeframeLabel}) 차트로, 중단기 추세 지속·주요 지지저항 돌파 여부에 집중하세요.`
    : timeframeLabel==='주봉'||timeframeLabel==='월봉' ? `장기(${timeframeLabel}) 차트로, 장기 추세·거시적 관점·대형 패턴에 집중하세요.`
    : `중기(${timeframeLabel}) 차트로, 중기 추세·모멘텀·주요 지지저항에 집중하세요.`;
  return callGemini(GEMINI_VISION_MODEL, [
    {inline_data: {mime_type: mediaType||'image/png', data: imageB64}},
    {text: `당신은 전문 기술적 분석가입니다. 현재 분석 중인 차트는 [${timeframeLabel}] 입니다. ${tfContext}

이 차트를 항목별로 심층 분석하세요.
각 항목에서 수치나 상태만 나열하지 말고, 반드시 "그것이 지금 매매에 어떤 의미인지" 해석하여 서술하세요.

1. **추세 분석**: 단기(1주)/중기(1개월)/장기(3개월) 추세 방향과 강도. 현재 추세가 지속될 가능성과 반전 조건.
2. **이동평균선(MA)**: 배열 상태와 골든/데드크로스 여부. 이 배열이 지금 강세/약세 중 어느 쪽을 지지하는지, 어느 MA가 핵심 지지·저항 역할을 하는지 해석.
3. **볼린저밴드**: 현재 밴드 위치. 밴드폭 수축이면 대형 이동이 임박했다는 의미인지, 팽창이면 현재 추세가 강하다는 신호인지 해석.
4. **거래량**: 최근 거래량 추세와 가격과의 관계. 거래량이 추세를 확인(컨펌)하는지 혹은 부정(다이버전스)하는지 해석.
5. **RSI**: 현재 수준과 과매수/과매도 판단. 이 RSI 수준이 반등/추가 하락 중 어느 쪽을 시사하는지, 다이버전스가 있다면 무엇을 의미하는지 해석.
6. **엘리엇 파동**: 현재 파동 단계 추정. 이 단계에서 다음 움직임으로 무엇을 예상할 수 있는지.
7. **주요 지지/저항**: 핵심 가격대. 이 수준이 왜 중요한지 (이전 고점/저점, 심리적 지지 등) 이유 설명.
8. **캔들 패턴**: 최근 주목할 패턴과 그것이 단기적으로 무엇을 암시하는지.
9. **종합 판단**: 지금 매수/매도/관망해야 하는 이유. 진입 조건과 무효화(손절) 조건 명시.

  ], apiKey);
}

  "recommendation": "투자 의견과 주의사항 평문",
  "risk_level": "low 또는 medium 또는 high",
  "signals": ["핵심 정보 1", "핵심 정보 2", "핵심 정보 3"],
  "_noData": true
}`;
  const text = await callGemini(GEMINI_REPORT_MODEL, [{text: prompt}], apiKey);
  try {
    const cleaned = text.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();
    const m = cleaned.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);

  const plain = text.replace(/#{1,6}\s*/g,'').replace(/\*{1,2}([^*]+)\*{1,2}/g,'$1').replace(/---+/g,'').trim();

// ─── Full Analysis Pipeline ───────────────────────────────────────────────────
async function analyzeFull(query, apiKey, onStep, mode='auto') {
  const steps = ['ticker','data','chart','vision','report'];
  let stepIdx = 0;
  const step = (s) => { stepIdx=steps.indexOf(s); onStep&&onStep(s,stepIdx); };

  step('ticker');
  // For crypto mode, resolve coin ID dynamically via CoinGecko search
  let ticker, type;
  if (mode === 'crypto') {
    const coinId = await searchCoinId(query);
    ticker = coinId;
    type = 'crypto';
  } else {
    ({ticker, type} = resolveTicker(query, mode));
  }

  // Korean name → try to resolve ticker dynamically
  if (type === 'stock' && /[가-힣]/.test(ticker) && !ticker.includes('.')) {
    try {
      const found = await searchKrTicker(ticker);
      if (found) ticker = found;
    } catch {}
  }

  step('data');
  let ohlcv, price;
  try {
    ohlcv = await fetchOHLCV(query, '6mo', mode);
    if(!ohlcv || ohlcv.length < 10) throw new Error('데이터 부족');
    price = ohlcv[ohlcv.length-1]?.close;
  } catch(e) {
    // 데이터 수집 실패 → 텍스트 분석으로 폴백
    onStep&&onStep('fallback', -1);
    const r = await analyzeDirectly(query, apiKey);
    r._dataError = `가격 데이터 수집 실패 (${e.message}). 텍스트 기반 분석으로 대체합니다.`;
    return r;
  }

  step('chart');
  let chartB64 = null;
  try {
    chartB64 = await generateChartImage(ohlcv, ticker);
  } catch(e) { console.error('차트 생성 실패:', e); }

  // Compute technical indicators from OHLCV
  const computed = computeTechIndicators(ohlcv);

  step('vision');
  const report = await callGeminiCombined(chartB64, ticker, price, apiKey, computed, '일봉');
  report.ticker   = report.ticker || ticker;
  report.price    = report.price  || price;
  report.chartB64 = chartB64;
  report.computed = computed;

  report._query = query;
  return report;
}

// ─── Backtest ─────────────────────────────────────────────────────────────────
function runBacktest(ohlcv, ticker) {
  const closes = ohlcv.map(d=>d.close);
  const opens  = ohlcv.map(d=>d.open);
  const dates  = ohlcv.map(d=>d.date);
  const ma20   = movingAverage(closes,20);
  const ma60   = movingAverage(closes,60);

  const trades = [];
  let position = null; // {type:'long', entryPrice, entryDate, entryIdx}

  for(let i=61; i<closes.length-1; i++) {
    const prevM20=ma20[i-1], prevM60=ma60[i-1];
    const curM20=ma20[i],   curM60=ma60[i];
    if(!prevM20||!prevM60||!curM20||!curM60) continue;

    // Golden cross
    if(prevM20<=prevM60 && curM20>curM60 && !position) {
      position = {type:'long', entryPrice:opens[i+1], entryDate:dates[i+1], entryIdx:i+1};
    }
    // Dead cross
    else if(prevM20>=prevM60 && curM20<curM60 && position) {
      const exitPrice = opens[i+1];
      const ret = (exitPrice - position.entryPrice)/position.entryPrice * 100;
      trades.push({
        type:'long', entryDate:position.entryDate, exitDate:dates[i+1],
        entryPrice:position.entryPrice, exitPrice, return_pct:ret,
      });
      position = null;
    }
  }
  // Close open position
  if(position && closes.length>0) {
    const exitPrice = closes[closes.length-1];
    const ret = (exitPrice - position.entryPrice)/position.entryPrice * 100;
    trades.push({
      type:'long', entryDate:position.entryDate, exitDate:dates[dates.length-1],
      entryPrice:position.entryPrice, exitPrice, return_pct:ret, open:true,
    });
  }

  const wins = trades.filter(t=>t.return_pct>0);
  const losses = trades.filter(t=>t.return_pct<=0);
  const winRate = trades.length>0 ? wins.length/trades.length*100 : 0;
  const avgWin  = wins.length>0   ? wins.reduce((a,t)=>a+t.return_pct,0)/wins.length : 0;
  const avgLoss = losses.length>0 ? losses.reduce((a,t)=>a+t.return_pct,0)/losses.length : 0;
  const totalReturn = trades.reduce((a,t)=>a*(1+t.return_pct/100),1)*100-100;
  const buyHold = closes.length>0 ? (closes[closes.length-1]-closes[0])/closes[0]*100 : 0;

  return {
    ticker, totalTrades:trades.length, winRate,
    totalReturn, buyHold, excessReturn:totalReturn-buyHold,
    avgWin, avgLoss, trades:trades.slice(-20),
  };
}

async function getPortfolioWithPrices(portfolio) {
  return Promise.all(portfolio.map(async item => {
    let price = null;
    try { price = await fetchCurrentPrice(item.ticker); } catch {}
    const currentValue = price ? price * item.shares : null;
    const pnl = currentValue ? currentValue - item.avgCost*item.shares : null;
    const pnlPct = pnl ? pnl/(item.avgCost*item.shares)*100 : null;
    return {...item, currentPrice:price, currentValue, pnl, pnlPct};
  }));
}

async function computeCorrelationMatrix(portfolio) {
  // Fetch price series for all items
  const series = await Promise.all(portfolio.map(async item => {
    try {
      const ohlcv = await fetchOHLCV(item.ticker, '6mo');
      return {ticker:item.ticker, prices: ohlcv.map(d=>d.close)};
    } catch { return {ticker:item.ticker, prices:[]}; }
  }));

  const n = series.length;
  const matrix = Array(n).fill(null).map(()=>Array(n).fill(0));
  for(let i=0;i<n;i++) {
    for(let j=0;j<n;j++) {
      if(i===j) { matrix[i][j]=1; continue; }
      const ri = pctReturns(series[i].prices);
      const rj = pctReturns(series[j].prices);
      matrix[i][j] = pearsonCorrelation(ri, rj);
    }
  }
  return {labels: series.map(s=>s.ticker), matrix};
}

async function sendTelegramAlert(report, settings) {
  if(!settings.telegramToken || !settings.telegramChatId) return false;
  const msg = `📊 *${report.ticker}* 분석 완료\n포지션: ${report.position}\n신뢰도: ${report.confidence}%\n\n${report.summary?.slice(0,300)}`;
  const url = `https://api.telegram.org/bot${settings.telegramToken}/sendMessage`;
  const resp = await fetch(url, {
    method:'POST', headers:{'content-type':'application/json'},
    body:JSON.stringify({chat_id:settings.telegramChatId, text:msg, parse_mode:'Markdown'}),
  });
  return resp.ok;
}

async function sendDiscordAlert(report, settings) {
  if(!settings.discordWebhook) return false;
  const embed = {
    title:`📊 ${report.ticker} 분석 리포트`,
    color: report.position==='long'?0x22c55e : report.position==='short'?0xef4444 : 0xfbbf24,
    fields:[
      {name:'포지션',value:report.position||'-',inline:true},
      {name:'신뢰도',value:`${report.confidence||50}%`,inline:true},
      {name:'현재가',value:report.price?`$${report.price.toLocaleString()}`:'-',inline:true},
    ],
    description: report.summary?.slice(0,300),
    timestamp: new Date().toISOString(),
  };
  const resp = await fetch(settings.discordWebhook, {
    method:'POST', headers:{'content-type':'application/json'},
    body:JSON.stringify({embeds:[embed]}),
  });
  return resp.ok;
}

class ErrorBoundary extends React.Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err) return (
      <div className="card alert-err" style={{margin:16}}>
        <b>에러 발생:</b> {this.state.err.message}
        <button className="btn-secondary" style={{marginLeft:12,padding:'4px 12px'}}
          onClick={()=>this.setState({err:null})}>닫기</button>
      </div>
    );
    return this.props.children;
  }
}

function Loader({steps, currentStep}) {
  const stepDefs = [

    {key:'chart',  label:'차트 생성'},

    {key:'report', label:'투자 리포트 생성'},
  ];
  return (
    <div className="loader">
      <div className="spinner"/>
      <div className="progress-steps" style={{width:'100%',maxWidth:320}}>
        {stepDefs.map((s,i)=>{
          const done = stepDefs.findIndex(x=>x.key===currentStep) > i;

          return (
            <div key={s.key} className={`step ${done?'done':active?'active':'pending'}`}>

function SearchAutocomplete({value, onChange, onSearch, placeholder}) {
  const [open, setOpen] = useState(false);
  const [filtered, setFiltered] = useState([]);
  const ref = useRef(null);

  useEffect(()=>{
    const handle = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handle);
    return ()=>document.removeEventListener('mousedown', handle);
  },[]);

  const handleChange = v => {
    onChange(v);
    if(v.length>0) {
      const f = SUGGESTIONS.filter(s=>
        s.q.toLowerCase().includes(v.toLowerCase()) ||
        s.label.toLowerCase().includes(v.toLowerCase())
      );
      setFiltered(f); setOpen(f.length>0);
    } else { setOpen(false); }
  };

  const select = s => { onChange(s.q); setOpen(false); onSearch&&onSearch(s.q); };

  return (
    <div className="search-wrap" ref={ref}>
      <input value={value} onChange={e=>handleChange(e.target.value)}
        placeholder={placeholder||'종목명 / 티커 (예: AAPL, 삼성, BTC)'}
        onKeyDown={e=>{if(e.key==='Enter'){setOpen(false);onSearch&&onSearch(value);}}}
        onFocus={()=>{if(filtered.length>0&&value) setOpen(true);}}/>
      {open && (
        <div className="search-suggestions">
          {filtered.map(s=>(
            <div key={s.q} className="suggestion-item" onClick={()=>select(s)}>
              <span>{s.label}</span>
              <span className={`badge ${s.type==='crypto'?'badge-yellow':'badge-blue'}`}>{s.q}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ImageDropzone({onImage}) {
  const [drag, setDrag] = useState(false);
  const [preview, setPreview] = useState(null);
  const inputRef = useRef();

  const processFile = file => {
    if(!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const result = e.target.result;
      setPreview(result);
      // Extract base64 and media type
      const [header, data] = result.split(',');
      const mediaType = header.match(/data:([^;]+)/)[1];
      onImage(data, mediaType);
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <div
        className={`drop-zone ${drag?'active':''}`}
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);processFile(e.dataTransfer.files[0]);}}
        onClick={()=>inputRef.current.click()}
      >
        📊 차트 이미지를 드래그하거나 클릭하여 업로드
        <input ref={inputRef} type="file" accept="image/*" style={{display:'none'}}
          onChange={e=>processFile(e.target.files[0])}/>
      </div>
      {preview && <img src={preview} className="img-preview" alt="preview"/>}
    </div>
  );
}

function toTvSymbol(ticker, query='') {
  if (!ticker) return 'BTCUSD';
  const low = ticker.toLowerCase();
  const q = (query||'').toLowerCase().trim();

  // Korean stocks (.KS / .KQ)
  if (/\.(ks|kq)$/i.test(ticker)) {
    return 'KRX:' + ticker.replace(/\.(ks|kq)$/i, '').toUpperCase();
  }

  // Direct Binance symbol from BINANCE_SYMBOL_MAP (by ticker or original query)
  if (BINANCE_SYMBOL_MAP[low]) return 'BINANCE:' + BINANCE_SYMBOL_MAP[low];
  if (q && BINANCE_SYMBOL_MAP[q]) return 'BINANCE:' + BINANCE_SYMBOL_MAP[q];

  // CoinGecko ID → find matching Binance symbol via reverse CRYPTO_MAP lookup
  const cgToBinance = {
    'bitcoin':'BTCUSDT','ethereum':'ETHUSDT','solana':'SOLUSDT','ripple':'XRPUSDT',
    'binancecoin':'BNBUSDT','dogecoin':'DOGEUSDT','cardano':'ADAUSDT',
    'avalanche-2':'AVAXUSDT','matic-network':'MATICUSDT','chainlink':'LINKUSDT',
    'polkadot':'DOTUSDT','cosmos':'ATOMUSDT','litecoin':'LTCUSDT','tron':'TRXUSDT',
    'shiba-inu':'SHIBUSDT','near':'NEARUSDT','aptos':'APTUSDT','sui':'SUIUSDT',
    'arbitrum':'ARBUSDT','optimism':'OPUSDT','the-open-network':'TONUSDT',
    'internet-computer':'ICPUSDT','stellar':'XLMUSDT','uniswap':'UNIUSDT',
    'hyperliquid':'HYPEUSDT','pudgy-penguins':'PENGUUSDT','movement':'MOVEUSDT',
    'official-trump':'TRUMPUSDT','pepe':'PEPEUSDT','bonk':'BONKUSDT',
    'dogwifcoin':'WIFUSDT','kaspa':'KASUSDT','render-token':'RENDERUSDT',
    'the-sandbox':'SANDUSDT','decentraland':'MANAUSDT','axie-infinity':'AXSUSDT',
    'starknet':'STRKUSDT','celestia':'TIAUSDT','ethena':'ENAUSDT',
    'injective':'INJUSDT','sei-network':'SEIUSDT','fetch-ai':'FETUSDT',
    'worldcoin-wld':'WLDUSDT','jupiter-exchange-solana':'JUPUSDT',
    'pyth-network':'PYTHUSDT','notcoin':'NOTUSDT','floki-inu':'FLOKIUSDT',
    'berachain-bera':'BERAUSDT','sonic-3':'SUSDT','zksync':'ZKUSDT',
    'usual':'USUALUSDT','kaito':'KAITOUSDT',
  };
  if (cgToBinance[low]) return 'BINANCE:' + cgToBinance[low];

  // If ticker ends with USDT it's already an exchange symbol
  if (/USDT$/i.test(ticker)) return 'BINANCE:' + ticker.toUpperCase();

  // US stocks - TradingView resolves automatically
  return ticker.toUpperCase();
}

function InteractiveChart({query, mode, resolvedTicker}) {
  const [tf, setTf]       = useState('1d');
  const [ohlcv, setOhlcv] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const containerRef = useRef();

  useEffect(() => {
    if (!query) return;
    let cancelled = false;
    setLoading(true); setError('');
    const tfCfg = TIMEFRAMES.find(t => t.id === tf);
    fetchOHLCVForTimeframe(query, tfCfg, mode)
      .then(data => { if(!cancelled){ setOhlcv(data); setLoading(false); } })
      .catch(e  => { if(!cancelled){ setError(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [query, tf, mode]);

  useEffect(() => {
    if (!containerRef.current || !ohlcv) return;
    const html = buildCandleChart(ohlcv, resolvedTicker || query);
    containerRef.current.innerHTML = html;
    attachChartHandlers(containerRef.current);
  }, [ohlcv]);

  return (
    <div className="card" style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
        <div style={{fontWeight:700,color:'#94a3b8',fontSize:'.9rem'}}>📊 인터랙티브 차트 — {resolvedTicker||query}</div>
        <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
          {TIMEFRAMES.map(t=>(
            <button key={t.id}
              onClick={()=>setTf(t.id)}
              style={{
                padding:'3px 10px',borderRadius:5,fontSize:'.78rem',fontWeight:600,
                border:'none',cursor:'pointer',transition:'all .15s',
                background:tf===t.id?'linear-gradient(135deg,#3b82f6,#6366f1)':'#1e293b',
                color:tf===t.id?'#fff':'#64748b',
              }}>{t.label}</button>
          ))}
        </div>
      </div>
      {loading && (
        <div style={{textAlign:'center',padding:'24px 0'}}>
          <div className="spinner" style={{margin:'0 auto'}}/>
          <div style={{color:'#64748b',fontSize:'.8rem',marginTop:8}}>차트 데이터 로딩중...</div>
        </div>
      )}
      {error && <div className="alert-box alert-err" style={{fontSize:'.82rem'}}>{error}</div>}

        <div style={{fontSize:'.72rem',color:'#475569',marginBottom:4,textAlign:'right'}}>

}

// ─── Analysis Tab ─────────────────────────────────────────────────────────────
function AnalysisTab({apiKey, settings, serverHasKey}) {
  const [query, setQuery]   = useState('');
  const [mode, setMode]     = useState('auto'); // 'auto' | 'stock' | 'crypto'
  const [loading, setLoading] = useState(false);
  const [step, setStep]     = useState('');
  const [report, setReport] = useState(null);
  const [error, setError]   = useState('');
  const [imgB64, setImgB64] = useState(null);
  const [imgType, setImgType] = useState(null);
  const [logs, setLogs]     = useState(()=>ls_get('cs_logs',[]));

  const saveLog = r => {
    const entry = {date:new Date().toISOString(), ticker:r.ticker, position:r.position, confidence:r.confidence, summary:r.summary?.slice(0,200)};
    const updated = [...ls_get('cs_logs',[]), entry].slice(-200);
    ls_set('cs_logs', updated);
    setLogs(updated);
  };

  const checkReady = () => {
    if(!serverHasKey && !apiKey) {
      setError('API 키가 필요합니다. 우측 상단 ⚙️ 에서 설정해주세요.');
      return false;
    }
    return true;
  };

  const handleAnalyze = async (q, forceMode) => {
    const target = q || query;
    if(!target.trim()) return;
    if(!checkReady()) return;
    const effectiveMode = forceMode || mode;
    setLoading(true); setError(''); setReport(null);
    try {
      const r = await analyzeFull(target, apiKey, (s)=>setStep(s), effectiveMode);
      setReport(r);
      saveLog(r);
      if(settings.autoAlert && r.confidence>=settings.alertThreshold) {
        if(settings.telegramToken) sendTelegramAlert(r, settings).catch(()=>{});
        if(settings.discordWebhook) sendDiscordAlert(r, settings).catch(()=>{});
      }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); setStep(''); }
  };

  const handleImageAnalyze = async () => {
    if(!imgB64) return;
    if(!checkReady()) return;
    setLoading(true); setError(''); setReport(null);
    try {
      const vision = await callClaudeVision(imgB64, imgType||'image/png', apiKey);
      const r = await callClaudeReport(vision, query||'업로드 이미지', null, apiKey);
      r.chartB64 = (imgType==='image/png'||!imgType) ? imgB64 : null;
      r.visionText = vision;
      setReport(r);
      saveLog(r);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // Quick ticker sets per mode
  const stockTickers = [{label:'AAPL',val:'AAPL'},{label:'TSLA',val:'TSLA'},{label:'NVDA',val:'NVDA'},{label:'MSFT',val:'MSFT'},{label:'삼성',val:'005930.KS'}];
  const cryptoTickers = [{label:'BTC',val:'BTC'},{label:'ETH',val:'ETH'},{label:'SOL',val:'SOL'},{label:'XRP',val:'XRP'},{label:'BNB',val:'BNB'},{label:'ADA',val:'ADA'},{label:'DOGE',val:'DOGE'},{label:'TON',val:'TON'}];
  const autoTickers = QUICK_TICKERS;
  const quickList = mode==='stock' ? stockTickers : mode==='crypto' ? cryptoTickers : autoTickers;

  return (
    <div>
      <div className="card">
        <div className="card-title">📊 종목 분석</div>

        {/* 모드 선택 */}
        <ModeSelector mode={mode} onChange={m=>{setMode(m);setError('');}}/>

        {/* 빠른 선택 티커 */}
        <div className="quick-tickers">
          {quickList.map(t=>(
            <div key={t.val} className="quick-ticker"
              onClick={()=>{setQuery(t.val);handleAnalyze(t.val, mode);}}>
              {t.label}
            </div>
          ))}
        </div>
        <div className="analyze-box">
          <SearchAutocomplete value={query} onChange={setQuery} onSearch={q=>handleAnalyze(q, mode)}
            placeholder={mode==='stock'?'주식 티커 (예: AAPL, 005930.KS)':mode==='crypto'?'코인명/심볼 (예: bitcoin, edgex, sol)':'종목명 / 티커 (예: AAPL, 삼성, BTC)'}/>
          <button className="btn-primary" onClick={()=>handleAnalyze()} disabled={loading||!query.trim()}>분석</button>
        </div>

        {/* 이미지 업로드 영역 (항상 노출) */}
        <div style={{borderTop:'1px solid #334155',paddingTop:16,marginTop:4}}>
          <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:8}}>📷 차트 이미지 직접 분석</div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="종목명 (선택 입력)" style={{marginBottom:8}}/>
          <ImageDropzone onImage={(b64,type)=>{setImgB64(b64);setImgType(type);}}/>
          {imgB64 && (
            <button className="btn-primary" style={{marginTop:10,width:'100%'}} onClick={handleImageAnalyze} disabled={loading}>
              이미지 분석 실행
            </button>
          )}
        </div>

        {error && <div className="alert-box alert-err" style={{marginTop:12}}>{error}</div>}
      </div>

      {loading && (
        <div>
          <div className="card" style={{padding:'18px 20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12}}>

function CompareTab({apiKey, serverHasKey}) {
  const [tickers, setTickers] = useState(['AAPL','NVDA']);

  const [loading, setLoading] = useState(false);

      setTickers(prev=>[...prev, input.trim().toUpperCase()]);
      setInput('');
    }
  };

  const removeTicker = t => setTickers(prev=>prev.filter(x=>x!==t));

  const runCompare = async () => {
    if(!serverHasKey && !apiKey) { setError('API 키가 필요합니다.'); return; }
    if(tickers.length<2) { setError('최소 2개 종목이 필요합니다.'); return; }
    setLoading(true); setError(''); setResults([]);
    try {
      const rs = await Promise.all(tickers.map(t=>
        analyzeFull(t, apiKey, ()=>{}).catch(e=>({ticker:t,error:e.message,position:'hold',confidence:0}))
      ));
      setResults(rs);
    } catch(e) { setError(e.message); }

              <tbody>

                    <td><span className={`badge ${r.position==='long'?'badge-green':r.position==='short'?'badge-red':'badge-yellow'}`}>{r.position||'hold'}</span></td>
                    <td>{r.confidence||0}%</td>

// ─── Performance Tab ──────────────────────────────────────────────────────────
function PerformanceTab({apiKey, serverHasKey}) {
  const [logs, setLogs]   = useState(()=>ls_get('cs_logs',[]));
  const [evalResult, setEvalResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const stats = useMemo(()=>{
    if(!logs.length) return null;
    const total = logs.length;
    const byPos = logs.reduce((a,l)=>{a[l.position]=(a[l.position]||0)+1;return a;},{});
    const avgConf = logs.reduce((a,l)=>a+(l.confidence||50),0)/total;
    const recent = [...logs].reverse().slice(0,10);
    return {total, byPos, avgConf: avgConf.toFixed(1), recent};
  },[logs]);

  const autoEvaluate = async () => {
    if(!serverHasKey && !apiKey) return;
    if(logs.length<5) { alert('분석 기록이 5개 이상 필요합니다.'); return; }
    setLoading(true);
    try {
      const sample = [...logs].reverse().slice(0,20);
      const summary = sample.map(l=>`${l.date?.slice(0,10)} ${l.ticker} ${l.position} ${l.confidence}%`).join('\n');
      const text = await callGemini(GEMINI_REPORT_MODEL, [{
        text: `다음은 AI 차트 분석 시스템의 최근 분석 기록입니다:\n\n${summary}\n\n이 분석 패턴을 평가해주세요: 편향성, 신뢰도 분포, 포지션 분포의 적절성, 개선 제안 등을 한국어로 분석해주세요.`,
      }], apiKey);
      setEvalResult(text);
    } catch(e) { console.error(e); }
    finally { setLoading(false); }
  };

  return (
    <div>
      <div className="card">
        <div className="card-title" style={{justifyContent:'space-between'}}>
          <span>📈 성과 분석</span>
          <div style={{display:'flex',gap:8}}>
            <button className="btn-secondary" style={{padding:'6px 12px',fontSize:'.8rem'}} onClick={autoEvaluate} disabled={loading}>AI 평가</button>
            <button className="btn-danger"    style={{padding:'6px 12px',fontSize:'.8rem'}} onClick={()=>{ls_set('cs_logs',[]);setLogs([]);setEvalResult(null);}}>초기화</button>
          </div>
        </div>
        {!stats ? (
          <div className="no-data">분석 기록이 없습니다.<br/>📊 분석 탭에서 종목을 분석해보세요.</div>
        ) : (
          <>
            <div className="grid-3" style={{marginBottom:16}}>
              <div className="stat-card"><div className="stat-value">{stats.total}</div><div className="stat-label">총 분석</div></div>
              <div className="stat-card"><div className="stat-value">{stats.avgConf}%</div><div className="stat-label">평균 신뢰도</div></div>
              <div className="stat-card"><div className="stat-value">{stats.byPos.long||0}</div><div className="stat-label">롱 신호</div></div>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
              {Object.entries(stats.byPos).map(([pos,cnt])=>(
                <div key={pos} className="stat-card" style={{flex:1,minWidth:80}}>
                  <div className={`stat-value pos-${pos}`}>{cnt}</div>
                  <div className="stat-label">{pos}</div>
                </div>
              ))}
            </div>
            <table>
              <thead><tr><th>날짜</th><th>티커</th><th>포지션</th><th>신뢰도</th></tr></thead>
              <tbody>
                {[...logs].reverse().slice(0,20).map((l,i)=>(
                  <tr key={i}>
                    <td style={{fontSize:'.75rem',color:'#64748b'}}>{l.date?.slice(0,16).replace('T',' ')}</td>
                    <td style={{fontWeight:700}}>{l.ticker}</td>
                    <td><span className={`badge ${l.position==='long'?'badge-green':l.position==='short'?'badge-red':'badge-yellow'}`}>{l.position}</span></td>
                    <td>{l.confidence}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>
        )}
      </div>
      {loading && <div className="card"><div className="loader"><div className="spinner"/></div></div>}
      {evalResult && (
        <div className="card">
          <div className="card-title">🤖 AI 성과 평가</div>
          <div className="report-pre">{evalResult}</div>
        </div>
      )}
    </div>
  );
}

// ─── Backtest Tab ─────────────────────────────────────────────────────────────
function BacktestTab() {
  const [query, setQuery]   = useState('AAPL');
  const [period, setPeriod] = useState('6mo');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError]   = useState('');
  const chartRef = useRef();

  const runTest = async () => {
    setLoading(true); setError(''); setResult(null);
    try {
      const ohlcv = await fetchOHLCV(query, period);
      const {ticker} = resolveTicker(query);
      const res = runBacktest(ohlcv, ticker);
      setResult(res);

      // Draw equity curve
      if(chartRef.current) {
        const closes = ohlcv.map(d=>d.close);
        const dates  = ohlcv.map(d=>d.date);
        const ma20   = movingAverage(closes,20);
        const ma60   = movingAverage(closes,60);

        const signals = {buy:[], sell:[], buyDates:[], sellDates:[]};
        for(let i=1;i<closes.length-1;i++) {
          if(!ma20[i-1]||!ma60[i-1]||!ma20[i]||!ma60[i]) continue;
          if(ma20[i-1]<=ma60[i-1] && ma20[i]>ma60[i]) { signals.buy.push(closes[i]); signals.buyDates.push(dates[i]); }
          if(ma20[i-1]>=ma60[i-1] && ma20[i]<ma60[i]) { signals.sell.push(closes[i]); signals.sellDates.push(dates[i]); }
        }

        const layout = {
          paper_bgcolor:'#0f172a',plot_bgcolor:'#0f172a',
          font:{color:'#e2e8f0'},
          title:{text:`${ticker} - MA20/MA60 크로스오버 백테스트`,font:{size:13,color:'#60a5fa'}},
          xaxis:{gridcolor:'#1e293b'},yaxis:{gridcolor:'#1e293b'},
          legend:{bgcolor:'transparent'},margin:{l:50,r:20,t:50,b:40},
        };
        Plotly.react(chartRef.current, [
          {type:'scatter',name:'가격',x:dates,y:closes,mode:'lines',line:{color:'#60a5fa',width:1.5}},
          {type:'scatter',name:'MA20',x:dates,y:ma20,mode:'lines',line:{color:'#fbbf24',width:1.5},connectgaps:false},
          {type:'scatter',name:'MA60',x:dates,y:ma60,mode:'lines',line:{color:'#a78bfa',width:1.5},connectgaps:false},
          {type:'scatter',name:'매수',x:signals.buyDates,y:signals.buy,mode:'markers',marker:{symbol:'triangle-up',size:12,color:'#22c55e'}},
          {type:'scatter',name:'매도',x:signals.sellDates,y:signals.sell,mode:'markers',marker:{symbol:'triangle-down',size:12,color:'#ef4444'}},
        ], layout, {responsive:true});
      }
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const fmtPct = v => `${v>=0?'+':''}${v.toFixed(2)}%`;
  const fmtColor = v => v>=0?'#34d399':'#f87171';

  return (
    <div>
      <div className="card">
        <div className="card-title">🔬 MA20/MA60 크로스오버 백테스트</div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <SearchAutocomplete value={query} onChange={setQuery} onSearch={v=>setQuery(v)}/>
          <select value={period} onChange={e=>setPeriod(e.target.value)} style={{width:'auto',minWidth:100}}>
            <option value="3mo">3개월</option>
            <option value="6mo">6개월</option>
            <option value="1y">1년</option>
            <option value="2y">2년</option>
            <option value="5y">5년</option>
          </select>
          <button className="btn-primary" onClick={runTest} disabled={loading||!query.trim()}>백테스트</button>
        </div>
        {error && <div className="alert-box alert-err">{error}</div>}
      </div>

      {loading && <div className="card"><div className="loader"><div className="spinner"/><p style={{color:'#64748b',marginTop:12}}>데이터 수집 및 백테스트 실행 중...</p></div></div>}

      {result && !loading && (
        <>
