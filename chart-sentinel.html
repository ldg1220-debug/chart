<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Sentinel</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg0: #0d1117; --bg1: #161b22; --bg2: #21262d;
      --border: #30363d; --text: #e6edf3; --text2: #8b949e;
      --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
      --amber: #f59e0b; --purple: #a855f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg0); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    button { cursor: pointer; border: none; font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* 레이아웃 */
    .app { display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: var(--bg1); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--blue), var(--purple)); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .api-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid; }
    .api-ok  { color: var(--green);  border-color: var(--green);  background: rgba(34,197,94,.08); }
    .api-bad { color: var(--amber); border-color: var(--amber); background: rgba(245,158,11,.08); }
    .btn-ghost { background: transparent; color: var(--text2); font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); transition: all .15s; }
    .btn-ghost:hover { background: var(--bg2); color: var(--text); }

    /* 탭 */
    .tabs { background: var(--bg1); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; }
    .tab { padding: 12px 20px; font-size: 14px; color: var(--text2); background: transparent; border-bottom: 2px solid transparent; transition: all .15s; }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover:not(.active) { color: var(--text); }

    /* 메인 */
    .main { flex: 1; padding: 24px; max-width: 1280px; margin: 0 auto; width: 100%; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

    /* 카드 */
    .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 16px; }

    /* 검색바 */
    .search-wrap { display: flex; gap: 8px; margin-bottom: 20px; }
    .search-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--blue); }
    .search-input::placeholder { color: var(--text2); }
    .btn-primary { background: var(--blue); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: opacity .15s; white-space: nowrap; }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* 모드 토글 */
    .mode-toggle { display: flex; background: var(--bg2); border-radius: 8px; padding: 3px; margin-bottom: 16px; width: fit-content; }
    .mode-btn { padding: 6px 16px; border-radius: 6px; font-size: 13px; color: var(--text2); background: transparent; transition: all .15s; }
    .mode-btn.active { background: var(--bg1); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.3); }

    /* 드롭존 */
    .dropzone { border: 2px dashed var(--border); border-radius: 10px; padding: 40px; text-align: center; transition: all .2s; cursor: pointer; }
    .dropzone:hover, .dropzone.drag { border-color: var(--blue); background: rgba(59,130,246,.04); }
    .dropzone-icon { font-size: 32px; margin-bottom: 12px; }
    .dropzone-text { color: var(--text2); font-size: 14px; }
    .dropzone-hint { color: var(--text2); font-size: 12px; margin-top: 6px; }
    .preview-img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }

    /* 로더 */
    .loader-wrap { padding: 40px; text-align: center; }
    .loader-spinner { width: 36px; height: 36px; border: 3px solid var(--bg2); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    .loader-steps { display: flex; flex-direction: column; gap: 8px; text-align: left; max-width: 260px; margin: 20px auto 0; }
    .loader-step { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text2); }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bg2); flex-shrink: 0; }
    .step-dot.done { background: var(--green); }
    .step-dot.active { background: var(--blue); animation: pulse 1s ease-in-out infinite; }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

    /* 에러 */
    .error-card { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; padding: 16px; color: var(--red); font-size: 14px; }

    /* 리포트 */
    .report-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .report-name { font-size: 20px; font-weight: 700; }
    .report-ticker { color: var(--text2); font-size: 13px; margin-top: 2px; }
    .report-price { font-size: 24px; font-weight: 700; color: var(--green); }

    .strategy-box { border-radius: 8px; padding: 16px; margin-bottom: 16px; border-left: 4px solid; }
    .pos-buy  { border-color: var(--green); background: rgba(34,197,94,.06); }
    .pos-sell { border-color: var(--red);   background: rgba(239,68,68,.06); }
    .pos-hold { border-color: var(--amber); background: rgba(245,158,11,.06); }

    .pos-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
    .badge-buy  { background: var(--green); color: #fff; }
    .badge-sell { background: var(--red);   color: #fff; }
    .badge-hold { background: var(--amber); color: #000; }

    .confidence-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .confidence-bar { flex: 1; height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
    .confidence-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width .5s ease; }
    .confidence-label { font-size: 12px; color: var(--text2); white-space: nowrap; }

    .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; }
    .sg-label { color: var(--text2); }
    .sg-value { color: var(--text); font-weight: 500; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--text2); margin: 16px 0 8px; text-transform: uppercase; letter-spacing: .04em; }
    .section-text  { font-size: 14px; color: var(--text); line-height: 1.6; }

    .wl-buttons { display: flex; gap: 8px; margin-top: 16px; }
    .btn-win  { flex: 1; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 600; background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.3); transition: all .15s; }
    .btn-loss { flex: 1; padding: 8px; border-radius: 6px; font-size: 13px; font-weight: 600; background: rgba(239,68,68,.12); color: var(--red);   border: 1px solid rgba(239,68,68,.3); transition: all .15s; }
    .btn-win:hover  { background: rgba(34,197,94,.22); }
    .btn-loss:hover { background: rgba(239,68,68,.22); }
    .btn-win:disabled, .btn-loss:disabled { opacity: .4; cursor: not-allowed; }

    /* 성과 탭 */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-sub   { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .log-table th { text-align: left; padding: 8px 12px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); }
    .log-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .log-table tr:last-child td { border-bottom: none; }
    .log-table tr:hover td { background: var(--bg2); }
    .result-badge { display: inline-flex; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .rb-win     { background: rgba(34,197,94,.15);  color: var(--green); }
    .rb-loss    { background: rgba(239,68,68,.15);  color: var(--red); }
    .rb-pending { background: rgba(139,148,158,.15); color: var(--text2); }
    .wl-sm { display: flex; gap: 4px; }
    .wl-sm button { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .wl-sm .bw { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
    .wl-sm .bl { background: rgba(239,68,68,.12);  color: var(--red);   border: 1px solid rgba(239,68,68,.25); }

    /* 포지션 분포 */
    .pos-dist { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .pos-bar-wrap { flex: 1; min-width: 120px; }
    .pos-bar-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .pos-bar-track { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
    .pos-bar-fill  { height: 100%; border-radius: 3px; transition: width .5s; }

    /* 모니터 탭 */
    .watchlist-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .watchlist-row:last-child { border-bottom: none; }
    .btn-danger { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); padding: 4px 10px; border-radius: 6px; font-size: 12px; transition: all .15s; }
    .btn-danger:hover { background: rgba(239,68,68,.22); }
    .monitor-status { display: flex; align-items: center; gap: 8px; padding: 12px 0; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.on  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
    .status-dot.off { background: var(--text2); }

    /* 모달 */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal    { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 90%; max-width: 440px; }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p  { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
    .modal-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; transition: border-color .15s; }
    .modal-input:focus { border-color: var(--blue); }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* TradingView */
    .tv-container { width: 100%; height: 420px; background: var(--bg2); border-radius: 8px; overflow: hidden; }

    /* 빈 상태 */
    .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* 퀵 버튼 */
    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .quick-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 6px; font-size: 12px; transition: all .15s; }
    .quick-btn:hover { background: var(--bg1); color: var(--text); border-color: var(--blue); }

    /* 차트 이미지 */
    .chart-img-wrap { margin-top: 12px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .chart-img-wrap img { width: 100%; display: block; }

    /* 스크롤 */
    .scroll-area { overflow-y: auto; max-height: 400px; }
    .scroll-area::-webkit-scrollbar { width: 4px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 비교 탭 */
    .compare-input-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .compare-ticker-input { flex: 1; min-width: 100px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; }
    .compare-ticker-input:focus { border-color: var(--blue); }
    .compare-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .compare-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
    .compare-card.error { border-color: rgba(239,68,68,.3); }
    .compare-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .compare-ticker { font-size: 16px; font-weight: 700; }
    .rank-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .rank-1 { background: rgba(245,158,11,.2); color: var(--amber); }
    .rank-2 { background: rgba(139,148,158,.15); color: var(--text2); }
    .rank-3 { background: rgba(180,120,80,.15); color: #cd7f32; }
    .perf-num { font-size: 20px; font-weight: 700; }
    .perf-pos { color: var(--green); }
    .perf-neg { color: var(--red); }
    .compare-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13px; }
    .compare-summary { background: var(--bg2); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; display: flex; gap: 20px; flex-wrap: wrap; }
    .compare-summary-item { display: flex; flex-direction: column; gap: 2px; }
    .compare-summary-label { color: var(--text2); font-size: 11px; }
    .compare-summary-val { font-weight: 600; }

    /* 캡처 버튼 (P1-3) */
    .capture-btn { background: rgba(168,85,247,.12); color: var(--purple); border: 1px solid rgba(168,85,247,.3); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; transition: all .15s; margin-top: 8px; }
    .capture-btn:hover { background: rgba(168,85,247,.22); }
    .capture-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* 자동 검증 (P1-2) */
    .auto-eval-result { background: var(--bg2); border-radius: 8px; padding: 12px 16px; margin-top: 12px; font-size: 13px; }
    .auto-eval-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .auto-eval-item:last-child { border-bottom: none; }

    /* 검색 자동완성 (P2-2) */
    .autocomplete-wrap { position: relative; flex: 1; }
    .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 50; background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; margin-top: 4px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .autocomplete-item { padding: 9px 14px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--bg2); }
    .autocomplete-tag { font-size: 11px; color: var(--text2); }

    /* 내보내기 버튼 (P2-2) */
    .export-btn { background: rgba(59,130,246,.1); color: var(--blue); border: 1px solid rgba(59,130,246,.25); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; transition: all .15s; }
    .export-btn:hover { background: rgba(59,130,246,.2); }
    .export-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* 히스토리 모달 (P2-2) */
    .history-modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 95%; max-width: 680px; max-height: 85vh; overflow-y: auto; }
    .log-row-clickable { cursor: pointer; }
    .log-row-clickable:hover td { background: rgba(59,130,246,.06) !important; }

    /* 설정 드로어 (P2-3) */
    .settings-drawer { position: fixed; top: 0; right: 0; height: 100vh; width: 320px; background: var(--bg1); border-left: 1px solid var(--border); z-index: 200; padding: 24px; transform: translateX(100%); transition: transform .25s ease; }
    .settings-drawer.open { transform: translateX(0); }
    .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 190; }
    .settings-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .settings-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .settings-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 16px; }
    .settings-input:focus { border-color: var(--blue); }
    .settings-radio-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .settings-radio-btn { flex: 1; padding: 8px; border-radius: 8px; font-size: 13px; border: 1px solid var(--border); background: var(--bg2); color: var(--text2); transition: all .15s; text-align: center; }
    .settings-radio-btn.selected { border-color: var(--blue); background: rgba(59,130,246,.1); color: var(--blue); font-weight: 600; }
    .settings-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .settings-section:last-child { border-bottom: none; }

    /* 토스트 알림 */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg1); border: 1px solid var(--border); border-radius: 8px; padding: 10px 18px; font-size: 13px; z-index: 300; box-shadow: 0 4px 16px rgba(0,0,0,.4); animation: fadeInUp .2s ease; pointer-events: none; }
    @keyframes fadeInUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── ErrorBoundary ─────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error("[Chart Sentinel] 렌더 오류:", e, info); }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,textAlign:"center",color:"var(--red)"}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠</div>
        <div style={{fontWeight:700,marginBottom:8}}>렌더링 오류가 발생했습니다</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>{String(this.state.error)}</div>
        <button className="btn-primary" onClick={() => this.setState({ error: null })}>
          다시 시도
        </button>
      </div>
    );
    return this.props.children;
  }
}

// ── 상수 ──────────────────────────────────────────────────────────────────────
const QUICK_TICKERS = ["NVDA", "AAPL", "TSLA", "BTC", "ETH", "삼성전자"];
const ANTHROPIC_DIRECT = "https://api.anthropic.com/v1/messages";

// P2-3: 동적 BASE_URL — 설정에서 오버라이드 가능
function getBaseUrl() {
  const saved = ls_get("cs_backend_url", null);
  if (saved === "direct") return null;
  if (saved) return saved;
  if (window.location.protocol === "file:") return null;
  return window.location.origin;
}

// P2-2: 자동완성 데이터
const AUTOCOMPLETE_TICKERS = [
  { symbol: "NVDA", name: "NVIDIA", tag: "반도체" },
  { symbol: "AAPL", name: "Apple", tag: "빅테크" },
  { symbol: "TSLA", name: "Tesla", tag: "전기차" },
  { symbol: "MSFT", name: "Microsoft", tag: "빅테크" },
  { symbol: "GOOGL", name: "Alphabet", tag: "빅테크" },
  { symbol: "AMZN", name: "Amazon", tag: "빅테크" },
  { symbol: "META", name: "Meta", tag: "소셜" },
  { symbol: "NFLX", name: "Netflix", tag: "미디어" },
  { symbol: "AMD", name: "AMD", tag: "반도체" },
  { symbol: "INTC", name: "Intel", tag: "반도체" },

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function ls_get(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function ls_set(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch (e) {
    if (e && e.name === "QuotaExceededError" && key === "cs_logs" && Array.isArray(val)) {
      // 차트 이미지부터 제거하여 용량 확보 후 재시도
      const trimmed = val.map(({ _chart, ...rest }) => rest);
      try {
        localStorage.setItem(key, JSON.stringify(trimmed));
        console.warn("[Chart Sentinel] localStorage 용량 부족 — 차트 이미지를 제외하고 저장했습니다.");
      } catch {
        // 그래도 실패하면 최근 10개만 저장
        try { localStorage.setItem(key, JSON.stringify(trimmed.slice(0, 10))); } catch {}
        console.warn("[Chart Sentinel] localStorage 용량 부족 — 최근 10건만 유지합니다.");
      }
    }
  }
}

function positionClass(pos) {
  if (!pos) return "pos-hold";
  const p = pos.toLowerCase();
  if (p.includes("매수") || p === "buy" || p === "long") return "pos-buy";
  if (p.includes("매도") || p === "sell" || p === "short") return "pos-sell";
  return "pos-hold";
}
function badgeClass(pos) {
  const c = positionClass(pos);
  return c === "pos-buy" ? "badge-buy" : c === "pos-sell" ? "badge-sell" : "badge-hold";
}

// ── TradingView 위젯 (P1-3: html2canvas 캡처 포함) ───────────────────────────
function TradingViewWidget({ symbol, onCapture }) {
  const ref = useRef(null);
  const [capturing, setCapturing] = useState(false);
  const [widgetError, setWidgetError] = useState(false);

  useEffect(() => {
    if (!symbol || !ref.current) return;
    setWidgetError(false);
    ref.current.innerHTML = "";
    const s = document.createElement("script");
    s.src = "https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js";
    s.async = true;
    s.onerror = () => setWidgetError(true);
    s.innerHTML = JSON.stringify({
      symbol, interval: "D", theme: "dark", style: "1",
      locale: "kr", width: "100%", height: 400,
      hide_side_toolbar: false, allow_symbol_change: true,
    });
    ref.current.appendChild(s);
  }, [symbol]);

  const handleCapture = async () => {
    if (!ref.current || !onCapture) return;
    setCapturing(true);
    try {
      if (typeof html2canvas === "undefined") {
        throw new Error("html2canvas 라이브러리를 불러오지 못했습니다");
      }
      const canvas = await html2canvas(ref.current, {
        useCORS: true, allowTaint: true,
        backgroundColor: "#0d1117", scale: 1,
        logging: false,
      });
      canvas.toBlob(blob => {
        if (blob) onCapture(blob);
        else onCapture(null, "캡처 실패: blob 변환 오류");
      }, "image/png");
    } catch (e) {
      onCapture(null, e.message || "캡처 중 오류 발생");
    } finally {
      setCapturing(false);
    }
  };

  return (
    <div>
      {widgetError ? (
        <div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",
          background:"var(--bg2)",borderRadius:8,color:"var(--text2)",fontSize:13}}>
          ⚠ TradingView 차트를 불러올 수 없습니다 (네트워크 또는 광고 차단기 확인)
        </div>
      ) : (
        <div ref={ref} className="tv-container" />
      )}
      {onCapture && !widgetError && (
        <button className="capture-btn" onClick={handleCapture} disabled={capturing || !symbol}>
          {capturing ? "캡처 중..." : "📸 차트 캡처 → AI 분석"}
        </button>
      )}
    </div>
  );
}

// ── P2-2: 검색 자동완성 ───────────────────────────────────────────────────────
function SearchAutocomplete({ value, onChange, onSelect, onSubmit, loading, prevTickers }) {
  const [open, setOpen] = useState(false);
  const [activeIdx, setActiveIdx] = useState(-1);
  const inputRef = useRef(null);

  const q = value.trim().toLowerCase();
  const suggestions = q.length < 1 ? [] : [
    ...AUTOCOMPLETE_TICKERS.filter(t =>
      t.symbol.toLowerCase().startsWith(q) || t.name.toLowerCase().includes(q)
    ).slice(0, 5),
    ...prevTickers
      .filter(t => t.toLowerCase().startsWith(q) && !AUTOCOMPLETE_TICKERS.find(a => a.symbol === t))
      .slice(0, 3)
      .map(t => ({ symbol: t, name: "", tag: "이전" })),
  ].slice(0, 7);

  const handleKey = (e) => {
    if (!open || suggestions.length === 0) {
      if (e.key === "Enter") { onSubmit(); setOpen(false); }
      return;
    }
    if (e.key === "ArrowDown") { e.preventDefault(); setActiveIdx(i => Math.min(i+1, suggestions.length-1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActiveIdx(i => Math.max(i-1, -1)); }
    else if (e.key === "Enter") {
      e.preventDefault();
      if (activeIdx >= 0) { onSelect(suggestions[activeIdx].symbol); setOpen(false); }
      else { onSubmit(); setOpen(false); }
    } else if (e.key === "Escape") { setOpen(false); }
  };

  return (
    <div className="autocomplete-wrap">
      <input className="search-input"
        ref={inputRef}
        placeholder="종목 검색 (NVDA, BTC, 삼성전자...)"
        value={value}
        onChange={e => { onChange(e.target.value); setOpen(true); setActiveIdx(-1); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        onKeyDown={handleKey}
      />
      {open && suggestions.length > 0 && (
        <div className="autocomplete-list">
          {suggestions.map((s, i) => (
            <div key={s.symbol}
              className={`autocomplete-item${i === activeIdx ? " active" : ""}`}
              onMouseDown={() => { onSelect(s.symbol); setOpen(false); }}>
              <span><strong>{s.symbol}</strong>{s.name ? ` — ${s.name}` : ""}</span>
              <span className="autocomplete-tag">{s.tag}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── P2-2: 리포트 내보내기 ─────────────────────────────────────────────────────
async function exportReportAsPng(reportEl, ticker) {
  if (typeof html2canvas === "undefined") { alert("html2canvas 로딩 중..."); return; }
  const canvas = await html2canvas(reportEl, {
    backgroundColor: "#161b22", scale: 2, logging: false, useCORS: true,
  });
  const link = document.createElement("a");
  link.download = `chart-sentinel-${ticker}-${new Date().toISOString().slice(0,10)}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// ── 이미지 드롭존 ─────────────────────────────────────────────────────────────
function ImageDropzone({ onFile, preview }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef(null);

  const handleFile = (f) => { if (f && f.type.startsWith("image/")) onFile(f); };
  const onDrop = (e) => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); };

  return preview ? (
    <div>
      <img src={preview} alt="업로드 이미지" className="preview-img" />
      <button className="btn-ghost" style={{marginTop:8,fontSize:12}} onClick={() => onFile(null)}>다른 이미지 선택</button>
    </div>
  ) : (
    <div
      className={`dropzone${drag ? " drag" : ""}`}
      onDragOver={e => { e.preventDefault(); setDrag(true); }}
      onDragLeave={() => setDrag(false)}
      onDrop={onDrop}
      onClick={() => inputRef.current?.click()}
    >
      <div className="dropzone-icon">📊</div>
      <div className="dropzone-text">차트 이미지를 드래그하거나 클릭하여 업로드</div>
      <div className="dropzone-hint">PNG, JPG, WebP 지원</div>
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={e => handleFile(e.target.files[0])} />
    </div>
  );
}

  const [autoEvalLoading, setAutoEvalLoading] = useState(false);
  const [autoEvalResult, setAutoEvalResult] = useState(null);
  const evaluated = logs.filter(l => l.result === "win" || l.result === "loss");
  const wins  = evaluated.filter(l => l.result === "win").length;
  const winRate = evaluated.length ? Math.round(wins / evaluated.length * 100) : 0;
  const confidences = logs.map(l => parseFloat(l.confidence)).filter(c => !isNaN(c));
  const avgConf = confidences.length ? (confidences.reduce((a,b)=>a+b,0)/confidences.length).toFixed(1) : "0.0";

  const positions = {};
  logs.forEach(l => {
    const p = l.position || "기타";

                </tr>
              </thead>
              <tbody>
                {logs.map(l => (
                  <tr key={l.id} className="log-row-clickable"
                    onClick={() => l._report && setHistoryModal({ report: l._report, chart: l._chart })}>
                    <td><strong>{l.ticker}</strong></td>
                    <td><span className={`pos-badge ${badgeClass(l.position)}`} style={{fontSize:11,padding:"2px 8px"}}>{l.position||"-"}</span></td>
                    <td>{l.confidence||"-"}</td>
                    <td style={{fontSize:12,color:"var(--text2)"}}>{l.entry_zone||"-"}</td>
                    <td style={{fontSize:11,color:"var(--text2)"}}>{l.timestamp ? new Date(l.timestamp).toLocaleDateString("ko") : "-"}</td>
                    <td>
                      <span className={`result-badge ${l.result==="win"?"rb-win":l.result==="loss"?"rb-loss":"rb-pending"}`}>
                        {l.result==="win"?"✓ Win":l.result==="loss"?"✗ Loss":"대기"}
                      </span>
                    </td>
                    <td onClick={e => e.stopPropagation()}>
                      {l.result === "pending" && (
                        <div className="wl-sm">
                          <button className="bw" onClick={() => onUpdateResult(l.id, "win")}>W</button>
                          <button className="bl" onClick={() => onUpdateResult(l.id, "loss")}>L</button>
                        </div>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── 비교 탭 (P1-1) ────────────────────────────────────────────────────────────
function CompareTab({ addLog, baseUrl }) {
  const [tickers, setTickers] = useState(["", "", ""]);
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);
  const [summary, setSummary] = useState(null);
  const [error, setError] = useState("");

  const handleCompare = async () => {
    const valid = tickers.filter(t => t.trim());
    if (valid.length < 2) { setError("최소 2개 종목을 입력하세요"); return; }
    if (!baseUrl) { setError("비교 분석은 백엔드 서버(localhost:8000)가 필요합니다"); return; }

    setError(""); setResults(null); setSummary(null); setLoading(true);
    try {
      const resp = await fetch(`${baseUrl}/api/compare?tickers=${encodeURIComponent(valid.join(","))}`);
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || `서버 오류 ${resp.status}`); }
      const data = await resp.json();
      setResults(data.results);
      setSummary(data.summary);
      // 성과 로그 추가
      data.results.forEach(r => { if (r.report) addLog(r.report); });
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const rankClass = (rank) => rank === 1 ? "rank-1" : rank === 2 ? "rank-2" : "rank-3";
  const rankLabel = (rank) => rank === 1 ? "🥇 1위" : rank === 2 ? "🥈 2위" : rank === 3 ? "🥉 3위" : "-";

  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">종목 비교 분석</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>
          2~3개 종목을 동시에 분석하여 3개월 수익률 기준으로 상대 강도를 비교합니다.
        </div>
        <div className="compare-input-row">
          {tickers.map((t, i) => (
            <input key={i} className="compare-ticker-input"
              placeholder={`종목 ${i+1} (예: ${["NVDA","AAPL","TSLA"][i]})`}
              value={t}
              onChange={e => setTickers(prev => prev.map((v, j) => j === i ? e.target.value : v))}
              onKeyDown={e => e.key === "Enter" && !loading && handleCompare()} />
          ))}
          <button className="btn-primary" onClick={handleCompare}
            disabled={loading || tickers.filter(t=>t.trim()).length < 2}>
            {loading ? "분석 중..." : "⚡ 비교 분석"}
          </button>
        </div>
        <div className="quick-btns">
          {[["NVDA","AAPL","TSLA"],["BTC","ETH","SOL"],["삼성전자","SK하이닉스","NAVER"]].map((preset, i) => (
            <button key={i} className="quick-btn"
              onClick={() => setTickers([...preset])}>
              {preset.join(" vs ")}
            </button>
          ))}
        </div>
        {error && <div className="error-card" style={{marginTop:12}}>⚠ {error}</div>}
      </div>

      {loading && (
        <div className="card" style={{textAlign:"center",padding:"40px 20px"}}>
          <div className="loader-spinner" />
          <div style={{color:"var(--text2)",fontSize:14,marginTop:12}}>
            {tickers.filter(t=>t.trim()).length}개 종목 병렬 분석 중...
          </div>
        </div>
      )}

      {summary && (
        <div className="compare-summary">
          <div className="compare-summary-item">
            <span className="compare-summary-label">최고 성과</span>
            <span className="compare-summary-val" style={{color:"var(--green)"}}>🏆 {summary.best_performer}</span>
          </div>
          <div className="compare-summary-item">
            <span className="compare-summary-label">최저 성과</span>
            <span className="compare-summary-val" style={{color:"var(--red)"}}>📉 {summary.worst_performer}</span>
          </div>
          <div className="compare-summary-item">
            <span className="compare-summary-label">비교 종목</span>
            <span className="compare-summary-val">{(summary.tickers || []).join(" · ")}</span>
          </div>
        </div>
      )}

      {results && (
        <div className="compare-grid">
          {results.map((r, i) => (
            <div key={i} className={`compare-card${r.error ? " error" : ""}`}>
              <div className="compare-header">
                <div>
                  <div className="compare-ticker">{r.ticker}</div>
                  <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>
                    {r.report?.name || r.query}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {r.relative_rank && (
                    <span className={`rank-badge ${rankClass(r.relative_rank)}`}>
                      {rankLabel(r.relative_rank)}
                    </span>
                  )}
                </div>
              </div>

              {r.error ? (
                <div style={{color:"var(--red)",fontSize:13}}>⚠ {r.error}</div>
              ) : (
                <>
                  <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                    <span className={`perf-num ${r.perf_3m >= 0 ? "perf-pos" : "perf-neg"}`}>
                      {r.perf_3m >= 0 ? "+" : ""}{r.perf_3m}%
                    </span>
                    <span style={{fontSize:12,color:"var(--text2)"}}>3개월 수익률</span>
                  </div>

                  {r.report?.current_price && (
                    <div style={{fontSize:13,color:"var(--text2)",marginBottom:8}}>
                      현재가: <strong style={{color:"var(--text)"}}>{r.report.current_price}</strong>
                    </div>
                  )}

                  {r.report?.strategy && (
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                      <span className={`pos-badge ${badgeClass(r.report.strategy.position)}`}
                        style={{fontSize:11,padding:"2px 10px"}}>
                        {r.report.strategy.position}
                      </span>
                      <span style={{fontSize:12,color:"var(--text2)"}}>
                        확신도 {r.report.strategy.confidence}/10
                      </span>
                    </div>
                  )}

                  {r.chart_image && (
                    <div className="chart-img-wrap" style={{marginBottom:8}}>
                      <img src={`data:image/png;base64,${r.chart_image}`} alt={r.ticker} />
                    </div>
                  )}

                  <div className="compare-section">
                    <div style={{color:"var(--text2)",marginBottom:4}}>기술적 분석</div>
                    <div style={{lineHeight:1.5}}>{r.report?.technical_analysis?.summary || "-"}</div>
                  </div>

                  <div className="compare-section">
                    <div style={{color:"var(--text2)",marginBottom:4}}>전략 근거</div>
                    <div style={{lineHeight:1.5}}>{r.report?.strategy?.rationale || "-"}</div>
                  </div>

                  <div className="compare-section" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:12}}>
                    <span style={{color:"var(--text2)"}}>진입</span>
                    <span>{r.report?.strategy?.entry_zone || "-"}</span>
                    <span style={{color:"var(--text2)"}}>목표</span>
                    <span>{(r.report?.strategy?.target_prices || [])[0] || "-"}</span>
                    <span style={{color:"var(--text2)"}}>손절</span>
                    <span>{r.report?.strategy?.stop_loss || "-"}</span>
                  </div>
                </>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  );
}

// ── P3-2: 백테스팅 탭 ────────────────────────────────────────────────────────
function BacktestTab() {
  const [ticker, setTicker] = useState("");
  const [period, setPeriod] = useState("6mo");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");

  const run = async () => {
    if (!ticker.trim()) return;
    const bu = getBaseUrl();
    if (!bu) { setError("백엔드 서버 연결이 필요합니다"); return; }
    setLoading(true); setError(""); setResult(null);
    try {
      const resp = await fetch(`${bu}/api/backtest?ticker=${encodeURIComponent(ticker.trim())}&period=${period}`);
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || `오류 ${resp.status}`); }
      setResult(await resp.json());
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const colorPct = (v) => v > 0 ? "var(--green)" : v < 0 ? "var(--red)" : "var(--text2)";

  return (
    <div>
      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">백테스팅 — MA20/MA60 크로스오버</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>
          MA20과 MA60의 골든/데드 크로스를 기반으로 과거 데이터에서 전략 성과를 시뮬레이션합니다.
        </div>
        <div className="search-wrap">
          <input className="search-input" placeholder="종목 (AAPL, BTC, 삼성전자...)"
            value={ticker} onChange={e => setTicker(e.target.value)}
            onKeyDown={e => e.key === "Enter" && !loading && run()} />
          <select value={period} onChange={e => setPeriod(e.target.value)}
            style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",color:"var(--text)",fontSize:14,outline:"none"}}>
            {[["1mo","1개월"],["3mo","3개월"],["6mo","6개월"],["1y","1년"],["2y","2년"]].map(([v,l]) =>
              <option key={v} value={v}>{l}</option>
            )}
          </select>
          <button className="btn-primary" onClick={run} disabled={loading || !ticker.trim()}>
            {loading ? "실행 중..." : "▶ 백테스트"}
          </button>
        </div>
        {error && <div className="error-card" style={{marginTop:12}}>⚠ {error}</div>}
      </div>

      {loading && (
        <div className="card" style={{textAlign:"center",padding:"40px"}}>
          <div className="loader-spinner" /><div style={{color:"var(--text2)",marginTop:12}}>시뮬레이션 실행 중...</div>
        </div>
      )}

      {result && (
        <>
          <div className="stats-grid" style={{marginBottom:20}}>
            {[
              ["총 거래수", result.total_trades+"건", ""],
              ["승률", result.win_rate+"%", result.win_rate >= 50 ? "var(--green)" : "var(--red)"],
              ["전략 수익", (result.total_return_pct > 0 ? "+" : "")+result.total_return_pct+"%", colorPct(result.total_return_pct)],
              ["Buy&Hold", (result.buy_and_hold_pct > 0 ? "+" : "")+result.buy_and_hold_pct+"%", colorPct(result.buy_and_hold_pct)],
            ].map(([label,val,color]) => (
              <div key={label} className="stat-card">
                <div className="stat-label">{label}</div>
                <div className="stat-value" style={{fontSize:20,color:color||"var(--text)"}}>{val}</div>
              </div>
            ))}
          </div>

          <div className="card" style={{marginBottom:20}}>
            <div className="card-title">전략 요약</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
              {[
                ["전략",result.strategy],["분석 기간",result.period_days+"일"],
                ["초과 수익",((result.excess_return_pct>0?"+":"")+result.excess_return_pct+"%")+" vs B&H"],
                ["평균 수익","+"+result.avg_win_pct+"%"],["평균 손실",result.avg_loss_pct+"%"],
              ].map(([k,v]) => (
                <React.Fragment key={k}>
                  <span style={{color:"var(--text2)"}}>{k}</span>
                  <span style={{fontWeight:500}}>{v}</span>
                </React.Fragment>
              ))}
            </div>
          </div>

          {result.trades.length > 0 && (
            <div className="card">
              <div className="card-title">최근 거래 내역 (최대 20건)</div>
              <div className="scroll-area">
                <table className="log-table">
                  <thead><tr><th>진입일</th><th>청산일</th><th>진입가</th><th>청산가</th><th>수익률</th><th>결과</th></tr></thead>
                  <tbody>
                    {result.trades.map((t, i) => (
                      <tr key={i}>
                        <td style={{fontSize:12}}>{t.entry_date}</td>
                        <td style={{fontSize:12}}>{t.exit_date}</td>
                        <td style={{fontSize:12}}>{t.entry_price}</td>
                        <td style={{fontSize:12}}>{t.exit_price}</td>

                        <td><span className={`result-badge ${t.result==="win"?"rb-win":t.result==="loss"?"rb-loss":"rb-pending"}`}>
                          {t.result==="win"?"✓":t.result==="loss"?"✗":"보유"}
                        </span></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── P3-3: 포트폴리오 탭 ──────────────────────────────────────────────────────
function PortfolioTab() {
  const [holdings, setHoldings] = useState([]);
  const [summary, setSummary] = useState(null);
  const [loading, setLoading] = useState(false);
  const [addForm, setAddForm] = useState({ ticker:"", shares:"", avg_price:"" });
  const [corrData, setCorrData] = useState(null);
  const [corrLoading, setCorrLoading] = useState(false);
  const [error, setError] = useState("");

  const bu = getBaseUrl();

  const load = async () => {
    if (!bu) return;
    setLoading(true);
    try {
      const resp = await fetch(`${bu}/api/portfolio`);
      const data = await resp.json();
      setHoldings(data.holdings || []);
      setSummary(data.summary);
    } catch {}
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const handleAdd = async () => {
    if (!addForm.ticker || !addForm.shares || !addForm.avg_price) return;
    try {
      const resp = await fetch(`${bu}/api/portfolio/add`, {
        method:"POST", headers:{"content-type":"application/json"},
        body: JSON.stringify({ ticker: addForm.ticker, shares: parseFloat(addForm.shares), avg_price: parseFloat(addForm.avg_price) }),
      });
      const data = await resp.json();
      setHoldings(data.holdings || []); setSummary(data.summary);
      setAddForm({ ticker:"", shares:"", avg_price:"" });
    } catch (e) { setError(e.message); }
  };

  const handleRemove = async (ticker) => {
    try {
      const resp = await fetch(`${bu}/api/portfolio/${ticker}`, { method:"DELETE" });
      const data = await resp.json();
      setHoldings(data.holdings || []); setSummary(data.summary);
    } catch {}
  };

  const loadCorr = async () => {
    if (!bu || holdings.length < 2) return;
    setCorrLoading(true); setCorrData(null);
    try {
      const resp = await fetch(`${bu}/api/portfolio/correlation`);
      if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail); }
      setCorrData(await resp.json());
    } catch (e) { setError(e.message); }
    finally { setCorrLoading(false); }
  };

  const pnlColor = (v) => v > 0 ? "var(--green)" : v < 0 ? "var(--red)" : "var(--text2)";

  if (!bu) return (
    <div className="empty"><div className="empty-icon">🏦</div>
      <div className="empty-text">포트폴리오 기능은 백엔드 서버(localhost:8000)가 필요합니다.<br />설정에서 연동 방식을 변경해주세요.</div></div>
  );

  return (
    <div>
      {summary && (
        <div className="stats-grid" style={{marginBottom:20}}>
          {[
            ["총 평가액", "$"+summary.total_value.toLocaleString(), ""],
            ["총 매입액", "$"+summary.total_cost.toLocaleString(), ""],
            ["손익", (summary.total_pnl>=0?"+$":"-$")+Math.abs(summary.total_pnl).toLocaleString(), pnlColor(summary.total_pnl)],
            ["수익률", (summary.total_pnl_pct>=0?"+":"")+summary.total_pnl_pct+"%", pnlColor(summary.total_pnl_pct)],
          ].map(([label,val,color]) => (
            <div key={label} className="stat-card">
              <div className="stat-label">{label}</div>
              <div className="stat-value" style={{fontSize:18,color:color||"var(--text)"}}>{val}</div>
            </div>
          ))}
        </div>
      )}

      <div className="card" style={{marginBottom:20}}>
        <div className="card-title">종목 추가</div>
        <div className="compare-input-row">
          <input className="compare-ticker-input" placeholder="종목 (AAPL)" value={addForm.ticker}
            onChange={e => setAddForm(f => ({...f, ticker:e.target.value}))} />
          <input className="compare-ticker-input" placeholder="수량" type="number" value={addForm.shares}
            onChange={e => setAddForm(f => ({...f, shares:e.target.value}))} />
          <input className="compare-ticker-input" placeholder="매입단가" type="number" value={addForm.avg_price}
            onChange={e => setAddForm(f => ({...f, avg_price:e.target.value}))} />
          <button className="btn-primary" onClick={handleAdd}>추가</button>
          <button className="btn-ghost" onClick={load} disabled={loading}>{loading?"로딩...":"🔄 갱신"}</button>
        </div>
        {error && <div className="error-card" style={{marginTop:8}}>⚠ {error}</div>}
      </div>

      {holdings.length === 0 ? (
        <div className="card"><div className="empty"><div className="empty-icon">🏦</div><div className="empty-text">보유 종목을 추가해주세요</div></div></div>
      ) : (
        <div className="card" style={{marginBottom:20}}>
          <div className="card-title">보유 종목</div>
          <div className="scroll-area">
            <table className="log-table">
              <thead><tr><th>종목</th><th>수량</th><th>매입단가</th><th>현재가</th><th>평가액</th><th>손익</th><th>비중</th><th></th></tr></thead>
              <tbody>
                {holdings.map(h => (
                  <tr key={h.ticker}>
                    <td><strong>{h.ticker}</strong><div style={{fontSize:11,color:"var(--text2)"}}>{h.name}</div></td>
                    <td>{h.shares}</td>
                    <td>${h.avg_price.toLocaleString()}</td>
                    <td>${h.current_price.toLocaleString()}</td>
                    <td>${h.current_value.toLocaleString()}</td>
                    <td style={{color:pnlColor(h.pnl),fontWeight:600}}>
                      {h.pnl>=0?"+":""}{h.pnl_pct}%
                    </td>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:40,height:4,background:"var(--bg2)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${h.weight_pct}%`,height:"100%",background:"var(--blue)",borderRadius:2}} />
                        </div>
                        <span style={{fontSize:11,color:"var(--text2)"}}>{h.weight_pct}%</span>
                      </div>
                    </td>
                    <td><button className="btn-danger" onClick={() => handleRemove(h.ticker)}>제거</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {holdings.length >= 2 && (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div className="card-title" style={{margin:0}}>상관관계 매트릭스 (90일)</div>
            <button className="btn-ghost" onClick={loadCorr} disabled={corrLoading}>
              {corrLoading ? "계산 중..." : "📊 계산"}
            </button>
          </div>
          {corrData && (
            <div className="scroll-area">
              <table className="log-table">
                <thead>
                  <tr>
                    <th></th>
                    {corrData.tickers.map(t => <th key={t}>{t}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {corrData.matrix.map(row => (
                    <tr key={row.ticker}>
                      <td><strong>{row.ticker}</strong></td>
                      {corrData.tickers.map(t => {
                        const v = row.correlations[t];
                        const abs = Math.abs(v);
                        const bg = v === 1 ? "rgba(59,130,246,.15)"
                          : abs > 0.7 ? (v > 0 ? "rgba(239,68,68,.12)" : "rgba(34,197,94,.12)")
                          : abs > 0.4 ? "rgba(245,158,11,.08)" : "transparent";
                        return (
                          <td key={t} style={{background:bg,fontWeight: v===1 ? 700 : 400,textAlign:"center",fontSize:12}}>
                            {v.toFixed(2)}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{marginTop:8,fontSize:11,color:"var(--text2)"}}>
                🔴 강한 양의 상관 (&gt;0.7) · 🟢 강한 음의 상관 (&lt;-0.7) · 🟡 중간 상관
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── API 키 모달 ───────────────────────────────────────────────────────────────
function ApiKeyModal({ onSave }) {
  const [key, setKey] = useState("");
  return (
    <div className="modal-bg">
      <div className="modal">
        <h2>🛡 Chart Sentinel</h2>
        <p>
          AI 기반 차트 분석을 시작하려면 Anthropic API 키가 필요합니다.<br />
          키는 브라우저 로컬에만 저장되며 외부로 전송되지 않습니다.
        </p>
        <input className="modal-input" type="password" placeholder="sk-ant-api03-..."
          value={key} onChange={e => setKey(e.target.value)}
          onKeyDown={e => e.key === "Enter" && key.startsWith("sk-") && onSave(key)} />
        <div style={{fontSize:12,color:"var(--text2)"}}>
          백엔드 서버(localhost:8000)가 실행 중이면 API 키 없이도 서버의 키를 사용합니다.
        </div>
        <div className="modal-footer">
          <button className="btn-ghost" onClick={() => onSave("")}>나중에 설정</button>
          <button className="btn-primary" onClick={() => onSave(key)} disabled={!key.startsWith("sk-ant") && key !== ""}>저장</button>
        </div>
      </div>
    </div>
  );
}

// ── 직접 Anthropic API 호출 (독립 실행 모드) ──────────────────────────────────
async function analyzeDirectly(query, apiKey) {
  const prompt = `당신은 전문 금융 분석가입니다. "${query}" 종목/자산에 대해 현재 시장 상황을 기반으로 종합 분석을 수행하세요.

아래 JSON 스키마를 정확히 따라 응답하세요 (JSON 외 텍스트 금지):

{
  "ticker": "${query.toUpperCase()}",
  "name": "종목명",
  "timeframe": "일봉",
  "current_price": "현재가 (알 수 없으면 N/A)",
  "technical_analysis": {
    "trend": "추세 분석",
    "support": "지지선",
    "resistance": "저항선",
    "indicators": "기술적 지표",
    "pattern": "차트 패턴",
    "summary": "기술적 분석 요약"
  },
  "fundamental_analysis": {
    "news_sentiment": "뉴스 감성",
    "key_catalysts": "주요 촉매",
    "macro_impact": "매크로 영향",
    "summary": "기본적 분석 요약"
  },
  "strategy": {
    "position": "매수 또는 매도 또는 관망",
    "entry_zone": "진입 구간",
    "stop_loss": "손절 기준",
    "target_prices": ["1차 목표", "2차 목표"],
    "risk_reward": "리스크/리워드",
    "confidence": 6,
    "rationale": "전략 근거"
  }
}`;

  const resp = await fetch(ANTHROPIC_DIRECT, {
    method: "POST",
    headers: {
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "content-type": "application/json",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-opus-4-20250514",
      max_tokens: 2000,
      messages: [{ role: "user", content: prompt }],
    }),
  });

  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || `API 오류 ${resp.status}`);
  }

  const data = await resp.json();
  let raw = data.content[0].text.trim();
  if (raw.includes("```")) raw = raw.split("```json").pop().split("```")[0].trim();
  return JSON.parse(raw);
}

// ── 메인 앱 ───────────────────────────────────────────────────────────────────
function App() {
  // P2-3: 설정 상태
  const [settings, setSettings] = useState(() => ls_get("cs_settings", { mode: "auto", backendUrl: "http://localhost:8000", apiKey: "" }));
  const [showSettings, setShowSettings] = useState(false);
  const baseUrl = settings.mode === "direct" ? null : settings.mode === "backend" ? settings.backendUrl : getBaseUrl();
  const effectiveApiKey = settings.apiKey || ls_get("cs_api_key", "");

  const [showKeyModal, setShowKeyModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => ls_get("cs_api_key", ""));
  const [logs, setLogs] = useState(() => ls_get("cs_logs", []));
  const [watchlist, setWatchlist] = useState([]);
  const [monitoring, setMonitoring] = useState(false);

  const [activeTab, setActiveTab] = useState("analysis");
  const [mode, setMode] = useState("search");
  const [query, setQuery] = useState("");
  const [imgFile, setImgFile] = useState(null);
  const [imgPreview, setImgPreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadStep, setLoadStep] = useState(0);
  const [report, setReport] = useState(null);
  const [chartImage, setChartImage] = useState(null);
  const [currentLogId, setCurrentLogId] = useState(null);
  const [error, setError] = useState("");

  // P2-2: 히스토리 모달 + 토스트
  const [historyModal, setHistoryModal] = useState(null); // { report, chartImage }
  const [toast, setToast] = useState("");

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2500);
  };

  // P2-2: 이전 분석 종목 목록 (자동완성용)
  const prevTickers = [...new Set(logs.map(l => l.ticker).filter(Boolean))];

  useEffect(() => {
    if (!effectiveApiKey && !baseUrl) setShowKeyModal(true);
  }, []);

  const saveApiKey = (key) => {
    setApiKey(key);
    ls_set("cs_api_key", key);
    setShowKeyModal(false);
  };

  const saveSettings = (s) => {
    setSettings(s);
    ls_set("cs_settings", s);
    if (s.apiKey) { setApiKey(s.apiKey); ls_set("cs_api_key", s.apiKey); }
  };

  // P0-1 + P2-2: localStorage 영속화 + full report 저장
  const addLog = useCallback((rep, imgB64) => {
    const entry = {
      id: String(Date.now()),
      timestamp: new Date().toISOString(),
      ticker: rep.ticker || "",
      name: rep.name || "",
      position: rep.strategy?.position || "",
      confidence: rep.strategy?.confidence || "",
      entry_zone: rep.strategy?.entry_zone || "",
      stop_loss: rep.strategy?.stop_loss || "",
      target_prices: rep.strategy?.target_prices || [],
      current_price: rep.current_price || "",
      timeframe: rep.timeframe || "",
      result: "pending",
      _report: rep,
      _chart: imgB64 || null,
    };
    setLogs(prev => {
      const updated = [entry, ...prev].slice(0, 100);
      ls_set("cs_logs", updated);
      return updated;
    });
    return entry.id;
  }, []);

  const updateLogResult = useCallback((id, result) => {
    setLogs(prev => {
      const updated = prev.map(l => l.id === id ? { ...l, result } : l);
      ls_set("cs_logs", updated);
      return updated;
    });
    // 백엔드 연동
    if (baseUrl) {
      fetch(`${baseUrl}/api/performance/update`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ log_id: id, result }),
      }).catch(() => {});
    }
  }, []);

  const handleAnalyze = async () => {
    if (loading) return;
    if (!query.trim() && mode === "search") return;
    if (!imgFile && mode === "upload") return;

    setError("");
    setReport(null);
    setChartImage(null);
    setLoading(true);
    setLoadStep(0);

    try {
      if (mode === "search") {
        setLoadStep(0);
        let result;

        if (baseUrl) {
          const resp = await fetch(`${baseUrl}/api/analyze-full?q=${encodeURIComponent(query.trim())}`);
          if (!resp.ok) {
            const e = await resp.json();
            throw new Error(e.detail || `서버 오류 ${resp.status}`);
          }
          setLoadStep(1);
          const data = await resp.json();
          setLoadStep(2);
          result = data.report;
          setChartImage(data.chart_image || null);
          const id = addLog(result, data.chart_image || null);
          setCurrentLogId(id);
        } else {
          if (!effectiveApiKey) { setShowKeyModal(true); return; }
          setLoadStep(1);
          result = await analyzeDirectly(query.trim(), effectiveApiKey);
          setLoadStep(2);
          const id = addLog(result, null);
          setCurrentLogId(id);
        }
        setReport(result);

      } else {
        // 이미지 업로드 모드
        if (!baseUrl) {
          setError("이미지 분석은 백엔드 서버(localhost:8000)가 필요합니다.");
          return;
        }
        setLoadStep(0);
        const form = new FormData();
        form.append("file", imgFile);
        if (effectiveApiKey) form.append("api_key", effectiveApiKey);

        const resp = await fetch(`${baseUrl}/api/analyze`, { method: "POST", body: form });
        if (!resp.ok) {
          const e = await resp.json();
          throw new Error(e.detail || `서버 오류 ${resp.status}`);
        }
        setLoadStep(2);
        const data = await resp.json();
        setReport(data.report);
        setChartImage(data.chart_image || null);
        const id = addLog(data.report, data.chart_image || null);
        setCurrentLogId(id);
      }
    } catch (e) {
      setError(e.message || "분석 중 오류가 발생했습니다");
    } finally {
      setLoading(false);
    }
  };

  const handleImgFile = (f) => {
    setImgFile(f);
    setReport(null);
    setError("");
    if (f) {
      const reader = new FileReader();
      reader.onload = e => setImgPreview(e.target.result);
      reader.readAsDataURL(f);
    } else {
      setImgPreview(null);
    }
  };

  const handleAddWatchlist = async (ticker) => {
    const item = { ticker: ticker.toUpperCase(), name: ticker, added_at: new Date().toISOString() };
    setWatchlist(prev => [...prev.filter(w => w.ticker !== item.ticker), item]);
    if (baseUrl) {
      await fetch(`${baseUrl}/api/watchlist`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ ticker, name: ticker }),
      }).catch(() => {});
    }
  };

  const handleRemoveWatchlist = async (ticker) => {
    setWatchlist(prev => prev.filter(w => w.ticker !== ticker));
    if (baseUrl) {
      await fetch(`${baseUrl}/api/watchlist/${ticker}`, { method: "DELETE" }).catch(() => {});
    }
  };

  const handleToggleMonitor = async () => {
    if (!baseUrl) { setError("모니터 기능은 백엔드 서버가 필요합니다."); return; }
    if (monitoring) {
      await fetch(`${baseUrl}/api/monitor/stop`, { method: "POST" }).catch(() => {});
      setMonitoring(false);
    } else {
      await fetch(`${baseUrl}/api/monitor/start`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ interval_minutes: 60 }),
      }).catch(() => {});
      setMonitoring(true);
    }
  };

  const handleRemoveWatchlist2 = async (ticker) => {
    setWatchlist(prev => prev.filter(w => w.ticker !== ticker));
    if (baseUrl) {
      await fetch(`${baseUrl}/api/watchlist/${ticker}`, { method: "DELETE" }).catch(() => {});
    }
  };

  return (
    <div className="app">
      {showKeyModal && <ApiKeyModal onSave={saveApiKey} />}

      {/* P2-3: 설정 드로어 */}
      <SettingsDrawer open={showSettings} onClose={() => setShowSettings(false)}
        settings={{...settings, apiKey: effectiveApiKey}} onSave={saveSettings} />

      {/* P2-2: 히스토리 재보기 모달 */}
      {historyModal && (
        <div className="modal-bg" onClick={() => setHistoryModal(null)}>
          <div className="history-modal" onClick={e => e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
              <strong style={{fontSize:15}}>이전 분석 — {historyModal.report?.ticker}</strong>
              <button className="btn-ghost" onClick={() => setHistoryModal(null)}>✕ 닫기</button>
            </div>
            <ReportCard report={historyModal.report} chartImage={historyModal.chart} logId={null} onResult={null} />
          </div>
        </div>
      )}

      {/* 토스트 */}
      {toast && <div className="toast">{toast}</div>}

      {/* 헤더 */}
      <div className="header">
        <div className="logo">
          <div className="logo-icon">🛡</div>
          Chart Sentinel
        </div>
        <div className="header-right">
          <span className={`api-status ${effectiveApiKey || baseUrl ? "api-ok" : "api-bad"}`}>
            {baseUrl ? "🟢 서버 연결" : effectiveApiKey ? "🟡 직접 호출" : "⚠ 키 없음"}
          </span>
          <button className="btn-ghost" onClick={() => setShowSettings(true)}>⚙ 설정</button>
          <button className="btn-ghost" onClick={() => setShowKeyModal(true)}>API 키</button>
        </div>
      </div>

      {/* 탭 */}
      <div className="tabs">
        {[["analysis","📊 분석"],["compare","⚖ 비교"],["performance","📈 성과"],["backtest","🔬 백테스트"],["portfolio","🏦 포트폴리오"],["monitor","👁 모니터"]].map(([id,label]) => (
          <button key={id} className={`tab${activeTab===id?" active":""}`} onClick={() => setActiveTab(id)}>{label}</button>
        ))}
      </div>

      {/* 메인 */}
      <div className="main">

        {/* 분석 탭 */}
        {activeTab === "analysis" && (
          <div className="grid2">
            {/* 왼쪽: 입력 패널 */}
            <div>
              <div className="mode-toggle">
                <button className={`mode-btn${mode==="search"?" active":""}`} onClick={() => setMode("search")}>🔍 검색</button>
                <button className={`mode-btn${mode==="upload"?" active":""}`} onClick={() => setMode("upload")}>📤 이미지</button>
              </div>

              {mode === "search" ? (
                <>
                  <div className="search-wrap">
                    <SearchAutocomplete
                      value={query}
                      onChange={setQuery}
                      onSelect={(sym) => { setQuery(sym); }}
                      onSubmit={handleAnalyze}
                      loading={loading}
                      prevTickers={prevTickers}
                    />
                    <button className="btn-primary" onClick={handleAnalyze} disabled={loading || !query.trim()}>
                      {loading ? "분석 중..." : "분석"}
                    </button>
                  </div>
                  <div className="quick-btns">
                    {QUICK_TICKERS.map(t => (
                      <button key={t} className="quick-btn" onClick={() => { setQuery(t); }}>{t}</button>
                    ))}
                  </div>
                  {query && (
                    <div style={{marginTop:16}}>
                      <TradingViewWidget
                        symbol={query.toUpperCase()}
                        onCapture={baseUrl ? async (blob, err) => {
                          if (loading) return;
                          if (err || !blob) { setError(err || "캡처 실패"); return; }
                          setError(""); setReport(null); setLoading(true); setLoadStep(1);
                          try {
                            const form = new FormData();
                            form.append("file", blob, "capture.png");
                            if (apiKey) form.append("api_key", apiKey);
                            const resp = await fetch(`${baseUrl}/api/analyze`, { method: "POST", body: form });
                            if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail); }
                            setLoadStep(2);
                            const data = await resp.json();
                            setReport(data.report);
                            setChartImage(data.chart_image || null);
                            const id = addLog(data.report);
                            setCurrentLogId(id);
                          } catch (e) {
                            setError(e.message || "분석 중 오류");
                          } finally {
                            setLoading(false);
                          }
                        } : null}
                      />
                    </div>
                  )}
                </>
              ) : (
                <>
                  <ImageDropzone onFile={handleImgFile} preview={imgPreview} />
                  {imgFile && (
                    <button className="btn-primary" style={{marginTop:12,width:"100%"}}
                      onClick={handleAnalyze} disabled={loading}>
                      {loading ? "분석 중..." : "AI 분석 시작"}
                    </button>
                  )}
                </>
              )}
            </div>

            {/* 오른쪽: 결과 패널 */}
            <div className="card">
              {loading ? (
                <Loader step={loadStep} />
              ) : error ? (
                <div className="error-card">⚠ {error}</div>
              ) : report ? (
                <ReportCard
                  report={report}
                  chartImage={mode === "search" ? chartImage : null}
                  logId={currentLogId}
                  onResult={(r) => currentLogId && updateLogResult(currentLogId, r)}
                />
              ) : (
                <div className="empty">
                  <div className="empty-icon">🔍</div>
                  <div className="empty-text">종목을 검색하거나 차트를 업로드하여<br />AI 분석을 시작하세요</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* 비교 탭 */}
        {activeTab === "compare" && (
          <CompareTab addLog={addLog} baseUrl={baseUrl} />
        )}

        {/* 성과 탭 */}
        {activeTab === "performance" && (
          <PerformanceTab logs={logs} onUpdateResult={updateLogResult} setHistoryModal={setHistoryModal} baseUrl={baseUrl} />
        )}

        {/* 백테스팅 탭 */}
        {activeTab === "backtest" && <BacktestTab />}

        {/* 포트폴리오 탭 */}
        {activeTab === "portfolio" && <PortfolioTab />}

        {/* 모니터 탭 */}
        {activeTab === "monitor" && (
          <MonitorTab
            watchlist={watchlist}
            onAdd={handleAddWatchlist}
            onRemove={handleRemoveWatchlist}
            monitoring={monitoring}
            onToggleMonitor={handleToggleMonitor}
          />
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
